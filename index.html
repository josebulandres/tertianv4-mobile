  // When initialCategory prop changes (user clicked a menu item), update category + first exercise
  useEffect(() => {
    if (initialCategory && initialCategory !== category) {
      setCategory(initialCategory);
      const cats = {
        'Sequences':  ['scale-3s-asc','scale-4s-asc','scale-5s-asc','scale-6s-asc','scale-1234','scale-12345','scale-123456','scale-1235','scale-1325','scale-triplets-3s','scale-zigzag'],
        'Arpeggios':  ['arps-triads','arps-7ths','arps-spread'],
        'Pentatonic Licks': ['pent-asc-1','pent-desc-1','blues-lick-1','maj-pent-country','pent-srv-rake','pent-jimmy'],
        'Modal Vocabulary': ['modal-dorian-up','modal-mixo-up','modal-lydian-up'],
      };
      const first = (cats[initialCategory] || [])[0];
      if (first) setActiveExercise(first);
    }
  }, [initialCategory]);

  const useFlats = useFlatsFor(keyRoot);
  const keyRootPc = pcOf(keyRoot);
  const scale = SCALES[scaleKey] || SCALES.minorPent;

  // Categorize exercises
  const categories = {
    'Sequences':  ['scale-3s-asc','scale-4s-asc','scale-5s-asc','scale-6s-asc','scale-1234','scale-12345','scale-123456','scale-1235','scale-1325','scale-triplets-3s','scale-zigzag'],
    'Arpeggios':  ['arps-triads','arps-7ths','arps-spread'],
    'Pentatonic Licks': ['pent-asc-1','pent-desc-1','blues-lick-1','maj-pent-country','pent-srv-rake','pent-jimmy'],
    'Modal Vocabulary': ['modal-dorian-up','modal-mixo-up','modal-lydian-up'],
  };

  // Filter exercises that match the current scale's scope
  const isCompatible = (ex) => {
    if (ex.scope === 'any') return true;
    if (ex.scope === 'pentatonic') return scaleKey === 'minorPent' || scaleKey === 'blues';
    if (ex.scope === 'blues') return scaleKey === 'blues' || scaleKey === 'minorPent';
    if (ex.scope === 'major-pentatonic') return scaleKey === 'majorPent' || scaleKey === 'majorBlues';
    if (ex.scope === 'arp-triad' || ex.scope === 'arp-7th') return scale.steps.length >= 7;
    return true;
  };

  const exerciseList = (categories[category] || [])
    .map(id => LICK_PATTERNS.find(p => p.id === id))
    .filter(Boolean);

  const exercise = LICK_PATTERNS.find(p => p.id === activeExercise) || LICK_PATTERNS[0];
  const compatible = isCompatible(exercise);

  // Build scale notes — 3 octaves ordered ascending. Pitch-class highlights
  // already show the full neck visualization, so we don't need a flat all-positions list here.
  const scaleNotes = useMemo(() => buildScalePitches(keyRoot, scaleKey, 3), [keyRoot, scaleKey]);

  // Build the actual exercise note sequence
  const exerciseNotes = useMemo(() => {
    if (!compatible) return [];
    let seq = [];
    if (exercise.scope === 'arp-triad') {
      seq = diatonicArpeggios(scaleNotes, false);
    } else if (exercise.scope === 'arp-7th') {
      seq = diatonicArpeggios(scaleNotes, true);
    } else {
      seq = computeExerciseNotes(exercise, scaleNotes, true);
    }
    if (direction === 'desc') {
      seq = [...seq].reverse();
    } else if (direction === 'both') {
      seq = [...seq, ...[...seq].reverse().slice(1)];
    }
    return seq;
  }, [exercise, scaleNotes, compatible, direction]);

  // Highlight: every scale tone, with degree labels — dim background showing where the scale lives
  const highlights = useMemo(() => {
    const m = new Map();
    scale.steps.forEach((semitone, i) => {
      const pc = (keyRootPc + semitone) % 12;
      const label = showAs === 'note' ? display(pc, useFlats) : (scale.degrees[i] || '');
      m.set(pc, { label, bg: i === 0 ? 'var(--burgundy)' : '#8a6d4a' });
    });
    return m;
  }, [scale, keyRootPc, showAs, useFlats]);

  // Position-specific markers:
  //   • Show only the physical notes this exercise will actually visit
  //   • Gold marker for the currently sounding note
  // This keeps playalong honest: every visible marker is touched during playback.
  const positions = useMemo(() => {
    const m = new Map();
    const labelForMidi = (midi) => {
      const pc = ((midi % 12) + 12) % 12;
      if (showAs === 'note') return display(pc, useFlats);
      const interval = ((pc - keyRootPc) + 12) % 12;
      const idx = scale.steps.indexOf(interval);
      return idx >= 0 ? (scale.degrees[idx] || '·') : '·';
    };
    // Pre-compute all positions for the full sequence so we show the path
    exerciseNotes.forEach((midi, i) => {
      const pos = midiToPositionSpread(midi, i, exerciseNotes.length);
      if (pos) {
        const key = `${pos.str}:${pos.fret}`;
        if (!m.has(key)) m.set(key, { label:labelForMidi(midi), bg:'#a08260' });
      }
    });
    // Override current note in gold
    if (currentNoteIdx >= 0 && currentNoteIdx < exerciseNotes.length) {
      const midi = exerciseNotes[currentNoteIdx];
      const pos = midiToPositionSpread(midi, currentNoteIdx, exerciseNotes.length);
      if (pos) {
        m.set(`${pos.str}:${pos.fret}`, { label: labelForMidi(midi), bg: 'var(--gold)' });
      }
    }
    return m;
  }, [currentNoteIdx, exerciseNotes, showAs, useFlats, keyRootPc, scale]);

  // Play / stop loop
  useEffect(() => {
    if (!isPlaying) {
      playRef.current.cancelled = true;
      setCurrentNoteIdx(-1);
      return;
    }
    playRef.current = { cancelled: false };
    const myRef = playRef.current;

    const noteDur = 60 / bpm;  // quarter note in seconds
    const beatPerNote = exercise.rhythm === 'sixteenths' ? noteDur / 4
                      : exercise.rhythm === 'triplets' ? noteDur / 3
                      : exercise.rhythm === 'eighths' ? noteDur / 2
                      : noteDur;

    const playLoop = async () => {
      while (!myRef.cancelled) {
        for (let i = 0; i < exerciseNotes.length; i++) {
          if (myRef.cancelled) return;
          const midi = exerciseNotes[i];
          if (midi != null) {
            audio.playNote(midi, beatPerNote * 0.92 + 's');
          }
          setCurrentNoteIdx(i);
          await new Promise(r => setTimeout(r, beatPerNote * 1000));
        }
        // Brief pause between loops
        await new Promise(r => setTimeout(r, 600));
      }
    };
    playLoop();
    return () => { myRef.cancelled = true; };
  }, [isPlaying, exerciseNotes, bpm, exercise.rhythm]);

  useEffect(() => () => { playRef.current.cancelled = true; }, []);

  // Reset playback when changing exercise/key/scale
  useEffect(() => {
    setIsPlaying(false);
    setCurrentNoteIdx(-1);
  }, [activeExercise, keyRoot, scaleKey, direction]);

  const togglePlay = async () => {
    if (!isPlaying) {
      try { if (Tone.context.state !== 'running') await Tone.start(); } catch (e) {}
    }
    setIsPlaying(p => !p);
  };

  // Suggested scales depending on category
  const scaleOptions = category === 'Pentatonic Licks'
    ? ['minorPent','blues','majorPent','majorBlues']
    : ['ionian','dorian','phrygian','lydian','mixolydian','aeolian','minorPent','blues','majorPent','melodicMinor','harmMinor','altered'];

  return (
    <div className="tab-anim">
      <SectionHeader
        chapter="Chapter X"
        title="Workshop"
        sub="Exercises that turn theory into vocabulary — sequences, arpeggios, licks."
      />

      <p style={{ color:'var(--ink-2)', maxWidth:560, marginBottom:18, lineHeight:1.65 }}>
        Theory becomes playing through repetition with intent. Pick a scale and run sequences to develop fluency; pick a key and walk diatonic arpeggios to internalize harmony; play the canonical licks in every key to build idiomatic vocabulary. Each exercise generates its notes from your chosen key and scale — change either, and the exercise transposes automatically.
      </p>

      {/* Category pills */}
      <div style={{ marginBottom:14 }}>
        <div className="small-caps" style={{ fontSize:10, color:'var(--ink-3)', marginBottom:6 }}>Category</div>
        <div style={{ display:'flex', flexWrap:'wrap', gap:4 }}>
          {Object.keys(categories).map(c => (
            <button
              key={c}
              onClick={() => {
                setCategory(c);
                const first = (categories[c] || [])[0];
                if (first) setActiveExercise(first);
              }}
              style={{
                padding:'5px 10px', borderRadius:2,
                background: category === c ? 'var(--ink)' : 'transparent',
                color: category === c ? 'var(--paper)' : 'var(--ink)',
                border:'1px solid var(--ink)',
                fontFamily:"'EB Garamond', serif", fontSize:13,
              }}
            >{c}</button>
          ))}
        </div>
      </div>

      {/* Exercise list */}
      <div style={{ marginBottom:14 }}>
        <div className="small-caps" style={{ fontSize:10, color:'var(--ink-3)', marginBottom:6 }}>Exercise</div>
        <div style={{ display:'flex', flexWrap:'wrap', gap:4 }}>
          {exerciseList.map(ex => (
            <button
              key={ex.id}
              onClick={() => setActiveExercise(ex.id)}
              style={{
                padding:'5px 10px', borderRadius:2,
                background: activeExercise === ex.id ? 'var(--burgundy)' : 'transparent',
                color: activeExercise === ex.id ? 'var(--paper)' : 'var(--ink)',
                border:'1px solid var(--burgundy)',
                fontFamily:"'EB Garamond', serif", fontSize:13,
              }}
            >{ex.name}</button>
          ))}
        </div>
      </div>

      {/* Active exercise card */}
      <Card style={{ padding:18, marginBottom:14 }}>
        <h3 className="font-display" style={{ fontSize:22, fontStyle:'italic', marginBottom:6 }}>{exercise.name}</h3>
        <p style={{ fontSize:13, color:'var(--ink-3)', lineHeight:1.5, marginBottom:10 }}>{exercise.description}</p>
        <div style={{ display:'flex', flexWrap:'wrap', gap:6, marginBottom:12 }}>
          <Pill tone="ink" size="xs">Rhythm: {exercise.rhythm}</Pill>
          <Pill tone="gold" size="xs">{exerciseNotes.length} notes</Pill>
        </div>

        {!compatible && (
          <div style={{ padding:10, marginBottom:10, background:'rgba(134,45,42,0.1)', border:'1px solid var(--burgundy)', borderRadius:2 }}>
            <p style={{ fontSize:12.5, color:'var(--burgundy)', fontStyle:'italic', lineHeight:1.5 }}>
              This exercise needs a {exercise.scope.replace('-', ' ')} scale. Switch to a compatible scale below.
            </p>
          </div>
        )}

        {/* Key */}
        <div style={{ marginBottom:10 }}>
          <div className="small-caps" style={{ fontSize:9, color:'var(--ink-3)', marginBottom:6 }}>Key</div>
          <RootSelector root={keyRoot} setRoot={setKeyRoot} useFlats={useFlats} />
        </div>

        {/* Scale */}
        <div style={{ marginBottom:10 }}>
          <div className="small-caps" style={{ fontSize:9, color:'var(--ink-3)', marginBottom:6 }}>Scale</div>
          <div className="scroll-x" style={{ paddingBottom:4 }}>
            <div style={{ display:'flex', gap:4, minWidth:'min-content' }}>
              {scaleOptions.map(sk => {
                const s = SCALES[sk];
                if (!s) return null;
                return (
                  <button
                    key={sk}
                    onClick={() => setScaleKey(sk)}
                    style={{
                      padding:'5px 10px', borderRadius:2, whiteSpace:'nowrap',
                      background: scaleKey === sk ? 'var(--ink)' : 'transparent',
                      color: scaleKey === sk ? 'var(--paper)' : 'var(--ink)',
                      border:'1px solid var(--ink)',
                      fontFamily:"'EB Garamond', serif", fontSize:13,
                    }}
                  >{s.name}</button>
                );
              })}
            </div>
          </div>
        </div>

        {/* Direction */}
        <div style={{ marginBottom:10 }}>
          <div className="small-caps" style={{ fontSize:9, color:'var(--ink-3)', marginBottom:6 }}>Direction</div>
          <div style={{ display:'flex', gap:0, border:'1px solid var(--ink)', borderRadius:2, overflow:'hidden', width:'fit-content' }}>
            {[
              { id:'asc', label:'↗ Up' },
              { id:'desc', label:'↘ Down' },
              { id:'both', label:'↗↘ Both' },
            ].map(d => (
              <button
                key={d.id}
                onClick={() => setDirection(d.id)}
                style={{
                  padding:'5px 12px',
                  fontFamily:"'JetBrains Mono', monospace", fontSize:10,
                  letterSpacing:'0.1em', textTransform:'uppercase',
                  background: direction === d.id ? 'var(--ink)' : 'transparent',
                  color: direction === d.id ? 'var(--paper)' : 'var(--ink)',
                }}
              >{d.label}</button>
            ))}
          </div>
        </div>

        {/* BPM */}
        <div style={{ display:'flex', alignItems:'center', gap:10, marginBottom:10 }}>
          <span className="small-caps" style={{ fontSize:9, color:'var(--ink-3)' }}>BPM</span>
          <button onClick={() => setBpm(b => Math.max(40, b - 5))} style={{
            width:30, height:30, border:'1px solid var(--ink)', borderRadius:2,
            background:'var(--paper)', color:'var(--ink)',
            fontFamily:"'JetBrains Mono', monospace", fontSize:14,
          }}>−</button>
          <span className="font-mono num" style={{ fontSize:18, fontWeight:600, minWidth:46, textAlign:'center', color:'var(--ink)' }}>{bpm}</span>
          <button onClick={() => setBpm(b => Math.min(240, b + 5))} style={{
            width:30, height:30, border:'1px solid var(--ink)', borderRadius:2,
            background:'var(--paper)', color:'var(--ink)',
            fontFamily:"'JetBrains Mono', monospace", fontSize:14,
          }}>+</button>
        </div>

        {/* Play */}
        <button
          onClick={togglePlay}
          disabled={!compatible}
          style={{
            width:'100%', padding:'14px',
            background: compatible ? (isPlaying ? 'var(--burgundy)' : 'var(--sage)') : 'var(--rule)',
            color:'var(--paper)',
            border:`1px solid ${compatible ? (isPlaying ? 'var(--burgundy)' : 'var(--sage)') : 'var(--rule)'}`,
            borderRadius:2,
            fontFamily:"'JetBrains Mono', monospace",
            fontSize:11, letterSpacing:'0.2em', textTransform:'uppercase',
            opacity: compatible ? 1 : 0.5,
          }}
        >
          {isPlaying ? '■ Stop' : '▶ Play exercise'}
        </button>

        {/* Practice note */}
        <div style={{ marginTop:12, paddingTop:12, borderTop:'1px solid var(--rule-soft)' }}>
          <div className="small-caps" style={{ fontSize:9, color:'var(--burgundy)', marginBottom:4 }}>Tip</div>
          <p style={{ fontSize:13, color:'var(--ink-2)', fontStyle:'italic', lineHeight:1.5 }}>{exercise.note}</p>
        </div>
      </Card>

      {/* Display toggle */}
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:6, gap:8 }}>
        <span className="font-display" style={{ fontSize:14, fontStyle:'italic', color:'var(--ink)' }}>
          {display(keyRootPc, useFlats)} {scale.name}
          {currentNoteIdx >= 0 && (
            <span className="font-mono" style={{ marginLeft:10, fontSize:11, color:'var(--gold)' }}>
              note {currentNoteIdx+1}/{exerciseNotes.length}
            </span>
          )}
        </span>
        <div style={{ display:'flex', gap:0, border:'1px solid var(--ink)', borderRadius:2, overflow:'hidden' }}>
          {['degree','note'].map(opt => (
            <button
              key={opt}
              onClick={() => setShowAs(opt)}
              style={{
                padding:'5px 10px', fontFamily:"'JetBrains Mono', monospace",
                fontSize:10, letterSpacing:'0.1em', textTransform:'uppercase',
                background: showAs === opt ? 'var(--ink)' : 'transparent',
                color: showAs === opt ? 'var(--paper)' : 'var(--ink)',
              }}
            >{opt === 'degree' ? 'Degrees' : 'Notes'}</button>
          ))}
        </div>
      </div>

      {/* Fretboard with current note highlighted */}
      <GuitarFretboard
        positions={positions}
        rootPc={keyRootPc}
        useFlats={useFlats}
        numFrets={15}
        label={isPlaying ? '♬ Watch the gold note — play along' : 'Hit play, then track the gold note'}
      />

      <div className="ornament" />

      {/* General practice methodology */}
      <Card style={{ padding:18, background:'var(--paper-3)' }}>
        <div className="small-caps" style={{ fontSize:10, color:'var(--burgundy)', marginBottom:6 }}>Practice methodology</div>
        <h4 className="font-display" style={{ fontSize:18, fontStyle:'italic', marginBottom:8 }}>The 3-tempo / 12-key drill</h4>
        <p style={{ fontSize:14, color:'var(--ink-2)', lineHeight:1.6, marginBottom:10 }}>
          For any exercise, run this protocol to build real fluency:
        </p>
        <ol style={{ paddingLeft:20, margin:0 }}>
          <li style={{ fontSize:13.5, color:'var(--ink-2)', lineHeight:1.6, marginBottom:5 }}><strong>Slow tempo (60 BPM)</strong> — name every note out loud as you play it.</li>
          <li style={{ fontSize:13.5, color:'var(--ink-2)', lineHeight:1.6, marginBottom:5 }}><strong>Medium tempo (90 BPM)</strong> — close your eyes; rely on muscle memory.</li>
          <li style={{ fontSize:13.5, color:'var(--ink-2)', lineHeight:1.6, marginBottom:5 }}><strong>Fast tempo (120+ BPM)</strong> — play cleanly with even tone, then push 5 BPM higher.</li>
          <li style={{ fontSize:13.5, color:'var(--ink-2)', lineHeight:1.6, marginBottom:5 }}><strong>Cycle through all 12 keys</strong> — tap each key in turn and run the exercise once. The exercise teaches the pattern; cycling teaches the neck.</li>
        </ol>
        <p style={{ fontSize:13, color:'var(--ink-3)', marginTop:12, fontStyle:'italic', lineHeight:1.55 }}>
          15 minutes of focused practice on one exercise across 12 keys will outperform 60 minutes of unfocused noodling. Set the tempo where you can play CLEAN — speed is a byproduct of cleanliness, not the goal.
        </p>
      </Card>

      <div className="ornament" />

      {/* Daily practice menu */}
      <Card style={{ padding:18 }}>
        <div className="small-caps" style={{ fontSize:10, color:'var(--burgundy)', marginBottom:6 }}>Daily practice menu</div>
        <h4 className="font-display" style={{ fontSize:18, fontStyle:'italic', marginBottom:4 }}>A 30-minute session</h4>
        <p style={{ fontSize:12, color:'var(--ink-3)', fontStyle:'italic', marginBottom:12 }}>Tap any block to jump straight to it.</p>
        <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
          {[
            { time:'5 min', what:'Warm-up: Spider 1234 chromatic + scale of the day in two octaves.',                action: () => { setCategory('Sequences'); setActiveExercise('scale-3s-asc'); setBpm(60); setIsPlaying(false); window.scrollTo({top:0,behavior:'smooth'}); } },
            { time:'7 min', what:'Sequences: pick one (3rds, 4ths, 1234) — run in 3 keys at moderate tempo.',         action: () => { setCategory('Sequences'); setActiveExercise('scale-1234'); setBpm(90); setIsPlaying(false); window.scrollTo({top:0,behavior:'smooth'}); } },
            { time:'7 min', what:'Arpeggios: diatonic triads or 7ths through the key. Both ascending and descending.', action: () => { setCategory('Arpeggios'); setActiveExercise('arps-triads'); setDirection('both'); setBpm(80); setIsPlaying(false); window.scrollTo({top:0,behavior:'smooth'}); } },
            { time:'5 min', what:'Licks: pick one canonical lick, transpose to 4 keys.',                              action: () => { setCategory('Pentatonic Licks'); setActiveExercise('pent-asc-1'); setBpm(85); setIsPlaying(false); window.scrollTo({top:0,behavior:'smooth'}); } },
            { time:'5 min', what:'Free improvisation: Jam tab over a relevant progression. Apply what you just practiced.', action: () => { if (setTab) setTab('jam'); } },
            { time:'1 min', what:'Cool-down: play something you love. End on a high note.',                          action: null },
          ].map((b, i) => {
            const clickable = !!b.action;
            return (
              <button
                key={i}
                onClick={b.action || undefined}
                disabled={!clickable}
                style={{
                  display:'flex', gap:10, padding:'10px 12px',
                  background:'var(--paper)',
                  border:'1px solid var(--rule)',
                  borderRadius:2,
                  textAlign:'left',
                  cursor: clickable ? 'pointer' : 'default',
                  alignItems:'flex-start',
                  width:'100%',
                  transition:'background 0.15s, border-color 0.15s',
                }}
                onMouseEnter={clickable ? (e) => { e.currentTarget.style.background = 'var(--paper-3)'; e.currentTarget.style.borderColor = 'var(--burgundy)'; } : undefined}
                onMouseLeave={clickable ? (e) => { e.currentTarget.style.background = 'var(--paper)'; e.currentTarget.style.borderColor = 'var(--rule)'; } : undefined}
              >
                <span className="font-mono" style={{
                  fontSize:10, padding:'2px 6px',
                  background:'var(--burgundy)', color:'var(--paper)', borderRadius:2,
                  letterSpacing:'0.1em', textTransform:'uppercase',
                  minWidth:50, textAlign:'center', height:'fit-content', alignSelf:'flex-start', marginTop:2,
                  flexShrink:0,
                }}>{b.time}</span>
                <span style={{ fontSize:13.5, color:'var(--ink-2)', lineHeight:1.55, flex:1 }}>{b.what}</span>
                {clickable && (
                  <span style={{ color:'var(--ink-4)', fontSize:14, alignSelf:'center', flexShrink:0 }}>›</span>
                )}
              </button>
            );
          })}
        </div>
      </Card>
    </div>
  );
}

// Permutation generator — all orderings of an array
function permutations(arr) {
  if (arr.length <= 1) return [arr];
  const out = [];
  for (let i = 0; i < arr.length; i++) {
    const rest = [...arr.slice(0, i), ...arr.slice(i + 1)];
    for (const p of permutations(rest)) out.push([arr[i], ...p]);
  }
  return out;
}
