// Build a playable fretboard sequence directly from a displayed Vai ASCII tab figure.
// This keeps the figure atlas and playalong synchronized: whatever notes are printed
// in the active figure are the notes highlighted and played on the fretboard.
const VAI_TAB_STRING_INDEX = { E:0, A:1, D:2, G:3, B:4, e:5 };

function parseVaiTabToSteps(tab) {
  if (!tab || typeof tab !== 'string') return [];
  const out = [];
  let staff = [];
  const shouldSkipToken = (body, start) => {
    // Do not create extra fretboard touches for bend/release target numbers such as 14b16 or 17r15.
    // Slide targets remain playable because the fretting hand physically moves to the target fret.
    let j = start - 1;
    while (j >= 0 && body[j] === ' ') j--;
    const prev = body[j] || '';
    if (prev === 'b' || prev === 'B' || prev === 'r' || prev === 'R') return true;
    if (prev === '(') {
      let k = j - 1;
      while (k >= 0 && body[k] === ' ') k--;
      return body[k] === 'r' || body[k] === 'R';
    }
    return false;
  };
  const flushStaff = () => {
    if (!staff.length) return;
    const notes = [];
    staff.forEach(line => {
      const str = VAI_TAB_STRING_INDEX[line.stringName];
      if (str == null) return;
      for (let i = 0; i < line.body.length; i++) {
        const ch = line.body[i];
        if (ch >= '0' && ch <= '9') {
          let j = i + 1;
          while (j < line.body.length && line.body[j] >= '0' && line.body[j] <= '9') j++;
          const fret = parseInt(line.body.slice(i, j), 10);
          if (!shouldSkipToken(line.body, i) && Number.isFinite(fret) && fret >= 0 && fret <= 24) {
            notes.push({ col:i, str, fret, midi:TUNING[str] + fret });
          }
          i = j - 1;
        }
      }
    });
    const byCol = new Map();
    notes.sort((a, b) => a.col - b.col || a.str - b.str || a.fret - b.fret).forEach(n => {
      const list = byCol.get(n.col) || [];
      list.push(n);
      byCol.set(n.col, list);
    });
    Array.from(byCol.keys()).sort((a, b) => a - b).forEach(col => {
      const group = byCol.get(col).sort((a, b) => a.str - b.str || a.fret - b.fret);
      if (group.length === 1) {
        const n = group[0];
        out.push({ midi:n.midi, str:n.str, fret:n.fret, tabCol:col });
      } else {
        out.push({ isChord:true, midis:group.map(n => n.midi), positions:group.map(n => ({ str:n.str, fret:n.fret, midi:n.midi })), tabCol:col });
      }
    });
    staff = [];
  };
  String(tab).split(/\r?\n/).forEach(raw => {
    const m = raw.match(/^\s*([eBGDAE])\|(.+)$/);
    if (m) staff.push({ stringName:m[1], body:m[2] }); else flushStaff();
  });
  flushStaff();
  return out;
}

function vaiFigureToExercise(fig) {
  const steps = parseVaiTabToSteps(fig?.tab || '');
  const tempoMatch = String(fig?.tempo || '').match(/(\d+)/);
  return {
    name: `${fig?.label || 'Vai figure'} — synced tab playalong`,
    description: steps.length
      ? `Generated from the displayed ${fig?.label || 'figure'} tab: ${steps.length} tab event${steps.length === 1 ? '' : 's'} will play in left-to-right reading order; simultaneous tab-column notes are played as chords.`
      : `No playable fret numbers were detected in this figure. Use the printed tab as a visual/reference study.`,
    type:'vaiFigure',
    steps,
    bpm: tempoMatch ? Number(tempoMatch[1]) : 70,
    rhythm:'eighths',
    runOnce:true,
    sourceLabel: fig?.label || 'Vai figure',
  };
}

  .map(fig => ({
    label: `${fig.label} — ${fig.title}`,

  }))
  .filter(fig => fig.steps.length > 0);

function VaiBlockSourceWorkspace({ block, audio }) {
  const figureIds = VAI_BLOCK_SOURCE_MAP[block?.id] || [];
  const figures = figureIds.map(id => VAI_SOURCE_FIGURES.find(f => f.id === id)).filter(Boolean);
  const [selectedId, setSelectedId] = useState(figures[0]?.id || null);
  const [copied, setCopied] = useState(false);

  useEffect(() => {
    setSelectedId(figures[0]?.id || null);
    setCopied(false);
  }, [block?.id]);

  const selected = figures.find(f => f.id === selectedId) || figures[0] || null;
  const activeExercise = useMemo(() => selected ? vaiFigureToExercise(selected) : null, [selected?.id]);

  if (!figures.length) {
    if (block?.exercise && block.exercise.type !== 'free') return <BlockExercise key={block.id} exercise={block.exercise} audio={audio} />;
    return null;
  }

  const copyActive = async () => {
    if (!selected || typeof navigator === 'undefined' || !navigator.clipboard) return;
    try {
      await navigator.clipboard.writeText(selected.tab);
      setCopied(true);
      setTimeout(() => setCopied(false), 1400);
    } catch (e) {
      setCopied(false);
    }
  };

  return (
    <Card style={{ padding:14, marginBottom:14, background:'var(--paper-3)', borderColor:'var(--gold)' }}>
      <div style={{ display:'flex', justifyContent:'space-between', gap:10, flexWrap:'wrap', alignItems:'flex-start', marginBottom:10 }}>
        <div style={{ flex:'1 1 260px' }}>
          <div className="small-caps" style={{ fontSize:9, color:'var(--burgundy)', marginBottom:4 }}>Source figure for this module</div>
          <h4 className="font-display" style={{ fontSize:20, fontStyle:'italic', marginBottom:4 }}>{selected.label} — {selected.title}</h4>
          <p style={{ fontSize:12.5, color:'var(--ink-2)', lineHeight:1.5 }}>{selected.focus}. The printed tab and the playalong below are the same source figure.</p>
        </div>
        <button onClick={copyActive} style={{ ...btnInline(copied ? 'var(--sage)' : 'var(--burgundy)'), padding:'7px 10px' }}>{copied ? 'Copied tab' : 'Copy tab'}</button>
      </div>

      <div style={{ display:'flex', flexWrap:'wrap', gap:4, marginBottom:10 }}>
        {figures.map(fig => (
          <button key={fig.id} onClick={() => { setSelectedId(fig.id); setCopied(false); }} style={{
            padding:'5px 8px', borderRadius:2,
            background: selected.id === fig.id ? 'var(--burgundy)' : 'var(--paper)',
            color: selected.id === fig.id ? 'var(--paper)' : 'var(--ink)',
            border:'1px solid var(--burgundy)',
            fontFamily:"'JetBrains Mono', monospace", fontSize:9,
            letterSpacing:'0.08em', textTransform:'uppercase',
          }}>{fig.label}</button>
        ))}
      </div>

      <pre className="font-mono" style={{
        margin:0, padding:12, maxHeight:360, overflow:'auto', whiteSpace:'pre',
        background:'#1f1b16', color:'#f7f0dc', border:'1px solid var(--ink)', borderRadius:2,
        fontSize:11, lineHeight:1.35,
      }}>{selected.tab}</pre>

      <div style={{ marginTop:10 }}>
        <BlockExercise key={selected.id} exercise={activeExercise} audio={audio} />
      </div>
    </Card>
  );
}

      'Try emphasizing the F♯ (9th of E, ♯11 of G) — it\'s the color tone that ties both chords.',
      'Record a 1-minute solo over the loop. Play it back and judge phrasing.',
    ],
    notes:'A modal lead study. The two chords share six of seven scale tones — you don\'t need to change scales, just emphasize different notes. Loops automatically until you press stop.' },

  { id:'metronome', cat:'Application', label:'Metronome — bring your own tab',
    fullMin:30, jumpTo:null, jumpCat:null,
    exercise: {
      name:'Silent metronome',
      description:'A click track and beat counter — no fretboard, no notes. Open your own tab/sheet music alongside this and play to the click. Use any time you want a tempo reference without the app dictating notes.',
      type:'metronome',
      beats:128,
      beatsPerBar:4,
      bpm:80, rhythm:'eighths',
    },
    tasks:[
      'Open your tab on a separate device or printed sheet.',
      'Set the BPM to your starting tempo — 60 or 70 is fine for a first read-through.',
      'Beat 1 of each bar is louder/burgundy; beats 2-4 are gold.',
      'Once a passage is clean at the slow tempo, raise the BPM by 5 and run it again.',
      'Add 5 BPM only when you\'ve done 4 consecutive clean cycles.',

    notes:'The general-purpose tool. Use it to practice anything not built into the app — passages from books, songs you\'re learning, exercises from your own teacher. The 3-tempo / 12-key drill from the Workshop tab works perfectly here.' },

  { id:'cool', cat:'Cool-down', label:'Cool-down & Reflection',
    fullMin:30, jumpTo:null, jumpCat:null,
    tasks:[
      'Slow stretching — forearms, fingers, shoulders (5 min)',
      'Play something you love — no agenda (15 min)',
      'Journal: one thing that improved, one to work on tomorrow (10 min)',

// Mode profiles — different total time targets that scale each block proportionally
const VAI_MODES = [
  { id:'10hr',  label:'Full 10-Hour', totalMin:600, desc:'The full 10-hour version. The module blocks are proportionally scaled so the whole session is 10 hours, not 12.' },
  { id:'5hr',   label:'Half',         totalMin:300, desc:'5 hours. Each block at half its full duration.' },
  { id:'2hr',   label:'Daily',        totalMin:120, desc:'2 hours — a sustainable daily session for a serious player.' },
  { id:'1hr',   label:'Quick',        totalMin:60,  desc:'1 hour — when you only have one hour, this is the proportion.' },
  { id:'30min', label:'Maintenance',  totalMin:30,  desc:'30 minutes — bare-minimum daily touch.' },
];

function VaiRoutineTab({ audio, setTab, setWorkshopCategory }) {
  const [mode, setMode] = useState('1hr');
  const [activeIdx, setActiveIdx] = useState(0);
  const [secondsLeft, setSecondsLeft] = useState(0);
  const [running, setRunning] = useState(false);
  const tickRef = useRef(null);

  const profile = VAI_MODES.find(m => m.id === mode) || VAI_MODES[3];

  // Compute scaled minutes per block
  const fullTotal = VAI_BLOCKS.reduce((acc, b) => acc + b.fullMin, 0);
  const scaleFactor = profile.totalMin / fullTotal;
  const scaledBlocks = useMemo(() => VAI_BLOCKS.map(b => ({
    ...b,
    scaledMin: Math.max(1, Math.round(b.fullMin * scaleFactor)),
    scaledSec: Math.max(60, Math.round(b.fullMin * scaleFactor * 60)),
  })), [scaleFactor]);

  const currentBlock = scaledBlocks[activeIdx];

  // Reset timer when block or mode changes
  useEffect(() => {
    setRunning(false);
    setSecondsLeft(currentBlock ? currentBlock.scaledSec : 0);
  }, [activeIdx, mode]);

  // Tick
  useEffect(() => {
    if (!running) return;
    tickRef.current = setInterval(() => {
      setSecondsLeft(s => {
        if (s <= 1) {
          // Block complete — auto-advance
          clearInterval(tickRef.current);
          setRunning(false);
          // Play a soft chime to signal completion
          try { audio.playChord([72, 76, 79], '4n'); } catch (e) {}
          if (activeIdx + 1 < scaledBlocks.length) {
            setTimeout(() => setActiveIdx(activeIdx + 1), 1500);
          }
          return 0;
        }
        return s - 1;
      });
    }, 1000);
    return () => clearInterval(tickRef.current);
  }, [running, activeIdx, scaledBlocks.length, audio]);

  const formatTime = (sec) => {
    const m = Math.floor(sec / 60);
    const s = sec % 60;
    return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  };

  const totalSeconds = scaledBlocks.reduce((acc, b) => acc + b.scaledSec, 0);
  const elapsedThroughBlocks = scaledBlocks.slice(0, activeIdx).reduce((acc, b) => acc + b.scaledSec, 0);
  const elapsedInCurrent = currentBlock ? currentBlock.scaledSec - secondsLeft : 0;
  const totalElapsed = elapsedThroughBlocks + elapsedInCurrent;
  const overallPct = Math.round((totalElapsed / totalSeconds) * 100);

  const blockPct = currentBlock && currentBlock.scaledSec > 0
    ? Math.round(((currentBlock.scaledSec - secondsLeft) / currentBlock.scaledSec) * 100)
    : 0;

  const goToBlock = (idx) => {
    setActiveIdx(idx);
    setRunning(false);
    if (typeof window !== 'undefined') window.scrollTo({ top: 0, behavior: 'smooth' });
  };

  const jumpToTab = () => {
    if (!currentBlock || !currentBlock.jumpTo) return;
    if (currentBlock.jumpCat && setWorkshopCategory) {
      setWorkshopCategory(currentBlock.jumpCat);
    }
    setTab(currentBlock.jumpTo);
  };

  const catColor = (cat) => {
    if (cat === 'Technique') return 'burgundy';
    if (cat === 'Theory') return 'gold';
    if (cat === 'Ear') return 'sage';
    if (cat === 'Reading') return 'slate';
    if (cat === 'Application') return 'burgundy';
    return 'ink';
  };

  return (
    <div className="tab-anim">
      <SectionHeader
        chapter="Chapter XII"
        title="The Vai Routine"
        sub="Steve Vai's 10-Hour Workout, structured for any session length."
      />

      <p style={{ color:'var(--ink-2)', maxWidth:560, marginBottom:18, lineHeight:1.65 }} className="drop-cap">
        First published in Guitar World magazine in 1990, Steve Vai's 10-Hour Guitar Workout became the most cited practice routine in modern guitar. This page treats the material as a 10-hour curriculum: source figures, technique blocks, theory, ear, reading, repertoire, composition, and cool-down scaled to the time you actually have. Each block jumps to the relevant tab so you can do the work, not just read about it.
      </p>

      <div className="ornament" />

      {/* Mode picker */}
      <div style={{ marginBottom:14 }}>
        <div className="small-caps" style={{ fontSize:10, color:'var(--ink-3)', marginBottom:6 }}>Total session length</div>
        <div style={{ display:'flex', flexWrap:'wrap', gap:4 }}>
          {VAI_MODES.map(m => (
            <button
              key={m.id}
              onClick={() => setMode(m.id)}
              style={{
                padding:'6px 12px', borderRadius:2,
                background: mode === m.id ? 'var(--burgundy)' : 'transparent',
                color: mode === m.id ? 'var(--paper)' : 'var(--ink)',
                border:'1px solid var(--burgundy)',
                fontFamily:"'EB Garamond', serif", fontSize:13,
              }}
            >{m.label} <span style={{ opacity:0.7, fontSize:11, marginLeft:4 }}>· {m.totalMin >= 60 ? `${Math.floor(m.totalMin/60)}h` : `${m.totalMin}m`}</span></button>
          ))}
        </div>
        <p style={{ fontSize:12, color:'var(--ink-3)', fontStyle:'italic', marginTop:6, lineHeight:1.5 }}>{profile.desc}</p>
      </div>

      {/* Overall progress bar */}
      <Card style={{ padding:14, marginBottom:14, background:'var(--paper-3)' }}>
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'baseline', marginBottom:6 }}>
          <span className="font-display" style={{ fontStyle:'italic', fontSize:14 }}>Session progress</span>
          <span className="font-mono num" style={{ fontSize:11, color:'var(--ink-3)' }}>
            block {activeIdx + 1} / {scaledBlocks.length} · {overallPct}% complete
          </span>
        </div>
        <div style={{ height:6, background:'var(--paper)', borderRadius:3, overflow:'hidden', border:'1px solid var(--rule)' }}>
          <div style={{ height:'100%', width:`${overallPct}%`, background:'var(--burgundy)', transition:'width 0.5s' }} />
        </div>
      </Card>

      {/* Active block — large timer card */}
      {currentBlock && (
        <Card style={{ padding:20, marginBottom:14, borderColor:'var(--burgundy)', borderWidth:2 }}>
          <div style={{ display:'flex', alignItems:'flex-start', justifyContent:'space-between', gap:10, marginBottom:10 }}>
            <div>
              <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:4 }}>
                <span className="font-mono" style={{ fontSize:9, letterSpacing:'0.25em', textTransform:'uppercase', color:'var(--burgundy)' }}>Block {activeIdx + 1}</span>
                <Pill tone={catColor(currentBlock.cat)} size="xs">{currentBlock.cat}</Pill>
              </div>
              <h3 className="font-display" style={{ fontSize:24, fontStyle:'italic', lineHeight:1.1 }}>{currentBlock.label}</h3>
            </div>
          </div>

          {/* Big timer */}
          <div style={{ textAlign:'center', padding:'12px 0' }}>
            <div className="font-mono num" style={{ fontSize:64, fontWeight:600, lineHeight:1, color:'var(--ink)' }}>
              {formatTime(secondsLeft)}
            </div>
            <div className="font-mono" style={{ fontSize:10, color:'var(--ink-3)', letterSpacing:'0.2em', textTransform:'uppercase', marginTop:4 }}>
              of {currentBlock.scaledMin} minute{currentBlock.scaledMin > 1 ? 's' : ''}
            </div>
          </div>

          {/* Block progress bar */}
          <div style={{ height:5, background:'var(--paper-3)', borderRadius:3, overflow:'hidden', border:'1px solid var(--rule)', marginTop:6, marginBottom:14 }}>
            <div style={{ height:'100%', width:`${blockPct}%`, background:'var(--gold)', transition:'width 1s linear' }} />
          </div>

          {/* Controls */}
          <div style={{ display:'flex', gap:6, marginBottom:14 }}>
            <button onClick={() => setRunning(r => !r)} style={{
              flex:2, padding:'12px',
              background: running ? 'var(--burgundy)' : 'var(--sage)',
              color:'var(--paper)',
              border:`1px solid ${running ? 'var(--burgundy)' : 'var(--sage)'}`,
              borderRadius:2,
              fontFamily:"'JetBrains Mono', monospace",
              fontSize:11, letterSpacing:'0.2em', textTransform:'uppercase',
            }}>{running ? '⏸ Pause' : '▶ Start'}</button>
            <button onClick={() => { setSecondsLeft(currentBlock.scaledSec); setRunning(false); }} style={{
              flex:1, padding:'12px',
              background:'transparent', color:'var(--ink)',
              border:'1px solid var(--ink)', borderRadius:2,
              fontFamily:"'JetBrains Mono', monospace",
              fontSize:11, letterSpacing:'0.2em', textTransform:'uppercase',
            }}>↻ Reset</button>
            <button onClick={() => activeIdx + 1 < scaledBlocks.length && goToBlock(activeIdx + 1)} disabled={activeIdx + 1 >= scaledBlocks.length} style={{
              flex:1, padding:'12px',
              background:'transparent', color: activeIdx + 1 >= scaledBlocks.length ? 'var(--ink-4)' : 'var(--ink)',
              border:`1px solid ${activeIdx + 1 >= scaledBlocks.length ? 'var(--rule)' : 'var(--ink)'}`, borderRadius:2,
              fontFamily:"'JetBrains Mono', monospace",
              fontSize:11, letterSpacing:'0.2em', textTransform:'uppercase',
            }}>Next →</button>
          </div>

          {/* Tasks for this block */}
          <div style={{ marginBottom:14 }}>
            <div className="small-caps" style={{ fontSize:9, color:'var(--ink-3)', marginBottom:6 }}>Suggested breakdown</div>
            <ol style={{ paddingLeft:20, margin:0 }}>
              {currentBlock.tasks.map((task, i) => (
                <li key={i} style={{ fontSize:13.5, color:'var(--ink-2)', lineHeight:1.55, marginBottom:4 }}>{task}</li>
              ))}
            </ol>
          </div>

          {/* Source-figure workspace / single module playalong */}
          <VaiBlockSourceWorkspace key={currentBlock.id} block={currentBlock} audio={audio} />

          {/* Note */}
          <div style={{ padding:10, background:'var(--paper-3)', border:'1px solid var(--rule)', borderRadius:2, marginBottom:14, marginTop:14 }}>
            <p style={{ fontSize:13, color:'var(--ink-2)', fontStyle:'italic', lineHeight:1.5 }}>{currentBlock.notes}</p>
          </div>

          {/* Jump to relevant tab */}
          {currentBlock.jumpTo && (
            <button onClick={jumpToTab} style={{
              width:'100%', padding:'10px',
              background:'var(--gold)', color:'var(--paper)',
              border:'1px solid var(--gold-soft)', borderRadius:2,
              fontFamily:"'JetBrains Mono', monospace",
              fontSize:11, letterSpacing:'0.18em', textTransform:'uppercase',
            }}>→ Open {currentBlock.jumpTo} tab to go deeper</button>
          )}
          {!currentBlock.jumpTo && (
            <p style={{ fontSize:12, color:'var(--ink-3)', fontStyle:'italic', textAlign:'center', padding:'8px 0' }}>
              External material needed for this block — see the note above.
            </p>
          )}
        </Card>
      )}

      {/* All blocks list */}
      <div className="small-caps" style={{ fontSize:10, color:'var(--ink-3)', marginBottom:8, marginTop:24 }}>All blocks in this session</div>
      <div style={{ display:'flex', flexDirection:'column', gap:6 }}>
        {scaledBlocks.map((b, i) => {
          const isActive = i === activeIdx;
          const isComplete = i < activeIdx;
          return (
            <button
              key={b.id}
              onClick={() => goToBlock(i)}
              style={{
                padding:'10px 12px', textAlign:'left',
                background: isActive ? 'var(--paper-3)' : 'var(--paper-2)',
                border:`1px solid ${isActive ? 'var(--burgundy)' : 'var(--rule)'}`,
                borderRadius:2,
                display:'flex', alignItems:'center', justifyContent:'space-between',
                gap:10,
                opacity: isComplete ? 0.55 : 1,
              }}
            >
              <div style={{ display:'flex', alignItems:'center', gap:10, flex:1, minWidth:0 }}>
                <span className="font-mono num" style={{
                  fontSize:11, color: isActive ? 'var(--burgundy)' : 'var(--ink-3)',
                  width:24, textAlign:'right', flexShrink:0,
                  fontWeight: isActive ? 600 : 400,
                }}>{i + 1}.</span>
                <div style={{ flex:1, minWidth:0 }}>
                  <div className="font-display" style={{ fontSize:15, fontWeight: isActive ? 600 : 400, color:'var(--ink)' }}>
                    {isComplete && '✓ '}{b.label}
                  </div>
                  <div style={{ display:'flex', gap:6, marginTop:2, alignItems:'center' }}>
                    <span className="font-mono" style={{ fontSize:9, color:'var(--ink-4)', letterSpacing:'0.1em', textTransform:'uppercase' }}>{b.cat}</span>
                  </div>
                </div>
              </div>
              <span className="font-mono num" style={{ fontSize:12, color: isActive ? 'var(--burgundy)' : 'var(--ink-3)', flexShrink:0, fontWeight: isActive ? 600 : 400 }}>
                {b.scaledMin >= 60 ? `${Math.floor(b.scaledMin/60)}h ${b.scaledMin % 60}m` : `${b.scaledMin}m`}
              </span>
            </button>
          );
        })}
      </div>

      <div className="ornament" />

      <Card style={{ padding:18, background:'var(--paper-3)' }}>
        <div className="small-caps" style={{ fontSize:10, color:'var(--burgundy)', marginBottom:6 }}>On Vai's discipline</div>
        <h4 className="font-display" style={{ fontSize:18, fontStyle:'italic', marginBottom:8 }}>"Have a clear PURPOSE in mind."</h4>
        <p style={{ fontSize:14, color:'var(--ink-2)', lineHeight:1.6 }}>
          Vai's own rules for the workout: have a clear purpose strong enough to overcome obstacles; account for every minute (don't drift); maintain physical health (sleep, water, food, exercise). Run the full 10-hour version only when you genuinely have the day. The 1-hour Quick version, done DAILY for a year, will produce more results than ten hours done sporadically. Consistency over intensity. Vai practiced 10 hours when he had 10 hours — the rest of the time, he practiced what he had.
        </p>
      </Card>
    </div>
  );
}

const PHRASING_FOUNDATIONS = [{"name":"Space","rule":"Leave rests after strong ideas. Silence lets the listener understand the sentence.","drill":"Play a two-beat phrase, then force two beats of silence."},{"name":"Motif","rule":"Repeat a small idea, then change one variable: rhythm, final note, contour, or articulation.","drill":"Create a 3-note motif and answer it five different ways."},{"name":"Target tones","rule":"Land on chord tones on strong beats. Tension notes work when they resolve deliberately.","drill":"Over each chord, pre-select one target note before improvising."},{"name":"Articulation","rule":"Bends, slides, hammer-ons, pull-offs, rakes, mutes, and vibrato are grammar, not decoration.","drill":"Play the same five notes with five different articulation plans."},{"name":"Dynamics","rule":"A phrase with no dynamic contour sounds typed, not spoken.","drill":"Crescendo through a phrase, then repeat it with the opposite shape."},{"name":"Time feel","rule":"Ahead, behind, swung, straight, rushed, and relaxed are different meanings.","drill":"Play the same phrase ahead of the beat, on the beat, then behind it."},{"name":"Register","rule":"Changing octave or position changes emotional weight even if the notes are identical.","drill":"Move one phrase through three positions without changing its rhythm."},{"name":"Resolution","rule":"Advanced players control when the ear gets relief.","drill":"End once on the root, once on the 3rd, once on the 6th/13th, once unresolved."}];

const stretchPhraseSteps = (steps) => {
  if (!steps || steps.length >= 10) return steps || [];
  const answer = steps.slice(1, -1).map((st, i) => ({
    ...st,
    ms: Math.max(90, Math.round((st.ms || 180) * (i % 2 ? 0.9 : 1.08))),
    tech: st.tech ? `${st.tech} variation` : 'variation',
  }));
  return [...steps, ...answer].slice(0, 14);
};

const PHRASE_STRING_NAMES = { 1:'e', 2:'B', 3:'G', 4:'D', 5:'A', 6:'E' };
const phraseMidi = step => TUNING[6 - step.s] + step.f;
const phraseKey = step => `${6 - step.s}:${step.f}`;
const phraseMaxFret = steps => Math.max(12, ...steps.map(s => s.f || 0)) + 2;
const phraseFamilies = ['All', ...Array.from(new Set(PHRASING_STYLES.map(s => s.family)))];

function phrasePositionsMap(steps, activeIdx=-1) {
  const map = new Map();
  steps.forEach((st, i) => {
    const key = phraseKey(st);
    const active = i === activeIdx;
    map.set(key, {
      label: active ? '▶' : (st.label || String(i + 1)),
      bg: active ? 'var(--gold)' : (i % 3 === 0 ? 'var(--burgundy)' : i % 3 === 1 ? 'var(--sage)' : 'var(--slate)'),
    });
  });
  return map;
}

function makePhraseTab(steps) {
  const rows = { 1:[], 2:[], 3:[], 4:[], 5:[], 6:[] };
  steps.forEach(st => {
    const token = st.tab || String(st.f);
    [1,2,3,4,5,6].forEach(s => rows[s].push(s === st.s ? token : '-'.repeat(token.length)));
  });
  return [1,2,3,4,5,6].map(s => `${PHRASE_STRING_NAMES[s]}|-${rows[s].join('-')}-|`).join('\n');
}

  const selected = PHRASING_STYLES.find(s => s.id === selectedId) || filtered[0] || PHRASING_STYLES[0];

    if (!audio || !study?.steps?.length) return;

    setPlayingId(study.id);

    const tempoScale = 90 / Math.max(30, Math.min(240, Number(phraseBpm) || 90));
    for (let i = 0; i < steps.length; i++) {

      await new Promise(r => setTimeout(r, ms));
    }
    if (!token.cancelled) {
      setPlayingId(null);
      setActiveIdx(-1);
    }

class ErrorBoundary extends React.Component {
  constructor(props) {
    super(props);
    this.state = { hasError:false, message:'' };
  }
  static getDerivedStateFromError(error) {
    return { hasError:true, message: error && error.message ? error.message : 'Unknown render error' };
  }
  componentDidUpdate(prevProps) {
    if (prevProps.resetKey !== this.props.resetKey && this.state.hasError) {
      this.setState({ hasError:false, message:'' });
    }
  }
  render() {
    if (!this.state.hasError) return this.props.children;
    return (
      <Card style={{ padding:20, borderColor:'var(--burgundy)' }}>
        <div className="small-caps" style={{ fontSize:10, color:'var(--burgundy)', marginBottom:6 }}>Recovery</div>
        <h3 className="font-display" style={{ fontSize:22, fontStyle:'italic', marginBottom:8 }}>This tab hit a render error.</h3>
        <p style={{ fontSize:13, color:'var(--ink-2)', lineHeight:1.6, marginBottom:12 }}>Switch tabs or reload. The rest of the app is still available.</p>
        <pre style={{ whiteSpace:'pre-wrap', fontSize:11, background:'var(--paper-3)', border:'1px solid var(--rule)', padding:10, overflowX:'auto' }}>{this.state.message}</pre>
      </Card>
    );
  }
}
