function ChordsTab({ root, setRoot, audio, favs, toggleFav }) {
  const [activeFamily, setActiveFamily] = useState('Triads');
  const [activeChordKey, setActiveChordKey] = useState('maj');
  const [inversion, setInversion] = useState(0); // 0 = root pos, 1 = 1st inv, etc.
  const useFlats = useFlatsFor(root);
  const rootPc = pcOf(root);

  const chord = CHORDS[activeChordKey];

  // Reset inversion when chord type changes
  useEffect(() => { setInversion(0); }, [activeChordKey]);

  // Number of available inversions: 1 root pos + (n-1) inversions where n = number of chord tones
  const numInversions = chord.ints.length;
  // Cap displayed inversions at 4 (root, 1st, 2nd, 3rd) for UI sanity
  const maxInversions = Math.min(numInversions, 4);

  // Build inverted MIDI: rotate chord tones, putting the lowest n tones up an octave
  const midis = useMemo(() => {
    const base = buildChord(root, chord.ints, 4);
    if (inversion === 0) return base;
    // Move the bottom `inversion` notes up an octave each
    const inverted = [...base];
    for (let i = 0; i < inversion && i < inverted.length; i++) {
      inverted[i] = inverted[i] + 12;
    }
    // Sort ascending
    inverted.sort((a, b) => a - b);
    return inverted;
  }, [root, chord.ints, inversion]);

  // Tones in inversion order (which tone is on the bottom?)
  const invertedTones = useMemo(() => {
    if (inversion === 0) return chord.tones;
    const rotated = [...chord.tones];
    const moved = rotated.splice(0, inversion);
    return [...rotated, ...moved];
  }, [chord.tones, inversion]);

  const noteNames = midis.map(m => display(m % 12, useFlats));
  const symbol = `${display(rootPc, useFlats)}${chord.sym}`;
  // Slash notation for inversions: e.g. C/E (1st inv = 3rd in bass)
  const bassPc = midis.length ? midis[0] % 12 : rootPc;
  const bassNote = display(bassPc, useFlats);
  const invSymbol = inversion === 0 ? symbol : `${symbol}/${bassNote}`;

  const guitarShape = getGuitarShape(activeChordKey, rootPc, inversion);
  const rootShape = getGuitarShape(activeChordKey, rootPc, 0);
  const showingRootFallback = inversion > 0 && !guitarShape && rootShape;

  const familyChords = useMemo(() => {
    return Object.entries(CHORDS).filter(([k, c]) => c.family === activeFamily);
  }, [activeFamily]);

  // Highlights for fretboard from chord intervals — bass note overrides as bright burgundy
  const fretHighlights = useMemo(() => {
    const m = new Map();
    chord.ints.forEach((interval, i) => {
      const pc = ((rootPc + interval) % 12 + 12) % 12;
      const tone = chord.tones[i] || '';
      m.set(pc, { label: tone, bg: i === 0 ? 'var(--burgundy)' : '#8a6d4a' });
    });
    return m;
  }, [chord, rootPc]);

  const playBlock = () => audio.playChord(midis, '2n');
  const playArp = () => audio.arpeggiate(midis, 0.18);
  const playGuitarShape = () => {
    if (!guitarShape) return;
    const notes = guitarShape.map((f, sIdx) => f === -1 ? null : TUNING[sIdx] + f).filter(x => x !== null);
    audio.arpeggiate(notes, 0.04, '2n');
  };

  return (
    <div className="tab-anim">
      <SectionHeader
        chapter="Chapter III"
        title="Chord Encyclopedia"
        sub="From triads to polychords — the harmonic vocabulary, organized."
      />

      <p style={{ color:'var(--ink-2)', maxWidth:560, marginBottom:18, lineHeight:1.65 }}>
        Stack notes in thirds and you generate every conventional chord in tonal music — triads, sevenths, ninths, all the way to thirteenths. Stack them in fourths and you get the modal jazz vocabulary. Stack two unrelated triads and you get polychords. Below is the complete library, with construction theory, common voicings, and audio for each.
      </p>

      {/* Root selector */}
      <div style={{ marginBottom:14 }}>
        <div className="small-caps" style={{ fontSize:10, color:'var(--ink-3)', marginBottom:6 }}>Root</div>
        <RootSelector root={root} setRoot={setRoot} useFlats={useFlats} />
      </div>

      {/* Family tabs */}
      <div style={{ marginBottom:14 }}>
        <div className="small-caps" style={{ fontSize:10, color:'var(--ink-3)', marginBottom:6 }}>Family</div>
        <div className="scroll-x" style={{ paddingBottom:4 }}>
          <div style={{ display:'flex', gap:4, minWidth:'min-content' }}>
            {CHORD_FAMILIES.map(fam => (
              <button
                key={fam}
                onClick={() => {
                  setActiveFamily(fam);
                  const first = Object.entries(CHORDS).find(([k,c]) => c.family === fam);
                  if (first) setActiveChordKey(first[0]);
                }}
                style={{
                  padding:'5px 10px', borderRadius:2, whiteSpace:'nowrap',
                  background: activeFamily === fam ? 'var(--ink)' : 'transparent',
                  color: activeFamily === fam ? 'var(--paper)' : 'var(--ink)',
                  border:'1px solid var(--ink)',
                  fontFamily:"'EB Garamond', serif", fontSize:13,
                }}
              >{fam}</button>
            ))}
          </div>
        </div>
      </div>

      {/* Chord chips within family */}
      <div style={{ marginBottom:14 }}>
        <div style={{ display:'flex', flexWrap:'wrap', gap:4 }}>

        </div>

      {/* Chord display */}
      <Card style={{ padding:20, marginBottom:14 }}>

          </div>
          <div style={{ display:'flex', flexDirection:'column', gap:6, alignItems:'flex-end', flexShrink:0 }}>

            <button onClick={playArp} style={btnInline('var(--gold)')}>Arp ↗</button>
            <FavStar
              filled={favs.has('chords', `${root}:${activeChordKey}`)}
              onClick={() => toggleFav('chords', `${root}:${activeChordKey}`)}
              size={16}
            />
          </div>
        </div>

        {/* Inversion picker */}
        {numInversions >= 3 && (
          <div style={{ marginTop:12, paddingTop:12, borderTop:'1px solid var(--rule-soft)' }}>
            <div className="small-caps" style={{ fontSize:9, color:'var(--ink-3)', marginBottom:6 }}>Inversion</div>
            <div style={{ display:'flex', gap:0, border:'1px solid var(--ink)', borderRadius:2, overflow:'hidden', flexWrap:'wrap' }}>
              {Array.from({ length: maxInversions }, (_, i) => {
                const labels = ['Root', '1st', '2nd', '3rd'];
                const subs = ['R in bass', '3 in bass', '5 in bass', '7 in bass'];
                return (
                  <button
                    key={i}
                    onClick={() => setInversion(i)}
                    style={{
                      flex:'1 1 70px',
                      padding:'8px 10px',
                      fontFamily:"'JetBrains Mono', monospace",
                      fontSize:10, letterSpacing:'0.1em', textTransform:'uppercase',
                      background: inversion === i ? 'var(--ink)' : 'transparent',

// Compute which scales contain all the notes of a given chord (or have minimum overlap)
function findCompatibleScales(rootPc, chordIntervals) {
  const chordPcs = new Set(chordIntervals.map(i => (rootPc + i) % 12));
  const matches = [];
  Object.entries(SCALES).forEach(([k, s]) => {
    // Try each possible root for the scale and check if it contains all chord notes
    for (let scaleRoot = 0; scaleRoot < 12; scaleRoot++) {
      const scalePcs = new Set(s.steps.map(st => (scaleRoot + st) % 12));
      let containsAll = true;
      chordPcs.forEach(pc => { if (!scalePcs.has(pc)) containsAll = false; });
      if (containsAll) {
        matches.push({ scaleKey: k, scaleRoot, name: s.name, family: s.family });
      }
    }
  });
  // Prioritize scales rooted on the chord root, then close relatives
  matches.sort((a, b) => {
    const aPriority = a.scaleRoot === rootPc ? 0 : 1;
    const bPriority = b.scaleRoot === rootPc ? 0 : 1;
    return aPriority - bPriority;
  });
  return matches;
}

// Compute which chords are diatonic to a given scale (triads + 7ths)
function findDiatonicChords(scaleRoot, scaleKey) {
  const scale = SCALES[scaleKey];
  if (!scale || scale.steps.length < 7) return null; // Need 7 notes for diatonic chord stacks

  const scalePcs = scale.steps.map(s => (scaleRoot + s) % 12);
  const chords = [];

  for (let degree = 0; degree < scalePcs.length; degree++) {
    const chordPcs = [
      scalePcs[degree],
      scalePcs[(degree + 2) % scalePcs.length],
      scalePcs[(degree + 4) % scalePcs.length],
      scalePcs[(degree + 6) % scalePcs.length],
    ];
    // Compute intervals from root of this chord
    const ints = chordPcs.map(pc => {
      let i = (pc - chordPcs[0] + 12) % 12;
      return i;
    });
    // Identify chord quality from intervals
    const i3 = ints[1], i5 = ints[2], i7 = ints[3];
    let quality = '?';
    if (i3 === 4 && i5 === 7 && i7 === 11) quality = 'maj7';
    else if (i3 === 4 && i5 === 7 && i7 === 10) quality = '7';
    else if (i3 === 3 && i5 === 7 && i7 === 10) quality = 'm7';
    else if (i3 === 3 && i5 === 6 && i7 === 10) quality = 'ø7';
    else if (i3 === 3 && i5 === 6 && i7 === 9) quality = '°7';
    else if (i3 === 3 && i5 === 7 && i7 === 11) quality = 'm(maj7)';
    else if (i3 === 4 && i5 === 8 && i7 === 11) quality = '+maj7';
    else if (i3 === 4 && i5 === 8 && i7 === 10) quality = '+7';

    const romanRoman = ['I','II','III','IV','V','VI','VII'];
    let roman = romanRoman[degree];
    if (quality.includes('m') && !quality.includes('maj')) roman = roman.toLowerCase();
    if (quality.includes('ø')) roman = roman.toLowerCase() + 'ø';
    if (quality.includes('°')) roman = roman.toLowerCase() + '°';
    if (quality === '+maj7' || quality === '+7') roman = roman + '+';

    chords.push({
      degreeNum: degree + 1,
      roman,
      rootPc: chordPcs[0],
      quality,
      midis: chordPcs.map(pc => 48 + pc), // C4-area
    });
  }
  return chords;
}

          The order in which sharps and flats appear in a key signature is fixed — and it follows the circle.
        </p>
        <div style={{ background:'var(--paper)', border:'1px solid var(--rule)', padding:10, borderRadius:2, marginBottom:10 }}>
          <div className="font-mono" style={{ fontSize:11, color:'var(--burgundy)', marginBottom:4, letterSpacing:'0.1em' }}>SHARPS appear in this order:</div>
          <div className="font-display" style={{ fontSize:16, fontWeight:600 }}>F♯ — C♯ — G♯ — D♯ — A♯ — E♯ — B♯</div>
          <div style={{ fontSize:12, color:'var(--ink-3)', fontStyle:'italic', marginTop:4 }}>"Father Charles Goes Down And Ends Battle"</div>
        </div>
        <div style={{ background:'var(--paper)', border:'1px solid var(--rule)', padding:10, borderRadius:2, marginBottom:10 }}>
          <div className="font-mono" style={{ fontSize:11, color:'var(--burgundy)', marginBottom:4, letterSpacing:'0.1em' }}>FLATS appear in reverse order:</div>
          <div className="font-display" style={{ fontSize:16, fontWeight:600 }}>B♭ — E♭ — A♭ — D♭ — G♭ — C♭ — F♭</div>
          <div style={{ fontSize:12, color:'var(--ink-3)', fontStyle:'italic', marginTop:4 }}>"Battle Ends And Down Goes Charles\' Father"</div>
        </div>
        <p style={{ fontSize:13, color:'var(--ink-2)', lineHeight:1.6, marginBottom:8 }}>
          To find the major key from a sharp signature: the <strong>last sharp is the 7th</strong> of the key. So three sharps (F♯, C♯, G♯) — last sharp is G♯ — the key is one half-step up: A major.
        </p>
        <p style={{ fontSize:13, color:'var(--ink-2)', lineHeight:1.6 }}>
          To find the major key from a flat signature: the <strong>second-to-last flat IS the key name</strong>. So three flats (B♭, E♭, A♭) — second-to-last is E♭ — the key is E♭ major.
        </p>
      </Card>

      {/* Guitarist applications */}
      <Card style={{ padding:18, marginBottom:14, background:'var(--paper-3)' }}>
        <div className="small-caps" style={{ fontSize:10, color:'var(--burgundy)', marginBottom:6 }}>§ 5 — For guitarists specifically</div>
        <h4 className="font-display" style={{ fontSize:18, fontStyle:'italic', marginBottom:8 }}>Why this matters at the fretboard</h4>
        <ul style={{ paddingLeft:20, margin:0 }}>
          <li style={{ fontSize:13, color:'var(--ink-2)', lineHeight:1.6, marginBottom:6 }}>
            <strong>The neck is laid out in fourths.</strong> Going from string 6 to string 1, you ascend mostly by perfect fourths (E→A→D→G is three fourths; G→B is the only third; B→e is a fourth). Standard tuning is essentially a slice of the circle of fifths. This is why barre chord shapes work the way they do.
          </li>
          <li style={{ fontSize:13, color:'var(--ink-2)', lineHeight:1.6, marginBottom:6 }}>
            <strong>Practice scales counter-clockwise.</strong> A standard practice routine: play C major in 5 CAGED positions, then F (one step counter-clockwise), then B♭, then E♭... cycling through all 12 keys. You\'ll hit each key after roughly 60 seconds and find that fingerings transfer cleanly because adjacent keys share six of seven notes.
          </li>
          <li style={{ fontSize:13, color:'var(--ink-2)', lineHeight:1.6, marginBottom:6 }}>
            <strong>Find any chord\'s "home keys".</strong> If a song has a Bm7 in it, the circle tells you which keys it likely belongs to — Bm7 is the ii of A major, the iii of G major, the vi of D major. The chord identifies its possible parent keys instantly.
          </li>
          <li style={{ fontSize:13, color:'var(--ink-2)', lineHeight:1.6 }}>
            <strong>Tritone substitutions are circle opposites.</strong> The chord directly across the circle from any dominant 7 is its tritone substitute. G7 is at one position; D♭7 (its tritone sub) is exactly opposite. Every dominant has a "twin" 6 positions away that can replace it.
          </li>
        </ul>
      </Card>

      <Card style={{ padding:18 }}>
        <div className="small-caps" style={{ fontSize:10, color:'var(--burgundy)', marginBottom:6 }}>§ 6 — A daily exercise</div>
        <h4 className="font-display" style={{ fontSize:18, fontStyle:'italic', marginBottom:8 }}>The circle drill</h4>
        <p style={{ fontSize:14, color:'var(--ink-2)', lineHeight:1.65 }}>
          Every day, pick a starting key. Play its I-IV-V chords. Then move one step counter-clockwise (cycle of fourths) and do the same in the new key. Continue around the entire circle until you\'re back where you started. It takes 2–3 minutes once you\'re fluent. After a month, every key feels like home — not as a memorization feat, but because you\'ve walked the circle so many times that it\'s simply familiar terrain.
        </p>
      </Card>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════
//  TAB: DECODER — chord symbol parser & syllabus
// ═══════════════════════════════════════════════════════════════════════
//  Inspired by Brad Harrison's "Complete Guide to Chords" — chords
//  describe themselves clearly if you know how to read the symbol.

// Parse a chord symbol like "Cmaj7", "F#m7b5", "Bbmaj9#11", "C/E", "G7sus4b9"
// into structured parts. Returns null if can't parse.
function parseChordSymbol(input) {
  if (!input || typeof input !== 'string') return null;
  const s = input.trim();
  if (!s) return null;

  // 1. Root note (C, C#, Db, Cb, B#, etc.)
  const rootMatch = s.match(/^([A-Ga-g])([#b♯♭]?)/);
  if (!rootMatch) return null;
  const rootLetter = rootMatch[1].toUpperCase();
  let rootAcc = rootMatch[2] || '';
  rootAcc = rootAcc === '♯' ? '#' : rootAcc === '♭' ? 'b' : rootAcc;
  const rootName = rootLetter + rootAcc;
  const rootPc = pcOf(rootName);
  if (rootPc < 0) return null;

  let rest = s.slice(rootMatch[0].length).trim();

  // 2. Slash bass — strip and remember.
  let bassNote = null;
  const slashIdx = rest.indexOf('/');
  if (slashIdx >= 0 && !/^6\s*\/\s*9/i.test(rest)) {
    const bassStr = rest.slice(slashIdx + 1).trim();
    rest = rest.slice(0, slashIdx).trim();
    const bassMatch = bassStr.match(/^([A-Ga-g])([#b♯♭]?)/);
    if (bassMatch) {
      let ba = bassMatch[2] || '';
      ba = ba === '♯' ? '#' : ba === '♭' ? 'b' : ba;
      bassNote = bassMatch[1].toUpperCase() + ba;
    }
  }

  // Normalize spelling without destroying case-sensitive M7.
  rest = rest
    .replace(/♯/g, '#')
    .replace(/♭/g, 'b')
    .replace(/Δ/g, 'maj')
    .replace(/°/g, 'dim')
    .replace(/ø/g, 'm7b5')
    .replace(/\+/g, 'aug')
    .replace(/\s+/g, '');

  const lower = rest.toLowerCase();
  const compact = lower.replace(/[()]/g, '');
  const tokens = [];
  const intervals = new Set([0]);
  const addInterval = i => intervals.add(i);
  const removeThirds = () => { intervals.delete(3); intervals.delete(4); };
  const removeFifth = () => { intervals.delete(7); intervals.delete(8); intervals.delete(6); };
  const has = re => re.test(rest);
  const hasLower = re => re.test(lower);
  const hasPlain = n => {
    const idx = compact.indexOf(String(n));
    if (idx < 0) return false;
    const before = idx === 0 ? '' : compact[idx - 1];
    return before !== 'b' && before !== '#';
  };

  const isPower = /^5($|[^0-9])/.test(compact);
  const isHalfDim = /m7b5/.test(compact);
  const isFullyDim7 = /dim7/.test(compact);
  const isSus2Sus4 = /sus2sus4|sus2\+?sus4/.test(compact);
  const isSus2 = /sus2/.test(compact) && !isSus2Sus4;
  const isSus4 = /sus4/.test(compact) || (/sus/.test(compact) && !isSus2 && !isSus2Sus4);

  let quality = 'major';
  let qDescription = 'Major triad (R, 3, 5)';

  if (isPower) {
    quality = 'power';
    intervals.clear(); intervals.add(0); intervals.add(7);
    qDescription = 'Power chord (R, 5) — no 3rd';
  } else if (isHalfDim) {
    quality = 'half-diminished';
    intervals.add(3); intervals.add(6); intervals.add(10);
    qDescription = 'Half-diminished 7 (R, ♭3, ♭5, ♭7)';
  } else if (isFullyDim7 || /^dim/.test(compact)) {
    quality = isFullyDim7 ? 'fully diminished' : 'diminished';
    intervals.add(3); intervals.add(6);
    if (isFullyDim7) intervals.add(9);
    qDescription = isFullyDim7 ? 'Fully diminished 7 (R, ♭3, ♭5, 𝄫7)' : 'Diminished triad (R, ♭3, ♭5)';
  } else if (/^aug/.test(compact)) {
    quality = 'augmented';
    intervals.add(4); intervals.add(8);
    qDescription = 'Augmented triad (R, 3, ♯5)';
  } else if (isSus2Sus4 || isSus2 || isSus4) {
    quality = isSus2Sus4 ? 'sus2sus4' : isSus2 ? 'sus2' : 'sus4';
    intervals.add(7);
    removeThirds();
    if (isSus2Sus4 || isSus2) intervals.add(2);
    if (isSus2Sus4 || isSus4) intervals.add(5);
    qDescription = isSus2Sus4 ? 'Suspended 2 and 4 (R, 2, 4, 5)' : isSus2 ? 'Suspended 2nd (R, 2, 5)' : 'Suspended 4th (R, 4, 5)';
  } else if (/^min/.test(compact) || /^m(?!aj)/.test(compact) || /^-/.test(compact)) {
    quality = 'minor';
    intervals.add(3); intervals.add(7);
    qDescription = 'Minor triad (R, ♭3, 5)';
  } else {
    intervals.add(4); intervals.add(7);
  }

  tokens.push({ type:'root', text: rootName, label:'Root: ' + formatNoteName(rootName) });
  tokens.push({ type:'quality', text: quality, label: qDescription });

  const majMatch = lower.match(/maj(7|9|11|13)/) || rest.match(/M(7|9|11|13)/);
  const hasMinorMaj7 = /\(maj7\)|mmaj7|minmaj7/.test(lower);
  const majExtNum = majMatch ? Number(majMatch[1]) : (hasMinorMaj7 ? 7 : null);

  if (majExtNum) {
    addInterval(11);
    tokens.push({ type:'maj7', label:'Major 7 family — use natural 7, not ♭7' });
    if (majExtNum >= 9) { addInterval(14); tokens.push({ type:'maj9', label:'Major 9 extension added' }); }
    if (majExtNum === 11) { addInterval(17); tokens.push({ type:'maj11', label:'11th extension added' }); }
    if (majExtNum >= 13) { addInterval(14); addInterval(21); tokens.push({ type:'maj13', label:'13th extension added; 11 is normally omitted unless written' }); }
  }

  const hasAdd = /add(9|11|13)/.test(compact);
  const hasSixNine = /6\/9|69/.test(compact);
  const ext13 = !hasAdd && !hasSixNine && !majExtNum && hasPlain(13);
  const ext11 = !hasAdd && !hasSixNine && !majExtNum && hasPlain(11);
  const ext9  = !hasAdd && !hasSixNine && !majExtNum && hasPlain(9);
  const explicitSeven = !majExtNum && !isFullyDim7 && (/^7/.test(compact) || /^m7/.test(compact) || /[^a-z]7/.test(compact));
  const alteredDominant = /alt|b9|#9|b13|#11|b5|#5/.test(compact) && !majExtNum;
  const dominantFamily = explicitSeven || ext9 || ext11 || ext13 || alteredDominant;

  if (dominantFamily && !isPower && !isFullyDim7 && !isHalfDim) {
    addInterval(10);
    tokens.push({ type:'b7', label:'Dominant/minor 7 family — flat 7 added' });
  }

  if (/6(?!\/9)/.test(compact) && !/16/.test(compact)) {
    addInterval(9);
    tokens.push({ type:'6', label:'6th added — major 6' });
  }
  if (hasSixNine) {
    addInterval(9); addInterval(14);
    tokens.push({ type:'6/9', label:'6/9 chord — add 6 and 9 without implying a 7th' });
  }

  if (ext9) { addInterval(14); tokens.push({ type:'9', label:'9th extension added' }); }
  if (ext11) { addInterval(14); addInterval(17); tokens.push({ type:'11', label:'11th extension added; 9 is implied' }); }
  if (ext13) { addInterval(14); addInterval(21); tokens.push({ type:'13', label:'13th extension added; 9 is implied and 11 is usually omitted' }); }

  if (/add9/.test(compact)) { addInterval(14); tokens.push({ type:'add9', label:'Add 9 — adds 9 without implying a 7th' }); }
  if (/add11/.test(compact)) { addInterval(17); tokens.push({ type:'add11', label:'Add 11 — adds 11 without implying a 7th' }); }
  if (/add13/.test(compact)) { addInterval(21); tokens.push({ type:'add13', label:'Add 13 — adds 13 without implying a 7th' }); }

  if (/b9/.test(compact)) { addInterval(13); tokens.push({ type:'b9', label:'♭9 alteration added' }); }
  if (/#9/.test(compact)) { addInterval(15); tokens.push({ type:'#9', label:'♯9 alteration added' }); }
  if (/#11/.test(compact)) { addInterval(18); tokens.push({ type:'#11', label:'♯11 alteration added' }); }
  if (/b13/.test(compact)) { addInterval(20); tokens.push({ type:'b13', label:'♭13 alteration added' }); }
  if (/b5/.test(compact) && !isHalfDim) { removeFifth(); addInterval(6); tokens.push({ type:'b5', label:'♭5 — flatten the fifth' }); }
  if (/#5/.test(compact) || (/aug/.test(compact) && dominantFamily)) { removeFifth(); addInterval(8); tokens.push({ type:'#5', label:'♯5 — sharpen the fifth' }); }

  if (/alt/.test(compact)) {
    removeFifth();
    addInterval(10); addInterval(13); addInterval(15); addInterval(20);
    tokens.push({ type:'alt', label:'Altered dominant: ♭9, ♯9, and ♭13/♯5 colors' });
  }

  if (bassNote) {
    const bassPc = pcOf(bassNote);
    const useF = useFlatsFor(rootName);
    let role = 'foreign bass / slash color';
    const offset = mod12(bassPc - rootPc);
    if (offset === 4 || offset === 3) role = '1st inversion (3rd in bass)';
    else if (offset === 7 || offset === 6 || offset === 8) role = '2nd inversion or altered-5 bass';
    else if (offset === 10 || offset === 11 || offset === 9) role = '7th/6th in bass';
    else if (offset === 0) role = 'root in bass (redundant)';
    tokens.push({ type:'slash', label:'Slash bass: ' + formatNoteName(bassNote) + ' — ' + role });
  }

  return {
    rootName,
    rootPc,
    bassNote,
    bassPc: bassNote ? pcOf(bassNote) : null,
    quality,
    intervals: Array.from(intervals).sort((a, b) => a - b),
    tokens,
    raw: input,
  };
}

function ChordDecoderTab({ audio }) {
  const [input, setInput] = useState('Cmaj7');
  const [history, setHistory] = useState(['Cmaj7','Am7','G7sus4','D/F#','F#m7b5','Cmaj9#11','Bb13','C7alt','Em6/9','C5','Asus2sus4']);

  const parsed = useMemo(() => parseChordSymbol(input), [input]);

  const playChord = () => {
    if (!parsed) return;
    const useF = useFlatsFor(parsed.rootName);
    const baseMidi = 48 + parsed.rootPc;
    let midis = parsed.intervals.map(i => baseMidi + i);
    if (parsed.bassNote && parsed.bassPc !== null) {
      const bassMidi = 36 + parsed.bassPc;
      midis = [bassMidi, ...midis];
    }
    audio.playChord(midis, '2n');
  };

  const arpChord = () => {
    if (!parsed) return;
    const baseMidi = 48 + parsed.rootPc;
    let midis = parsed.intervals.map(i => baseMidi + i);
    if (parsed.bassNote && parsed.bassPc !== null) {
      const bassMidi = 36 + parsed.bassPc;
      midis = [bassMidi, ...midis];
    }
    audio.arpeggiate(midis, 0.18);
  };

  const presets = [
    { label:'Triads', items:['C','Cm','C°','C+','Csus2','Csus4','C5','Csus2sus4'] },
    { label:'7th chords', items:['Cmaj7','Cm7','C7','Cm7b5','C°7','Cm(maj7)','C+7','C7sus4'] },
    { label:'Sixth chords', items:['C6','Cm6','C6/9','Cm6/9'] },
    { label:'Add chords', items:['Cadd9','Cm(add9)','C(add11)','Cadd13'] },
    { label:'Extensions', items:['Cmaj9','Cm9','C9','C11','C13','Cmaj13','Cm11'] },
    { label:'Altered', items:['C7b9','C7#9','C7#11','C7b13','C7alt','Cmaj7#11','C7#9b13'] },
    { label:'Slash chords', items:['C/E','C/G','D/C','F/G','Bb/C','Am/C'] },
  ];

  const useFavoritesLocal = useFlatsFor(parsed?.rootName || 'C');

  return (
    <div className="tab-anim">
      <SectionHeader
        chapter="Chapter VII"
        title="Chord Decoder"
        sub="Type any chord symbol — the app explains every part of it."
      />

      <p style={{ color:'var(--ink-2)', maxWidth:560, marginBottom:18, lineHeight:1.65 }} className="drop-cap">
        Chord symbols are a language. Once you can read them, you can play almost anything written down. The trick is recognizing that chord symbols are SELF-DESCRIBING — they tell you, in order, the root, the quality, the 7th if any, the extensions, the alterations, and the bass note. Type any chord below and the app will show you exactly what each part means and which notes you'd play.
      </p>

      <div className="ornament" />

      {/* Input */}
      <Card style={{ padding:18, marginBottom:14 }}>
        <div className="small-caps" style={{ fontSize:10, color:'var(--ink-3)', marginBottom:6 }}>Type a chord symbol</div>
        <input
          type="text"
          value={input}
          onChange={e => setInput(e.target.value)}
          placeholder="e.g. Cmaj7#11"
          autoCapitalize="none"
          autoCorrect="off"
          spellCheck="false"
          style={{
            width:'100%',
            padding:'12px 14px',
            background:'var(--paper)',
            border:'1px solid var(--ink)',
            borderRadius:2,
            fontFamily:"'EB Garamond', serif",
            fontSize:24, fontWeight:600,
            color:'var(--ink)',
            outline:'none',
          }}
        />

        {/* Quick history chips */}
        <div style={{ marginTop:10 }}>
          <div className="font-mono" style={{ fontSize:9, letterSpacing:'0.2em', color:'var(--ink-4)', marginBottom:4 }}>— Try one —</div>
          <div style={{ display:'flex', flexWrap:'wrap', gap:4 }}>
            {history.map(h => (
              <button
                key={h}
                onClick={() => setInput(h)}
                style={{
                  padding:'4px 8px', borderRadius:2,
                  background:'transparent', color:'var(--ink-2)',
                  border:'1px solid var(--rule)',
                  fontFamily:"'EB Garamond', serif", fontSize:13,
                }}
              >{h}</button>
            ))}
          </div>
        </div>
      </Card>

      {/* Parse result */}
      {parsed ? (
        <>
          <Card style={{ padding:20, marginBottom:14 }}>
            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', gap:8, marginBottom:12 }}>
              <div style={{ flex:1, minWidth:0 }}>
                <div className="small-caps" style={{ fontSize:10, color:'var(--burgundy)', marginBottom:3 }}>Decoded</div>
                <h3 className="font-display" style={{ fontSize:36, lineHeight:1, fontWeight:600 }}>
                  {parsed.raw}
                </h3>
              </div>
              <div style={{ display:'flex', flexDirection:'column', gap:6 }}>
                <PlayBtn onClick={playChord} variant="burgundy" size="lg" title="Play block" />
                <button onClick={arpChord} style={btnInline('var(--gold)')}>Arp ↗</button>
              </div>
            </div>

            {/* Notes */}
            <div style={{ paddingTop:12, borderTop:'1px solid var(--rule-soft)' }}>
              <div className="small-caps" style={{ fontSize:9, color:'var(--ink-3)', marginBottom:6 }}>Notes</div>
              <div style={{ display:'flex', flexWrap:'wrap', gap:10 }}>
                {parsed.bassNote && (
                  <div style={{ display:'flex', flexDirection:'column', alignItems:'center', minWidth:42 }}>
                    <span className="font-mono" style={{ fontSize:9, color:'var(--burgundy)' }}>BASS</span>
                    <span className="font-display" style={{ fontSize:18, fontWeight:600, color:'var(--burgundy)' }}>
                      {formatNoteName(parsed.bassNote)}
                    </span>
                  </div>
                )}
                {parsed.intervals.map((interval, i) => {
                  const pc = (parsed.rootPc + interval) % 12;
                  const role = interval === 0 ? 'R'
                    : interval === 1 ? '♭9' : interval === 2 ? '9' : interval === 3 ? '♭3'
                    : interval === 4 ? '3' : interval === 5 ? '4' : interval === 6 ? '♭5/♯11'
                    : interval === 7 ? '5' : interval === 8 ? '♯5/♭13' : interval === 9 ? '6/13'
                    : interval === 10 ? '♭7' : interval === 11 ? '7'
                    : interval === 13 ? '♭9' : interval === 14 ? '9' : interval === 15 ? '♯9'
                    : interval === 17 ? '11' : interval === 18 ? '♯11'
                    : interval === 20 ? '♭13' : interval === 21 ? '13'
                    : '?';
                  return (
                    <div key={i} style={{ display:'flex', flexDirection:'column', alignItems:'center', minWidth:42 }}>
                      <span className="font-mono" style={{ fontSize:9, color:'var(--gold)' }}>{role}</span>
                      <span className="font-display" style={{ fontSize:18, fontWeight:600 }}>
                        {spellChordTone(parsed.rootName, interval)}
                      </span>
                    </div>
                  );
                })}
              </div>
            </div>
          </Card>

          {/* Tokens — the breakdown */}
          <Card style={{ padding:18, marginBottom:14 }}>
            <div className="small-caps" style={{ fontSize:10, color:'var(--burgundy)', marginBottom:8 }}>Symbol breakdown</div>
            <div style={{ display:'flex', flexDirection:'column', gap:6 }}>
              {parsed.tokens.map((tok, i) => (
                <div key={i} style={{ display:'flex', gap:10, padding:'8px 10px', background:'var(--paper)', border:'1px solid var(--rule)', borderRadius:2 }}>
                  <span className="font-mono" style={{
                    fontSize:10, padding:'1px 6px',
                    background: tok.type === 'root' ? 'var(--burgundy)' : tok.type === 'quality' ? 'var(--ink)' : tok.type.startsWith('b') || tok.type.startsWith('#') ? 'var(--gold)' : 'var(--sage)',
                    color:'var(--paper)', borderRadius:2,
                    letterSpacing:'0.1em', textTransform:'uppercase',
                    minWidth:50, textAlign:'center', height:'fit-content', alignSelf:'flex-start', marginTop:2,
                  }}>{tok.type}</span>
                  <span style={{ fontSize:13, color:'var(--ink-2)', lineHeight:1.5, flex:1 }}>{tok.label}</span>
                </div>
              ))}
            </div>
          </Card>

          {/* Fretboard with chord tones */}
          <GuitarFretboard
            highlights={(() => {
              const m = new Map();
              parsed.intervals.forEach((interval, i) => {
                const pc = ((parsed.rootPc + interval) % 12 + 12) % 12;
                const isRoot = interval === 0;
                const role = interval === 0 ? 'R' : interval === 4 ? '3' : interval === 3 ? '♭3' : interval === 7 ? '5' : interval === 6 ? '♭5' : interval === 8 ? '♯5' : interval === 10 ? '♭7' : interval === 11 ? '7' : interval === 14 ? '9' : interval === 13 ? '♭9' : interval === 15 ? '♯9' : interval === 17 ? '11' : interval === 18 ? '♯11' : interval === 20 ? '♭13' : interval === 21 ? '13' : interval === 9 ? '6' : interval === 5 ? '4' : interval === 2 ? '2' : '';
                m.set(pc, { label: role, bg: isRoot ? 'var(--burgundy)' : '#8a6d4a' });
              });
              return m;
            })()}
            rootPc={parsed.rootPc}
            useFlats={useFavoritesLocal}
            numFrets={15}
            label={`${parsed.raw} — chord tones across the neck`}
            audio={audio}
            playAllNotes={true}
            playAllLabel="Full-neck decoded tones"
          />
        </>
      ) : (
        <Card style={{ padding:24, textAlign:'center' }}>
          <p style={{ fontSize:14, color:'var(--ink-3)', fontStyle:'italic' }}>Couldn\'t parse "{input}". Try a standard symbol like Cm7, F♯maj9, or D7♭9.</p>
        </Card>
      )}

      <div className="ornament" />

      {/* Presets / Syllabus */}
      <h3 className="font-display" style={{ fontSize:22, fontStyle:'italic', marginBottom:6 }}>The Chord Syllabus</h3>
      <p style={{ fontSize:13.5, color:'var(--ink-3)', lineHeight:1.55, marginBottom:14 }}>
        Fifty-plus chord types organized by category. Tap any to load it into the decoder above. Working through every chord type in every key is the most direct path to chord literacy — twelve roots × fifty-plus types is roughly six hundred unique chords. Track your progress in the Practice tab.
      </p>

      {presets.map(group => (
        <Card key={group.label} style={{ padding:14, marginBottom:8 }}>
          <div className="small-caps" style={{ fontSize:10, color:'var(--burgundy)', marginBottom:6 }}>{group.label}</div>
          <div style={{ display:'flex', flexWrap:'wrap', gap:4 }}>
            {group.items.map(c => (
              <button
                key={c}
                onClick={() => setInput(c)}
                style={{
                  padding:'5px 10px', borderRadius:2,
                  background: input === c ? 'var(--burgundy)' : 'transparent',
                  color: input === c ? 'var(--paper)' : 'var(--ink)',
                  border:'1px solid var(--burgundy)',
                  fontFamily:"'EB Garamond', serif", fontSize:13, fontWeight:500,
                }}
              >{c}</button>
            ))}
          </div>
        </Card>
      ))}

      <div className="ornament" />

      <Card style={{ padding:18, background:'var(--paper-3)' }}>
        <div className="small-caps" style={{ fontSize:10, color:'var(--burgundy)', marginBottom:6 }}>Reading Conventions</div>
        <h4 className="font-display" style={{ fontSize:18, fontStyle:'italic', marginBottom:8 }}>Anatomy of a chord symbol</h4>
        <p style={{ fontSize:14, color:'var(--ink-2)', lineHeight:1.6, marginBottom:10 }}>
          Read a chord symbol in this order:
        </p>
        <ol style={{ paddingLeft:20, margin:0 }}>
          <li style={{ fontSize:13.5, color:'var(--ink-2)', lineHeight:1.6, marginBottom:5 }}><strong>Root</strong> — the letter (and accidental). Example: F♯.</li>
          <li style={{ fontSize:13.5, color:'var(--ink-2)', lineHeight:1.6, marginBottom:5 }}><strong>Quality</strong> — major (often blank), m/min/–, dim/°, aug/+. Example: F♯m.</li>
          <li style={{ fontSize:13.5, color:'var(--ink-2)', lineHeight:1.6, marginBottom:5 }}><strong>7th</strong> — none, 7 (♭7), maj7 (♮7). Example: F♯m7.</li>
          <li style={{ fontSize:13.5, color:'var(--ink-2)', lineHeight:1.6, marginBottom:5 }}><strong>Extensions</strong> — 9/11/13. Each one IMPLIES the ones below it (a 13 chord includes the 7 and 9). Example: F♯m9.</li>
          <li style={{ fontSize:13.5, color:'var(--ink-2)', lineHeight:1.6, marginBottom:5 }}><strong>Alterations</strong> — ♭5, ♯5, ♭9, ♯9, ♯11, ♭13. Example: F♯m9♭5.</li>
          <li style={{ fontSize:13.5, color:'var(--ink-2)', lineHeight:1.6, marginBottom:5 }}><strong>Slash bass</strong> — /BassNote. Example: F♯m9♭5/A.</li>
        </ol>
        <p style={{ fontSize:13, color:'var(--ink-3)', marginTop:10, fontStyle:'italic', lineHeight:1.5 }}>
          With this grammar, even a chord you've never seen before tells you exactly what to play.
        </p>
      </Card>
    </div>
  );
}

function buildTodaySession(timeId, focusId, energyId, week) {
  const focus = PLAN_TODAY_FOCUSES.find(f => f.id === focusId) || PLAN_TODAY_FOCUSES[0];
  const energy = PLAN_TODAY_ENERGY.find(e => e.id === energyId) || PLAN_TODAY_ENERGY[1];
  const blocks = focus.sessions[timeId] || focus.sessions['45'];
  return {
    focus,
    energy,
    blocks,
    title: focus.label + ' · ' + (PLAN_TODAY_TIMES.find(t => t.id === timeId) || PLAN_TODAY_TIMES[1]).label,

}

//  TAB: EAR TRAINING — random call-and-response
// ═══════════════════════════════════════════════════════════════════════

function EarTab({ audio }) {
  const [activeLevel, setActiveLevel] = useState(EAR_LEVELS[0].id);
  const [currentItem, setCurrentItem] = useState(null);
  const [randomRoot, setRandomRoot] = useState(0);
  const [picked, setPicked] = useState(null);
  const [feedback, setFeedback] = useState(null);
  const [score, setScore] = useState({ correct: 0, total: 0 });

  const level = EAR_LEVELS.find(l => l.id === activeLevel) || EAR_LEVELS[0];

  const playItem = (item, root, lvl) => {
    if (lvl.type === 'interval') {
      const baseMidi = 60 + root;
      const targetMidi = baseMidi + item.st;
      if (lvl.mode === 'asc') audio.arpeggiate([baseMidi, targetMidi], 0.5, '4n');
      else if (lvl.mode === 'desc') audio.arpeggiate([targetMidi, baseMidi], 0.5, '4n');
      else audio.playChord([baseMidi, targetMidi], '2n');
    } else if (lvl.type === 'chord') {
      const baseMidi = 48 + root;
      audio.playChord(item.ints.map(i => baseMidi + i), '2n');
    } else if (lvl.type === 'scale') {
      const baseMidi = 60 + root;
      audio.arpeggiate([...item.steps, 12].map(s => baseMidi + s), 0.18);
    }
  };

  const newQuestion = () => {
    const item = level.items[Math.floor(Math.random() * level.items.length)];
    const root = Math.floor(Math.random() * 12);
    setCurrentItem(item);
    setRandomRoot(root);
    setPicked(null);
    setFeedback(null);
    setTimeout(() => playItem(item, root, level), 120);
  };

  const replay = () => {
    if (currentItem) playItem(currentItem, randomRoot, level);
  };

  const guess = (item) => {
    if (feedback) return;
    const correct = item === currentItem;
    setPicked(item);
    setFeedback(correct ? 'correct' : 'wrong');
    setScore(s => ({ correct: s.correct + (correct ? 1 : 0), total: s.total + 1 }));
  };

  // Reset session when level changes
  useEffect(() => {
    setCurrentItem(null);
    setPicked(null);
    setFeedback(null);
    setScore({ correct: 0, total: 0 });
  }, [activeLevel]);

  const categories = ['Intervals', 'Chord Quality', 'Scale Quality'];

  return (
    <div className="tab-anim">
      <SectionHeader
        chapter="Chapter VIII"
        title="Ear Training"
        sub="The bridge between theory on paper and music in your hands."
      />

      <p style={{ color:'var(--ink-2)', maxWidth:560, marginBottom:18, lineHeight:1.65 }}>
        Theory you can\'t hear is theory you can\'t use. Pick a level, listen to the random sound the app plays, identify it. The app generates questions in random keys so you can\'t cheat by memorizing absolute pitch — only relative relationships. Five minutes a day moves the needle dramatically over six months.
      </p>

      <div className="ornament" />

      {/* Level selector */}
      <div style={{ marginBottom:16 }}>
        <div className="small-caps" style={{ fontSize:10, color:'var(--ink-3)', marginBottom:6 }}>Pick a level</div>
        {categories.map(cat => (
          <div key={cat} style={{ marginBottom:10 }}>
            <div className="font-mono" style={{ fontSize:9, letterSpacing:'0.2em', color:'var(--ink-4)', marginBottom:4 }}>— {cat} —</div>
            <div style={{ display:'flex', flexWrap:'wrap', gap:4 }}>
              {EAR_LEVELS.filter(l => l.category === cat).map(l => (
                <button
                  key={l.id}
                  onClick={() => setActiveLevel(l.id)}
                  style={{
                    padding:'5px 10px', borderRadius:2,
                    background: activeLevel === l.id ? 'var(--ink)' : 'transparent',
                    color: activeLevel === l.id ? 'var(--paper)' : 'var(--ink)',
                    border:'1px solid var(--ink)',
                    fontFamily:"'EB Garamond', serif", fontSize:13,
                  }}
                >{l.name}</button>
              ))}
            </div>
          </div>
        ))}
      </div>

      {/* Active level / question card */}
      <Card style={{ padding:20 }}>
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'baseline', gap:10, marginBottom:14 }}>
          <h3 className="font-display" style={{ fontSize:20, fontStyle:'italic' }}>{level.name}</h3>
          <span className="font-mono num" style={{ fontSize:11, color:'var(--ink-3)' }}>
            {score.total > 0 ? `${score.correct}/${score.total} · ${Math.round(100*score.correct/score.total)}%` : '—'}
          </span>
        </div>

        {!currentItem ? (
          <button onClick={newQuestion} style={{
            width:'100%', padding:'14px',
            background:'var(--burgundy)', color:'var(--paper)',
            border:'1px solid var(--burgundy)', borderRadius:2,
            fontFamily:"'JetBrains Mono', monospace",
            fontSize:11, letterSpacing:'0.18em', textTransform:'uppercase',
          }}>▶ Start training</button>
        ) : (
          <>
            <div style={{ display:'flex', alignItems:'center', gap:12, marginBottom:14 }}>
              <PlayBtn onClick={replay} variant="gold" size="lg" title="Replay" />
              <span style={{ fontSize:13, color:'var(--ink-3)', fontStyle:'italic' }}>Tap to replay</span>
            </div>

            <div style={{ display:'grid', gap:5 }}>
              {level.items.map((item, i) => {
                const isCorrectAnswer = item === currentItem;
                const isUserPick = item === picked;
                let bg = 'var(--paper)';
                let fg = 'var(--ink)';
                let border = 'var(--rule)';
                if (feedback) {
                  if (isCorrectAnswer) { bg = 'var(--sage)'; fg = 'var(--paper)'; border = 'var(--sage)'; }
                  else if (isUserPick) { bg = 'var(--burgundy)'; fg = 'var(--paper)'; border = 'var(--burgundy)'; }
                  else { bg = 'var(--paper)'; fg = 'var(--ink-4)'; }
                }
                return (
                  <button
                    key={i}
                    onClick={() => guess(item)}
                    disabled={!!feedback}
                    style={{
                      padding:'10px 14px', textAlign:'left',
                      background:bg, color:fg, border:`1px solid ${border}`,
                      borderRadius:2,
                      fontFamily:"'EB Garamond', serif", fontSize:14, fontWeight:500,
                      transition:'all 0.15s',
                    }}
                  >{item.label}</button>
                );
              })}
            </div>

            {feedback && (
              <div style={{ marginTop:14, paddingTop:14, borderTop:'1px solid var(--rule-soft)', display:'flex', justifyContent:'space-between', alignItems:'center', gap:8, flexWrap:'wrap' }}>
                <span style={{ fontSize:13, fontStyle:'italic', color: feedback === 'correct' ? 'var(--sage)' : 'var(--burgundy)' }}>
                  {feedback === 'correct' ? '✓ Correct' : `✗ Was: ${currentItem.label}`}
                </span>
                <button onClick={newQuestion} style={{
                  padding:'8px 14px', background:'var(--burgundy)', color:'var(--paper)',
                  border:'1px solid var(--burgundy)', borderRadius:2,
                  fontFamily:"'JetBrains Mono', monospace", fontSize:10,
                  letterSpacing:'0.15em', textTransform:'uppercase',
                }}>Next →</button>
              </div>
            )}
          </>
        )}
      </Card>

      <div className="ornament" />

      <Card style={{ padding:18, background:'var(--paper-3)' }}>
        <div className="small-caps" style={{ fontSize:10, color:'var(--burgundy)', marginBottom:6 }}>How to practice</div>
        <h4 className="font-display" style={{ fontSize:18, fontStyle:'italic', marginBottom:8 }}>Anchor each interval to a song.</h4>
        <p style={{ fontSize:14, color:'var(--ink-2)', lineHeight:1.6 }}>
          Most musicians can\'t identify intervals abstractly — they recognize them by association. P5 = "Twinkle Twinkle." M3 = first two notes of "Oh When the Saints." TT = "Maria" from West Side Story. m6 = "The Entertainer" main lick. M7 = "Take On Me" chorus. Build your library of anchor songs and intervals stop being abstract.
        </p>
      </Card>
    </div>
  );
}

//  TAB: JAM — backing tracks with scale visualizer
// ═══════════════════════════════════════════════════════════════════════

function JamTab({ audio }) {
  const [activeJam, setActiveJam] = useState(ALL_JAM_PROGRESSIONS[0].id);
  const [keyRoot, setKeyRoot] = useState('A');
  const [scaleKey, setScaleKey] = useState(ALL_JAM_PROGRESSIONS[0].suggestedScales[0]);
  const [showAs, setShowAs] = useState('degree');
  const [isPlaying, setIsPlaying] = useState(false);
  const [currentChordIdx, setCurrentChordIdx] = useState(0);
  const [bpm, setBpm] = useState(ALL_JAM_PROGRESSIONS[0].bpm);
  const playRef = useRef({ cancelled: false });
  const [focusId, setFocusId] = useState('melody');
  const [constraintIdx, setConstraintIdx] = useState(0);
  const [blueprintIdx, setBlueprintIdx] = useState(0);

  const jam = ALL_JAM_PROGRESSIONS.find(j => j.id === activeJam) || ALL_JAM_PROGRESSIONS[0];
  const useFlats = useFlatsFor(keyRoot);
  const keyRootPc = pcOf(keyRoot);
  const scale = SCALES[scaleKey] || SCALES.minorPent;
  const focus = JAM_FOCUS_ASSIGNMENTS.find(f => f.id === focusId) || JAM_FOCUS_ASSIGNMENTS[0];
  const blueprint = JAM_CHORUS_BLUEPRINTS[blueprintIdx % JAM_CHORUS_BLUEPRINTS.length];
  const targetToneRows = useMemo(() => jam.chords.map((c, i) => {
    const cRootPc = (keyRootPc + c.offset) % 12;
    const def = CHORDS[c.key];
    const ints = def?.ints || [];
    const third = ints.find(x => x === 3 || x === 4);
    const seventh = ints.find(x => x === 10 || x === 11 || x === 9);
    return { i, chord:`${display(cRootPc, useFlats)}${def?.sym || ''}`, root:display(cRootPc, useFlats), third: third == null ? '—' : display((cRootPc + third) % 12, useFlats), seventh: seventh == null ? '—' : display((cRootPc + seventh) % 12, useFlats), beats:c.beats };
  }), [jam, keyRootPc, useFlats]);

  // When jam changes: reset bpm, stop, pre-select first suggested scale
  useEffect(() => {
    setIsPlaying(false);
    setBpm(jam.bpm);
    setCurrentChordIdx(0);
    if (jam.suggestedScales && jam.suggestedScales.length) {
      setScaleKey(jam.suggestedScales[0]);
    }
  }, [activeJam]);

  // Loop player
  useEffect(() => {
    if (!isPlaying) {
      playRef.current.cancelled = true;
      return;
    }

    playRef.current = { cancelled: false };
    const myRef = playRef.current;
    const beatDuration = 60 / bpm;

    const playLoop = async () => {
      while (!myRef.cancelled) {
        for (let i = 0; i < jam.chords.length; i++) {
          if (myRef.cancelled) return;
          const chord = jam.chords[i];
          const chordRootPc = (keyRootPc + chord.offset) % 12;
          const chordRootName = SHARP[chordRootPc];
          const chordDef = CHORDS[chord.key];
          if (chordDef) {
            const midis = buildChord(chordRootName, chordDef.ints, 3);
            const dur = chord.beats * beatDuration * 0.95;
            audio.playChord(midis, dur);
          }
          setCurrentChordIdx(i);
          await new Promise(r => setTimeout(r, chord.beats * beatDuration * 1000));
        }
      }
    };

    playLoop();
    return () => { myRef.cancelled = true; };
  }, [isPlaying, activeJam, bpm, keyRoot]);

  // Cleanup on unmount
  useEffect(() => () => { playRef.current.cancelled = true; }, []);

  // Scale highlights for fretboard
  const highlights = useMemo(() => {
    const m = new Map();
    scale.steps.forEach((semitone, i) => {
      const pc = (keyRootPc + semitone) % 12;
      const label = showAs === 'note' ? display(pc, useFlats) : (scale.degrees[i] || '');
      m.set(pc, { label, bg: i === 0 ? 'var(--burgundy)' : '#8a6d4a' });
    });
    return m;
  }, [scale, keyRootPc, showAs, useFlats]);

  const togglePlay = async () => {
    if (!isPlaying) {
      try { if (Tone.context.state !== 'running') await Tone.start(); } catch (e) {}
    }
    setIsPlaying(p => !p);
  };

  const categories = Array.from(new Set(ALL_JAM_PROGRESSIONS.map(j => j.category)));

  return (
    <div className="tab-anim">
      <SectionHeader
        chapter="Chapter IX"
        title="Jam Tracks"
        sub="Backing loops with scale visualizer. Apply theory in real time."
      />

      <p style={{ color:'var(--ink-2)', maxWidth:560, marginBottom:18, lineHeight:1.65 }}>
        Pick a progression, pick a key, pick a scale. Hit play. The app loops the chords; the fretboard shows you which notes belong. Improvise. The fastest way to internalize theory is to apply it against a moving harmonic backdrop — this is that.
      </p>

      {/* Progression picker */}
      <div style={{ marginBottom:14 }}>
        <div className="small-caps" style={{ fontSize:10, color:'var(--ink-3)', marginBottom:6 }}>Progression</div>
        {categories.map(cat => {
          const items = ALL_JAM_PROGRESSIONS.filter(j => j.category === cat);
          if (!items.length) return null;
          return (
            <div key={cat} style={{ marginBottom:8 }}>
              <div className="font-mono" style={{ fontSize:9, letterSpacing:'0.2em', color:'var(--ink-4)', marginBottom:4 }}>— {cat} —</div>
              <div style={{ display:'flex', flexWrap:'wrap', gap:4 }}>
                {items.map(j => (
                  <button
                    key={j.id}
                    onClick={() => setActiveJam(j.id)}
                    style={{
                      padding:'5px 10px', borderRadius:2,
                      background: activeJam === j.id ? 'var(--burgundy)' : 'transparent',
                      color: activeJam === j.id ? 'var(--paper)' : 'var(--ink)',
                      border:'1px solid var(--burgundy)',
                      fontFamily:"'EB Garamond', serif", fontSize:13,
                    }}
                  >{j.name}</button>
                ))}
              </div>
            </div>
          );
        })}
      </div>

      {/* Active jam controls */}
      <Card style={{ padding:16, marginBottom:14 }}>
        <h3 className="font-display" style={{ fontSize:22, fontStyle:'italic', marginBottom:4 }}>{jam.name}</h3>
        <p style={{ fontSize:13, color:'var(--ink-3)', lineHeight:1.5, marginBottom:12 }}>{jam.description}</p>

        {/* Key */}
        <div style={{ marginBottom:10 }}>
          <div className="small-caps" style={{ fontSize:9, color:'var(--ink-3)', marginBottom:6 }}>Key</div>
          <RootSelector root={keyRoot} setRoot={setKeyRoot} useFlats={useFlats} />
        </div>

        {/* BPM */}
        <div style={{ display:'flex', alignItems:'center', gap:10, marginTop:10, marginBottom:10 }}>
          <span className="small-caps" style={{ fontSize:9, color:'var(--ink-3)' }}>BPM</span>
          <button onClick={() => setBpm(b => Math.max(40, b - 5))} style={{
            width:30, height:30, border:'1px solid var(--ink)', borderRadius:2,
            background:'var(--paper)', color:'var(--ink)',
            fontFamily:"'JetBrains Mono', monospace", fontSize:14,
          }}>−</button>
          <span className="font-mono num" style={{ fontSize:18, fontWeight:600, minWidth:46, textAlign:'center', color:'var(--ink)' }}>{bpm}</span>
          <button onClick={() => setBpm(b => Math.min(220, b + 5))} style={{
            width:30, height:30, border:'1px solid var(--ink)', borderRadius:2,
            background:'var(--paper)', color:'var(--ink)',
            fontFamily:"'JetBrains Mono', monospace", fontSize:14,
          }}>+</button>
        </div>

        {/* Play / Stop */}
        <button onClick={togglePlay} style={{
          width:'100%', padding:'14px', marginTop:6,
          background: isPlaying ? 'var(--burgundy)' : 'var(--sage)',
          color:'var(--paper)',
          border:`1px solid ${isPlaying ? 'var(--burgundy)' : 'var(--sage)'}`,
          borderRadius:2,
          fontFamily:"'JetBrains Mono', monospace",
          fontSize:11, letterSpacing:'0.2em', textTransform:'uppercase',
        }}>
          {isPlaying ? '■ Stop' : '▶ Play loop'}
        </button>

        {/* Chord progression display */}
        <div style={{ marginTop:14, paddingTop:14, borderTop:'1px solid var(--rule-soft)' }}>
          <div className="small-caps" style={{ fontSize:9, color:'var(--ink-3)', marginBottom:6 }}>Progression</div>
          <div style={{ display:'flex', flexWrap:'wrap', gap:4 }}>
            {jam.chords.map((c, i) => {
              const cRootPc = (keyRootPc + c.offset) % 12;
              const cRootName = display(cRootPc, useFlats);
              const cDef = CHORDS[c.key];
              const sym = cDef?.sym || '';
              const isCurrent = isPlaying && i === currentChordIdx;
              return (
                <span key={i} style={{
                  padding:'5px 9px',

//  TAB: WORKSHOP — scale-aware lick & technique exercises
// ═══════════════════════════════════════════════════════════════════════
//  Every exercise computes its notes from the user's chosen key + scale.
//  Categories: Sequences, Arpeggios, Intervals, Licks, Rhythm.

// Find a reasonable string+fret for a given MIDI note.
// Strategy: prefer LOWEST string (= highest fret) that places the note in fret range.
// This naturally spreads ascending sequences across the entire neck — low notes on
// low strings at low frets, mid notes shifting to middle strings at moderate frets,
// high notes ending up on top strings at higher frets.
function midiToPosition(midi, opts = {}) {
  const maxFret = opts.maxFret ?? 17;
  const minFret = opts.minFret ?? 0;
  // Try LOW strings first so ascending pitches flow up the strings naturally
  for (let s = 0; s <= 5; s++) {
    const fret = midi - TUNING[s];
    if (fret >= minFret && fret <= maxFret) {
      return { str: s, fret };
    }
  }
  // Fallback: any valid position
  for (let s = 5; s >= 0; s--) {
    const fret = midi - TUNING[s];
    if (fret >= 0 && fret <= 22) {
      return { str: s, fret };
    }
  }
  return null;
}

// Spread an ascending MIDI sequence across the neck.
// As pitches climb, the strings climb too. Each new octave bumps you to a
// higher string, keeping the visualization across the whole neck.
function midiToPositionSpread(midi, indexInSeq, totalLen) {
  // Map progress through the sequence to a target string range
  // Early in the sequence: prefer low strings. Late in the sequence: high strings.
  const progress = totalLen > 0 ? indexInSeq / totalLen : 0;
  const startStr = Math.floor(progress * 6); // 0-5
  // Look for a position starting from this preferred string, then expand outward
  for (let offset = 0; offset < 6; offset++) {
    for (const dir of [1, -1]) {
      const s = startStr + offset * dir;
      if (s < 0 || s > 5) continue;
      const fret = midi - TUNING[s];
      if (fret >= 0 && fret <= 17) {
        return { str: s, fret };
      }
    }
  }
  return midiToPosition(midi);
}

// Helpers: build absolute pitch list for a scale across 2 octaves
function buildScalePitches(rootName, scaleKey, octaves = 2) {
  const scale = SCALES[scaleKey];
  if (!scale) return [];
  // Find the lowest octave where the root note is actually playable on the guitar
  // (i.e., the root MIDI >= low E = MIDI 40)
  const rootPc = pcOf(rootName);
  let startOctave = 2;
  while (startOctave < 5 && (startOctave + 1) * 12 + rootPc < 40) {
    startOctave++;
  }
  const baseMidi = namePitch(rootName, startOctave);
  const pitches = [];
  for (let oct = 0; oct < octaves; oct++) {
    scale.steps.forEach(s => pitches.push(baseMidi + oct * 12 + s));
  }
  pitches.push(baseMidi + octaves * 12); // top root
  return pitches;
}

// Generate EVERY scale tone playable across the visible neck (low E open to high e fret 15).
// Returns unique MIDI values sorted ascending — matches what the fretboard visualizer shows.
function buildScalePitchesNeck(rootName, scaleKey, lowMidi = 40, highMidi = 79) {
  const scale = SCALES[scaleKey];
  if (!scale) return [];
  const rootPc = pcOf(rootName);
  const pitches = [];
  for (let m = lowMidi; m <= highMidi; m++) {
    const interval = ((m - rootPc) % 12 + 12) % 12;
    if (scale.steps.includes(interval)) {
      pitches.push(m);
    }
  }
  return pitches;
}

// Take a scale (note pitches in order) and produce a sequence based on a "groups of N" pattern.
// e.g. groupsOf(scale, 3) where scale is [c,d,e,f,g,a,b,c'], yields:
//   c-d-e, d-e-f, e-f-g, f-g-a, g-a-b, a-b-c', b-c'-d', ...
function scaleInGroups(scaleNotes, n, ascending = true) {
  const out = [];
  if (ascending) {
    for (let i = 0; i + n - 1 < scaleNotes.length; i++) {
      for (let j = 0; j < n; j++) out.push(scaleNotes[i + j]);
    }
  } else {
    for (let i = scaleNotes.length - 1; i - n + 1 >= 0; i--) {
      for (let j = 0; j < n; j++) out.push(scaleNotes[i - j]);
    }
  }
  return out;
}

// Build diatonic triad arpeggio for each scale degree (1-3-5 on the scale)
function diatonicArpeggios(scaleNotes, includeSeventh = false) {
  const out = [];
  // Limit to 7 chord stacks (7 degrees) — needs at least 7 notes in scale
  for (let i = 0; i < 7 && i + 4 < scaleNotes.length; i++) {
    out.push(scaleNotes[i]);
    out.push(scaleNotes[i + 2]);
    out.push(scaleNotes[i + 4]);
    if (includeSeventh && i + 6 < scaleNotes.length) {
      out.push(scaleNotes[i + 6]);
    }
  }
  return out;
}

// Helper to compute exercise note sequence based on its pattern
function computeExerciseNotes(pattern, scaleNotes, ascending = true) {
  if (pattern.indices) {
    // Pre-defined index sequence — map indices into the scale notes array
    return pattern.indices.map(i => scaleNotes[i] || scaleNotes[scaleNotes.length - 1]);
  }
  if (pattern.pattern === 'groups') {
    // Groups of N notes, skipping by `skip`
    const out = [];
    if (ascending) {
      for (let i = 0; i + (pattern.n - 1) * pattern.skip < scaleNotes.length; i++) {
        for (let j = 0; j < pattern.n; j++) {
          const idx = i + j * pattern.skip;
          if (idx < scaleNotes.length) out.push(scaleNotes[idx]);
        }
      }
    } else {
      for (let i = scaleNotes.length - 1; i - (pattern.n - 1) * pattern.skip >= 0; i--) {
        for (let j = 0; j < pattern.n; j++) {
          const idx = i - j * pattern.skip;
          if (idx >= 0) out.push(scaleNotes[idx]);
        }
      }
    }
    return out;
  }
  if (pattern.pattern === '1235') {
    const out = [];
    for (let i = 0; i + 4 < scaleNotes.length; i++) {
      out.push(scaleNotes[i], scaleNotes[i+1], scaleNotes[i+2], scaleNotes[i+4]);
    }
    return out;
  }
  if (pattern.pattern === '1325') {
    const out = [];
    for (let i = 0; i + 4 < scaleNotes.length; i++) {
      out.push(scaleNotes[i], scaleNotes[i+2], scaleNotes[i+1], scaleNotes[i+4]);
    }
    return out;
  }
  if (pattern.pattern === 'zigzag') {
    // 1-3-2-4-3-5-4-6 saw-tooth pattern
    const out = [];
    for (let i = 0; i + 2 < scaleNotes.length; i++) {
      out.push(scaleNotes[i], scaleNotes[i+2]);
    }
    return out;
  }
  if (pattern.pattern === 'emphasize') {
    // Walk the scale but linger on degree `emphasize` each octave
    const out = [];
    const scaleLen = pattern.scaleLen || 7;
    for (let i = 0; i < scaleNotes.length; i++) {
      out.push(scaleNotes[i]);
      const deg = i % scaleLen;
      if (deg === pattern.emphasize) out.push(scaleNotes[i]);
    }
    return out;
  }
  return scaleNotes;
}
