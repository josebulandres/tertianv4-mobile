<!DOCTYPE html>

<html lang="en">

<style>
  :root {
    --paper: #f7f0dc;
    --paper-2: #f1e8cf;
    --paper-3: #ebe0c0;
    --ink: #1a1814;
    --ink-2: #3a3530;
    --ink-3: #6b6358;
    --ink-4: #9a9082;
    --rule: #c9bd9e;
    --rule-soft: #ddd1b0;
    --burgundy: #862d2a;
    --burgundy-soft: #b15c5a;
    --gold: #b8842a;
    --gold-soft: #d4a85e;
    --sage: #4a6b3e;
    --sage-soft: #6e8a5e;
    --slate: #4a5a78;
    --slate-soft: #6b7a96;
  }
  * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
  html, body { background: var(--paper); margin: 0; padding: 0; color: var(--ink); }
  body { font-family: 'Public Sans', -apple-system, system-ui, sans-serif; font-weight: 400; line-height: 1.5; font-size: 15px; -webkit-font-smoothing: antialiased; }
  .font-display { font-family: 'EB Garamond', Georgia, serif; }
  .font-mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }
  h1, h2, h3, h4 { font-family: 'EB Garamond', serif; font-weight: 600; margin: 0; line-height: 1.15; color: var(--ink); }
  p { margin: 0; }
  button { font-family: inherit; cursor: pointer; border: none; background: none; padding: 0; color: inherit; }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--paper); }
  ::-webkit-scrollbar-thumb { background: var(--rule); border-radius: 3px; }
  .num { font-variant-numeric: tabular-nums; }
  .small-caps { font-variant-caps: all-small-caps; letter-spacing: 0.08em; }
  .drop-cap::first-letter {
    font-family: 'EB Garamond', serif;
    font-size: 3.4em;
    font-weight: 700;
    line-height: 0.9;
    float: left;
    margin: 0.06em 0.08em -0.05em 0;
    color: var(--burgundy);
  }
  .ornament {
    text-align: center;
    color: var(--gold);
    font-size: 18px;
    margin: 24px 0;
    letter-spacing: 0.5em;
  }
  .ornament::before { content: '✦   ✦   ✦'; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  .tab-anim { animation: fadeUp 0.3s ease-out; }
  .grid-paper {
    background-image:
      linear-gradient(var(--rule-soft) 1px, transparent 1px),
      linear-gradient(90deg, var(--rule-soft) 1px, transparent 1px);
    background-size: 20px 20px;
    background-position: -1px -1px;
  }
  .paper-edge {
    box-shadow:
      inset 0 0 0 1px var(--rule),
      0 1px 0 rgba(255,255,255,0.5) inset,
      0 1px 3px rgba(60,40,20,0.06);
  }
  .underline-fancy {
    background-image: linear-gradient(90deg, var(--burgundy), var(--burgundy));
    background-size: 100% 1.5px;
    background-repeat: no-repeat;
    background-position: 0 100%;
    padding-bottom: 2px;
  }
  .play-pulse { animation: pulseGold 0.6s ease-out; }
  @keyframes pulseGold {
    0% { box-shadow: 0 0 0 0 rgba(184,132,42,0.4); }
    100% { box-shadow: 0 0 0 14px rgba(184,132,42,0); }
  }
  /* Hide overflow on body, only main scrolls — for cleaner mobile feel */
  .scroll-x { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .scroll-x::-webkit-scrollbar { display: none; }
  /* Tab navigation: distribute evenly on wider screens, scroll on mobile */
  @media (min-width: 700px) {
    nav.scroll-x > div { width: 100%; }
    nav.scroll-x .tab-btn { flex: 1 1 0; min-width: 0; }
  }

  .top-nav-categorized-row {
    display: grid;
    grid-template-columns: repeat(5, minmax(0, 1fr));
    gap: 8px;
    align-items: stretch;
    width: 100%;
  }
  .top-nav-group {
    display: flex;
    flex-direction: column;
    align-items: stretch;
    gap: 4px;
    min-width: 0;
    padding: 5px;
    border: 1px solid rgba(58,49,40,0.10);
    background: rgba(252,246,232,0.52);
    border-radius: 7px;
  }
  .top-nav-group-label {
    flex: 0 0 auto;
    font-family: 'JetBrains Mono', monospace;
    font-size: 8.5px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--burgundy);
    opacity: 0.88;
    padding: 0 1px 4px;
    border-bottom: 1px solid var(--rule-soft);
    white-space: nowrap;
    text-align: center;
  }
  .top-nav-group-buttons {
    display: flex;
    flex-direction: column;
    gap: 3px;
    align-items: stretch;
    flex: 1 1 auto;
    min-width: 0;
  }
  .top-nav-categorized-row .tab-btn {
    width: 100%;
    min-width: 0;
    padding: 5px 4px;
    border-radius: 5px;
  }
  .top-nav-categorized-row .tab-label {
    overflow: visible;
    text-overflow: clip;
    white-space: normal;
    line-height: 1.05;
  }
  @media (max-width: 900px) {
    .top-nav-categorized-row { gap: 5px; }
    .top-nav-group { gap: 3px; padding: 4px; }
    .top-nav-group-label { font-size: 7.5px; letter-spacing:0.08em; padding-bottom:3px; }
    .top-nav-categorized-row .tab-btn { gap: 2px; padding: 5px 2px; font-size: 10px !important; }
  }
  @media (max-width: 640px) {
    .top-nav-categorized-row { gap: 3px; }
    .top-nav-group { padding: 3px 2px; border-radius:5px; }
    .top-nav-group-label { font-size:6.5px; letter-spacing:0.04em; }
    .top-nav-categorized-row .tab-label { display:inline; font-size: 8.5px; }
    .top-nav-categorized-row .tab-btn { padding: 6px 1px; }
  }


  /* ═══════════════════════════════════════════════════════════════════════
     MOBILE VERSION — phone-first navigation, tap targets, content flow
     ═══════════════════════════════════════════════════════════════════════ */
  .desktop-nav { display: block; }
  .mobile-nav, .mobile-bottom-nav { display: none; }
  .mobile-select {
    width: 100%;
    min-height: 44px;
    border: 1px solid var(--rule);
    border-radius: 8px;
    background: #fcf6e8;
    color: var(--ink);
    padding: 8px 12px;
    font-family: 'Public Sans', -apple-system, system-ui, sans-serif;
    font-size: 15px;
  }
  .mobile-category-row {
    display: grid;
    grid-template-columns: repeat(5, minmax(0, 1fr));
    gap: 5px;
    margin: 8px 0;
  }
  .mobile-category-btn,
  .mobile-tab-btn,
  .mobile-bottom-btn {
    min-height: 42px;
    border-radius: 8px;
    border: 1px solid var(--rule-soft);
    background: rgba(252,246,232,0.72);
    color: var(--ink-3);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
    text-align: center;
    touch-action: manipulation;
  }
  .mobile-category-btn.active,
  .mobile-tab-btn.active,
  .mobile-bottom-btn.active {
    background: var(--burgundy);
    color: var(--paper);
    border-color: var(--burgundy);
  }
  .mobile-category-btn {
    flex-direction: column;
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 8px;
    line-height: 1.05;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    padding: 6px 2px;
  }
  .mobile-tab-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 6px;
  }
  .mobile-tab-btn {
    font-family: 'EB Garamond', Georgia, serif;
    font-size: 16px;
    line-height: 1.05;
    padding: 9px 8px;
  }
  .mobile-bottom-nav {
    position: fixed;
    left: 0;
    right: 0;
    bottom: 0;
    z-index: 45;
    grid-template-columns: repeat(5, minmax(0, 1fr));
    gap: 4px;
    padding: 6px 8px calc(6px + env(safe-area-inset-bottom, 0));
    background: rgba(247,240,220,0.96);
    backdrop-filter: blur(10px);
    border-top: 1px solid var(--rule);
    box-shadow: 0 -2px 10px rgba(30,20,10,0.08);
  }
  .mobile-bottom-btn {
    min-height: 46px;
    flex-direction: column;
    font-size: 10px;
    font-family: 'Public Sans', -apple-system, system-ui, sans-serif;
    gap: 2px;
    padding: 4px 2px;
  }
  .mobile-audio-note {
    display: none;
    margin-top: 7px;
    padding: 7px 8px;
    border: 1px solid var(--rule-soft);
    background: rgba(252,246,232,0.72);
    border-radius: 7px;
    color: var(--ink-3);
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 9px;
    line-height: 1.35;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .mobile-scroll-cue {
    display: none;
  }
  @media (max-width: 760px) {
    html, body { overflow-x: hidden; }
    body { font-size: 14px; line-height: 1.45; }
    .desktop-nav { display: none !important; }
    .mobile-nav { display: block; }
    .mobile-bottom-nav { display: grid; }
    .mobile-audio-note { display: block; }
    .mobile-scroll-cue { display: block; }
    .app-title-row {
      align-items: flex-start !important;
      gap: 6px !important;
      margin-bottom: 6px !important;
    }
    .app-title-row h1 { font-size: 24px !important; }
    .app-title-row .app-kicker {
      display: block;
      letter-spacing: 0.13em !important;
      line-height: 1.25;
      font-size: 8px !important;
      max-width: 190px;
    }
    header > div {
      padding: 8px 8px 7px !important;
    }
    main {
      max-width: 100% !important;
      padding: 16px 10px 108px !important;
    }
    footer {
      padding-bottom: 96px !important;
    }
    h2 { font-size: 28px !important; }
    h3 { font-size: 21px !important; }
    button, input, select, textarea {
      font-size: 16px;
    }
    button {
      min-height: 42px;
    }
    input[type="number"] {
      min-height: 38px;
    }
    main div[style*="grid-template-columns"] {
      grid-template-columns: 1fr !important;
    }
    main div[style*="min-width:560px"],
    main table {
      font-size: 12px !important;
    }
    pre {
      max-width: 100%;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      font-size: 10px !important;
      line-height: 1.45 !important;
    }
    .scroll-x {
      margin-left: -2px;
      margin-right: -2px;
      padding-bottom: 4px;
    }
  }
  @media (max-width: 380px) {
    .mobile-category-btn { font-size: 7px; min-height: 39px; }
    .mobile-tab-btn { font-size: 15px; min-height: 40px; }
    .mobile-bottom-btn { font-size: 9px; }
    main { padding-left: 8px !important; padding-right: 8px !important; }
  }

  /* Safe area insets for iPhone notch/home indicator */
  .safe-bottom { padding-bottom: env(safe-area-inset-bottom, 0); }
  .safe-top { padding-top: env(safe-area-inset-top, 0); }
</style>

<div id="root"></div>
<noscript><div style="padding:20px;max-width:720px;margin:auto;font-family:serif">Tertian needs JavaScript enabled to run the interactive guitar tools.</div></noscript>

<script type="text/babel" data-presets="env,react">
const { useState, useEffect, useRef, useMemo, useCallback, Fragment } = React;

// ═══════════════════════════════════════════════════════════════════════
//  THEORY CORE — note math, conversions
// ═══════════════════════════════════════════════════════════════════════

const SHARP = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const FLAT  = ['C','Db','D','Eb','E','F','Gb','G','Ab','A','Bb','B'];
const PRETTY_S = ['C','C♯','D','D♯','E','F','F♯','G','G♯','A','A♯','B'];
const PRETTY_F = ['C','D♭','D','E♭','E','F','G♭','G','A♭','A','B♭','B'];

const NOTE_BASE = { C:0, D:2, E:4, F:5, G:7, A:9, B:11 };
const mod12 = n => ((n % 12) + 12) % 12;
const pcOf = n => {
  if (!n || typeof n !== 'string') return -1;
  const s = n.trim().replace(/♯/g, '#').replace(/♭/g, 'b');
  let i = SHARP.indexOf(s); if (i >= 0) return i;
  i = FLAT.indexOf(s); if (i >= 0) return i;
  const m = s.match(/^([A-Ga-g])([#b]*)$/);
  if (!m) return -1;
  let pc = NOTE_BASE[m[1].toUpperCase()];
  for (const a of m[2]) pc += a === '#' ? 1 : -1;
  return mod12(pc);
};
const display = (pc, useFlats=false) => (useFlats ? PRETTY_F : PRETTY_S)[mod12(pc)];
const midiToFreq = m => 440 * Math.pow(2, (m-69)/12);
const midiToName = m => SHARP[mod12(m)] + (Math.floor(m/12)-1);
const namePitch = (n, oct=4) => (oct+1)*12 + pcOf(n);
const LETTERS = ['C','D','E','F','G','A','B'];
const formatNoteName = n => (n || '').replace(/#/g, '♯').replace(/b/g, '♭');
const spellChordTone = (rootName, interval) => {
  const rootLetter = (rootName || 'C')[0].toUpperCase();
  const rootLetterIdx = LETTERS.indexOf(rootLetter);
  const rootPc = pcOf(rootName || 'C');
  const degreeByInterval = {
    0:0, 1:1, 2:1, 3:2, 4:2, 5:3, 6:4, 7:4, 8:4, 9:5, 10:6, 11:6,
    12:0, 13:1, 14:1, 15:1, 17:3, 18:3, 20:5, 21:5,
  };
  const degree = degreeByInterval[interval] ?? degreeByInterval[mod12(interval)] ?? 0;
  if (rootLetterIdx < 0 || rootPc < 0) return display(rootPc + interval, useFlatsFor(rootName));
  const targetLetter = LETTERS[(rootLetterIdx + degree) % 7];
  const desiredPc = mod12(rootPc + interval);
  const naturalPc = NOTE_BASE[targetLetter];
  const diff = mod12(desiredPc - naturalPc);
  if (diff === 0) return targetLetter;
  if (diff === 1) return targetLetter + '♯';
  if (diff === 2) return targetLetter + '𝄪';
  if (diff === 11) return targetLetter + '♭';
  if (diff === 10) return targetLetter + '𝄫';
  return display(desiredPc, useFlatsFor(rootName));
};

// Build chord MIDI notes from root note name, intervals (semitones), starting octave
const buildChord = (root, ints, oct=4) => {
  const base = namePitch(root, oct);
  return ints.map(i => base + i);
};

// Use flats for these key roots
const useFlatsFor = root => ['F','Bb','Eb','Ab','Db','Gb','Cb'].includes(root);

// ═══════════════════════════════════════════════════════════════════════
//  INTERVALS
// ═══════════════════════════════════════════════════════════════════════

const INTERVALS = [
  { st:0,  short:'P1',  name:'Perfect Unison',     ratio:'1:1',     class:'perfect',   inv:'P8',  note:'Identical pitch. The reference, the absence of motion. Frequencies in lockstep.' },
  { st:1,  short:'m2',  name:'Minor Second',       ratio:'16:15',   class:'sharp',     inv:'M7',  note:'A semitone — the smallest interval in 12-TET. Dense, neighboring tension. Used as a leading tone.' },
  { st:2,  short:'M2',  name:'Major Second',       ratio:'9:8',     class:'mild',      inv:'m7',  note:'A whole tone. The default scale step. Mild dissonance — pleasant in melody, restless in harmony.' },
  { st:3,  short:'m3',  name:'Minor Third',        ratio:'6:5',     class:'imperfect', inv:'M6',  note:'Defines minor quality. Rich, melancholic. The 19-cent flat third gives the blues its bite.' },
  { st:4,  short:'M3',  name:'Major Third',        ratio:'5:4',     class:'imperfect', inv:'m6',  note:'Defines major quality. Bright, open, slightly sharp in equal temperament vs. just intonation.' },
  { st:5,  short:'P4',  name:'Perfect Fourth',     ratio:'4:3',     class:'perfect',   inv:'P5',  note:'Stable but ambiguous — a consonance against the bass, a dissonance above another voice. Foundation of quartal harmony.' },
  { st:6,  short:'TT',  name:'Tritone (♯4 / ♭5)',  ratio:'45:32',   class:'sharp',     inv:'TT',  note:'Six semitones — half an octave. Symmetrical, restless, the engine of the dominant 7th chord. Once called "diabolus in musica."' },
  { st:7,  short:'P5',  name:'Perfect Fifth',      ratio:'3:2',     class:'perfect',   inv:'P4',  note:'The most stable interval after the octave. The skeleton of every triad. The cycle of fifths organizes Western harmony.' },
  { st:8,  short:'m6',  name:'Minor Sixth',        ratio:'8:5',     class:'imperfect', inv:'M3',  note:'Inversion of the major third. Soulful, longing. Common in Romantic-era melody.' },
  { st:9,  short:'M6',  name:'Major Sixth',        ratio:'5:3',     class:'imperfect', inv:'m3',  note:'Inversion of the minor third. Lyrical, sweet — the opening leap of "My Bonnie Lies Over the Ocean."' },
  { st:10, short:'m7',  name:'Minor Seventh',      ratio:'9:5',     class:'mild',      inv:'M2',  note:'The signature interval of the dominant 7th chord. Wants to resolve down a step.' },
  { st:11, short:'M7',  name:'Major Seventh',      ratio:'15:8',    class:'mild',      inv:'m2',  note:'A semitone shy of the octave. Lush, expectant — the defining color of the maj7 chord.' },
  { st:12, short:'P8',  name:'Perfect Octave',     ratio:'2:1',     class:'perfect',   inv:'P1',  note:'Frequencies in 2:1 ratio. Universally perceived as the same pitch class.' },
  // Compound intervals (above the octave)
  { st:13, short:'♭9',  name:'Minor Ninth',        ratio:'—',       class:'sharp',     inv:'—',   note:'Compound m2. As a chord tone (7♭9) it adds Phrygian/Spanish color. As an avoid note over major, it clashes harshly.' },
  { st:14, short:'9',   name:'Major Ninth',        ratio:'—',       class:'mild',      inv:'—',   note:'Compound M2. Universally welcome on most chord types — "the friendly extension."' },
  { st:15, short:'♯9',  name:'Augmented Ninth',    ratio:'—',       class:'sharp',     inv:'—',   note:'Compound m3 / blue note. The Hendrix chord (E7♯9) crystallizes this — both major and minor 3rd in one stack.' },
  { st:17, short:'11',  name:'Perfect Eleventh',   ratio:'—',       class:'mild',      inv:'—',   note:'Compound P4. Avoid note over major chords (clashes with the 3rd) but welcome on minor and sus chords.' },
  { st:18, short:'♯11', name:'Augmented Eleventh', ratio:'—',       class:'mild',      inv:'—',   note:'Compound TT. The Lydian color — adds shimmer to maj7 and dom7 chords without clashing.' },
  { st:20, short:'♭13', name:'Minor Thirteenth',   ratio:'—',       class:'sharp',     inv:'—',   note:'Compound m6. Borrowed from Mixolydian ♭6 / harmonic minor — a signature altered-dominant tension.' },
  { st:21, short:'13',  name:'Major Thirteenth',   ratio:'—',       class:'imperfect', inv:'—',   note:'Compound M6. Bloomy, complete — typically replaces the 5th in a 13th chord voicing.' },
];

// ═══════════════════════════════════════════════════════════════════════
//  SCALES — comprehensive
// ═══════════════════════════════════════════════════════════════════════

const SCALES = {
  // ── Diatonic / Major modes ──
  ionian:      { name:'Ionian (Major)',      family:'Diatonic Modes', steps:[0,2,4,5,7,9,11],   degrees:['1','2','3','4','5','6','7'],         char:'7→1', desc:'The major scale. Stable, complete, the home of tonal music.', uses:'Major and maj7 chords (I, IV).' },
  dorian:      { name:'Dorian',              family:'Diatonic Modes', steps:[0,2,3,5,7,9,10],   degrees:['1','2','♭3','4','5','6','♭7'],       char:'♮6',  desc:'Minor scale with a raised 6. Bright minor — funk, modal jazz, Carlos Santana, "Scarborough Fair".', uses:'Minor and m7 chords (ii in major, i in modal contexts).' },
  phrygian:    { name:'Phrygian',            family:'Diatonic Modes', steps:[0,1,3,5,7,8,10],   degrees:['1','♭2','♭3','4','5','♭6','♭7'],     char:'♭2',  desc:'Minor scale with a flat 2. Spanish, Middle Eastern flavor; dark and exotic.', uses:'Minor chords; sus(♭9) chords.' },
  lydian:      { name:'Lydian',              family:'Diatonic Modes', steps:[0,2,4,6,7,9,11],   degrees:['1','2','3','♯4','5','6','7'],        char:'♯4',  desc:'Major scale with a sharp 4. Floating, otherworldly. The "movie soundtrack" sound.', uses:'Maj7 and maj7♯11 chords (IV in major, often replaces Ionian).' },

    [{s:0,f:0},{rest:true},{s:0,f:0},{s:0,f:1},{s:0,f:0},{rest:true},{s:0,f:0},{s:0,f:6},{s:0,f:0},{rest:true},{s:0,f:0},{s:0,f:3},{s:0,f:0},{s:0,f:1},{rest:true},{s:0,f:0}],
    [{s:0,f:0},{s:2,f:7},{s:0,f:0},{s:3,f:9},{s:0,f:0},{s:1,f:5},{s:0,f:0},{s:4,f:8},{s:0,f:0},{s:2,f:7},{s:0,f:0},{s:3,f:9},{s:0,f:0},{s:1,f:5},{s:0,f:0},{rest:true}],
  ],
  'math-clean': [
    [{s:2,f:7},{s:4,f:7},{s:3,f:6},{s:5,f:7},{s:2,f:9},{s:4,f:9},{s:3,f:8},{s:5,f:9},{s:2,f:11},{s:4,f:10},{s:3,f:9},{s:5,f:11},{s:2,f:9},{s:4,f:9},{s:3,f:8},{s:5,f:9}],
    [{s:2,f:4},{s:5,f:4},{s:3,f:6},{s:4,f:5},{s:2,f:6},{s:5,f:7},{s:3,f:8},{s:4,f:7},{s:2,f:7},{s:5,f:9},{s:3,f:9},{s:4,f:10},{s:2,f:6},{s:5,f:7},{s:3,f:8},{s:4,f:7}],
  ],
};

function cloneRiffStep(step) {
  if (step.rest) return { rest:true };
  if (step.notes) return { notes: step.notes.map(n => ({ s:n.s, f:n.f })) };
  return { s:step.s, f:step.f };
}

function transposeRiffStep(step, amount) {
  const clampFret = f => Math.max(0, Math.min(22, f + amount));
  if (step.rest) return { rest:true };
  if (step.notes) return { notes: step.notes.map(n => ({ s:n.s, f:clampFret(n.f) })) };
  return { s:step.s, f:clampFret(step.f) };
}

function rotateRiffSteps(steps, amount) {
  if (!steps.length) return steps;
  const n = amount % steps.length;
  return [...steps.slice(n), ...steps.slice(0, n)];
}

function expandRiffSteps(base, variant) {
  let steps = base.map(cloneRiffStep);
  if (variant % 3 === 1) steps = rotateRiffSteps(steps, 2);
  if (variant % 3 === 2) steps = [...steps.slice(0, 8), ...steps.slice(4, 12), ...steps.slice(8, 16)];
  const transpose = [-2, 0, 2, 3, 5][variant % 5];
  steps = steps.map(step => transposeRiffStep(step, transpose));
  // Make every study at least two bars long; longer entries feel more musical than one-cell drills.
  if (steps.length < 24) steps = [...steps, ...steps.slice(0, Math.min(16, steps.length))];
  return steps.slice(0, 32);
}

function buildRockRiffStudies() {
  const studies = [];
  ROCK_RIFF_CATEGORIES.forEach(cat => {
    const patterns = ROCK_RIFF_PATTERNS[cat.id] || ROCK_RIFF_PATTERNS['hard-rock'];
    for (let i = 0; i < cat.count; i++) {
      const base = patterns[i % patterns.length];
      const steps = expandRiffSteps(base, i);
      const suffixes = ['Core hook','Answer phrase','Turnaround cell','Position shift','Performance loop','Syncopated answer','Register lift','Variation pass'];
      studies.push({
        id:`${cat.id}-${i + 1}`,
        categoryId:cat.id,
        category:cat.name,
        era:cat.era,
        title:`${cat.name} ${i + 1}: ${suffixes[i % suffixes.length]}`,
        refs:cat.refs,
        concepts:cat.concepts,
        scale:cat.scale,
        bpm:cat.bpm + ((i % 3) - 1) * 6,
        difficulty: i < 2 ? 'Intermediate' : i < 4 ? 'Upper-intermediate' : 'Advanced',
        steps,
        theory:`Listen for ${cat.concepts[0]} and connect it to the active Jam key. Move the same contour through I, IV, and V or through the current loop's roots.`,
        variation:`Make it yours: change the last four attacks, then answer the riff one octave or one string set higher.`,
        technique:`Focus: ${cat.concepts.join(' · ')}. Keep time strict before adding speed.`
      });
    }
  });
  return studies;
}

const ROCK_RIFF_STUDIES = buildRockRiffStudies();

function riffStepNotes(step) {
  if (!step || step.rest) return [];
  return step.notes || [step];
}

function renderRiffTab(steps) {
  const rows = STRING_LABELS.map(name => ({ name, cells: [] }));
  steps.forEach(step => {
    const notes = riffStepNotes(step);
    rows.forEach((row, s) => {
      const note = notes.find(n => n.s === s);
      if (step.rest) row.cells.push('--');
      else if (note) row.cells.push(String(note.f).padStart(2, '-'));
      else row.cells.push('--');
    });
  });
  return rows.slice().reverse().map(row => `${row.name}|${row.cells.join('-')}|`).join('\n');
}

function stepMidi(stepNote) {
  return TUNING[stepNote.s] + stepNote.f;
}

function RockRiffLab({ audio }) {
  const [categoryId, setCategoryId] = useState(ROCK_RIFF_CATEGORIES[0].id);
  const [activeId, setActiveId] = useState(ROCK_RIFF_STUDIES[0].id);
  const [query, setQuery] = useState('');
  const [bpm, setBpm] = useState(ROCK_RIFF_STUDIES[0].bpm);
  const [isPlaying, setIsPlaying] = useState(false);
  const [activeStep, setActiveStep] = useState(-1);
  const riffPlayRef = useRef({ cancelled:false });

  const visibleRiffs = useMemo(() => {
    const q = query.trim().toLowerCase();
    return ROCK_RIFF_STUDIES.filter(r => {
      if (categoryId !== 'all' && r.categoryId !== categoryId) return false;
      if (!q) return true;
      return [r.title, r.category, r.era, r.refs, r.difficulty, r.concepts.join(' ')].join(' ').toLowerCase().includes(q);
    });
  }, [categoryId, query]);

  const activeRiff = ROCK_RIFF_STUDIES.find(r => r.id === activeId) || visibleRiffs[0] || ROCK_RIFF_STUDIES[0];

  useEffect(() => {
    if (!visibleRiffs.find(r => r.id === activeId) && visibleRiffs[0]) {
      setActiveId(visibleRiffs[0].id);
    }
  }, [categoryId, query]);

  useEffect(() => {
    riffPlayRef.current.cancelled = true;
    setIsPlaying(false);
    setActiveStep(-1);
    setBpm(activeRiff.bpm || 110);
  }, [activeRiff.id]);

  useEffect(() => () => { riffPlayRef.current.cancelled = true; }, []);

  const positionMap = useMemo(() => {
    const m = new Map();
    activeRiff.steps.forEach((step, idx) => {
      riffStepNotes(step).forEach(note => {
        const key = `${note.s}:${note.f}`;
        const isActive = idx === activeStep;
        const existing = m.get(key);
        if (!existing || isActive) {
          m.set(key, { label: isActive ? '▶' : String(note.f), bg: isActive ? 'var(--gold)' : '#8a6d4a' });
        }
      });
    });
    return m;
  }, [activeRiff, activeStep]);

  const maxFret = useMemo(() => {
    let mx = 12;
    activeRiff.steps.forEach(step => riffStepNotes(step).forEach(n => { mx = Math.max(mx, n.f); }));
    return Math.min(24, Math.max(15, mx));
  }, [activeRiff]);

  const playRiff = async () => {
    if (!audio) return;
    if (isPlaying) {
      riffPlayRef.current.cancelled = true;
      setIsPlaying(false);
      setActiveStep(-1);
      return;
    }
    const token = { cancelled:false };
    riffPlayRef.current = token;
    setIsPlaying(true);
    const safeBpm = Math.max(40, Math.min(240, Number(bpm) || activeRiff.bpm || 110));
    const stepMs = (60000 / safeBpm) / 2; // eighth-note grid
    for (let i = 0; i < activeRiff.steps.length; i++) {
      if (token.cancelled) return;
      const step = activeRiff.steps[i];
      setActiveStep(i);
      const notes = riffStepNotes(step);
      if (notes.length === 1) {
        await audio.playNote(stepMidi(notes[0]), Math.max(0.08, stepMs / 1000 * 0.72) + 's');
      } else if (notes.length > 1) {
        await audio.playChord(notes.map(stepMidi), Math.max(0.1, stepMs / 1000 * 0.82) + 's');
      }
      await new Promise(r => setTimeout(r, stepMs));
    }
    if (!token.cancelled) {
      setIsPlaying(false);
      setActiveStep(-1);
    }
  };

  const categoryCounts = useMemo(() => {
    const out = {};
    ROCK_RIFF_STUDIES.forEach(r => { out[r.categoryId] = (out[r.categoryId] || 0) + 1; });
    return out;
  }, []);

  return (
    <Card style={{ padding:18, marginTop:18, marginBottom:16, background:'var(--paper-3)', borderColor:'var(--burgundy)' }}>
      <div className="small-caps" style={{ fontSize:10, color:'var(--burgundy)', marginBottom:6 }}>Rock riff lab</div>
      <h3 className="font-display" style={{ fontSize:28, fontStyle:'italic', marginBottom:6 }}>100 original rock riff studies</h3>
      <p style={{ fontSize:13.5, color:'var(--ink-2)', lineHeight:1.6, maxWidth:760, marginBottom:12 }}>
        A categorized riff vocabulary lab for Jam practice. These are original studies by era/style — not copied famous-song tabs — so you can learn the mechanics behind classic and modern rock riff writing, then apply them to the active loop.
      </p>

      <div style={{ display:'grid', gridTemplateColumns:'minmax(210px, 300px) minmax(0, 1fr)', gap:14 }}>
        <div>
          <div style={{ display:'flex', gap:6, marginBottom:8 }}>
            <button onClick={() => setCategoryId('all')} style={{ ...btnInline(categoryId === 'all' ? 'var(--burgundy)' : 'var(--ink)'), flex:'0 0 auto' }}>All 100</button>
            <input value={query} onChange={e => setQuery(e.target.value)} placeholder="Search riffs / artists / concepts" style={{ flex:1, minWidth:0, padding:'7px 8px', border:'1px solid var(--rule)', background:'var(--paper)', color:'var(--ink)', fontFamily:"'EB Garamond', serif", fontSize:13 }} />
          </div>
          <div style={{ maxHeight:360, overflowY:'auto', paddingRight:4 }}>
            {ROCK_RIFF_CATEGORIES.map(cat => (
              <button key={cat.id} onClick={() => setCategoryId(cat.id)} style={{ width:'100%', textAlign:'left', marginBottom:5, padding:'8px 9px', border:'1px solid var(--rule)', borderRadius:2, background: categoryId === cat.id ? 'var(--burgundy)' : 'var(--paper)', color: categoryId === cat.id ? 'var(--paper)' : 'var(--ink)' }}>
                <div className="font-display" style={{ fontSize:15, fontStyle:'italic' }}>{cat.name}</div>
                <div className="font-mono" style={{ fontSize:8, letterSpacing:'0.1em', textTransform:'uppercase', opacity:0.75 }}>{cat.era} · {categoryCounts[cat.id] || 0} studies</div>
              </button>
            ))}
          </div>
        </div>

        <div>
          <div style={{ display:'flex', flexWrap:'wrap', gap:4, marginBottom:10 }}>
            {visibleRiffs.slice(0, 40).map(r => (
              <button key={r.id} onClick={() => setActiveId(r.id)} style={{ padding:'5px 8px', border:'1px solid var(--burgundy)', borderRadius:2, background: activeRiff.id === r.id ? 'var(--burgundy)' : 'var(--paper)', color: activeRiff.id === r.id ? 'var(--paper)' : 'var(--ink)', fontFamily:"'EB Garamond', serif", fontSize:12 }}>
                {r.title.replace(r.category + ' ', '')}
              </button>
            ))}
          </div>

          <Card style={{ padding:14, background:'var(--paper)' }}>
            <div className="small-caps" style={{ fontSize:9, color:'var(--gold)', marginBottom:5 }}>{activeRiff.category} · {activeRiff.era} · {activeRiff.difficulty}</div>
            <h4 className="font-display" style={{ fontSize:22, fontStyle:'italic', marginBottom:5 }}>{activeRiff.title}</h4>
            <p style={{ fontSize:12.6, color:'var(--ink-3)', lineHeight:1.45, marginBottom:10 }}>Reference vocabulary: {activeRiff.refs}. This is an original study, not a copied riff.</p>
            <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fit, minmax(190px, 1fr))', gap:8, marginBottom:10 }}>
              <div style={{ padding:9, background:'var(--paper-3)', border:'1px solid var(--rule)' }}><div className="small-caps" style={{ fontSize:8, color:'var(--burgundy)', marginBottom:4 }}>Technique</div><p style={{ fontSize:12.5, color:'var(--ink-2)', lineHeight:1.45 }}>{activeRiff.technique}</p></div>
              <div style={{ padding:9, background:'var(--paper-3)', border:'1px solid var(--rule)' }}><div className="small-caps" style={{ fontSize:8, color:'var(--burgundy)', marginBottom:4 }}>Theory / jam use</div><p style={{ fontSize:12.5, color:'var(--ink-2)', lineHeight:1.45 }}>{activeRiff.theory}</p></div>
              <div style={{ padding:9, background:'var(--paper-3)', border:'1px solid var(--rule)' }}><div className="small-caps" style={{ fontSize:8, color:'var(--burgundy)', marginBottom:4 }}>Variation</div><p style={{ fontSize:12.5, color:'var(--ink-2)', lineHeight:1.45 }}>{activeRiff.variation}</p></div>
            </div>

            <div style={{ display:'flex', alignItems:'center', gap:9, flexWrap:'wrap', marginBottom:10 }}>
              <span className="small-caps" style={{ fontSize:9, color:'var(--ink-3)' }}>BPM</span>
              <button onClick={() => setBpm(v => Math.max(40, v - 5))} disabled={isPlaying} style={{ width:30, height:30, border:'1px solid var(--ink)', borderRadius:2, background:'var(--paper)', color:'var(--ink)', fontFamily:"'JetBrains Mono', monospace" }}>−</button>
              <input type="number" min="40" max="240" disabled={isPlaying} value={bpm} onChange={e => setBpm(Math.max(40, Math.min(240, Number(e.target.value) || activeRiff.bpm || 110)))} style={{ width:60, padding:'5px 6px', border:'1px solid var(--rule)', background:'var(--paper-2)', color:'var(--ink)', fontFamily:"'JetBrains Mono', monospace", fontSize:12, textAlign:'center' }} />
              <button onClick={() => setBpm(v => Math.min(240, v + 5))} disabled={isPlaying} style={{ width:30, height:30, border:'1px solid var(--ink)', borderRadius:2, background:'var(--paper)', color:'var(--ink)', fontFamily:"'JetBrains Mono', monospace" }}>+</button>
              <button onClick={playRiff} style={{ ...btnInline(isPlaying ? 'var(--burgundy)' : 'var(--sage)'), padding:'9px 12px', marginLeft:'auto' }}>{isPlaying ? '■ Stop riff' : '▶ Play riff'}</button>
              <span className="font-mono" style={{ fontSize:9, color:'var(--ink-4)', letterSpacing:'0.08em', textTransform:'uppercase' }}>{activeRiff.steps.length} events · eighth-note grid</span>
            </div>

            <GuitarFretboard
              positions={positionMap}
              numFrets={maxFret}
              label={isPlaying && activeStep >= 0 ? `Rock Riff Lab · event ${activeStep + 1} / ${activeRiff.steps.length}` : 'Rock Riff Lab fretboard map'}
              audio={audio}
              playAllNotes={false}
              compact={maxFret > 18}
            />
            <pre style={{ marginTop:10, padding:10, background:'#21170d', color:'#f7f0dc', borderRadius:2, overflowX:'auto', fontFamily:"'JetBrains Mono', monospace", fontSize:10, lineHeight:1.65 }}>{renderRiffTab(activeRiff.steps)}</pre>
          </Card>
        </div>
      </div>
    </Card>
  );
}

// ═══════════════════════════════════════════════════════════════════════
//  GUITAR — for fretboard rendering
// ═══════════════════════════════════════════════════════════════════════

const TUNING = [40, 45, 50, 55, 59, 64]; // E A D G B e (low → high), MIDI
const STRING_LABELS = ['E','A','D','G','B','e'];

// Common guitar voicings for chord-to-frets rendering, by chord key + root
// Returns null if no voicing known. Just give a few essentials.
const GUITAR_SHAPES = {
  // chordKey:rootPc[:inversion] -> [low E, A, D, G, B, e]   (-1 = mute, 0 = open)
  // No :inversion suffix = root position (inversion 0)
  'power:4':  [0,2,2,-1,-1,-1],   // E5
  'power:9':  [-1,0,2,2,-1,-1],   // A5
  'power:2':  [-1,-1,0,2,3,-1],   // D5
  'power:7':  [3,5,5,-1,-1,-1],   // G5
  'power:0':  [-1,3,5,5,-1,-1],   // C5
  'power8:4': [0,2,2,2,-1,-1],    // E5(8)
  'power8:9': [-1,0,2,2,2,-1],    // A5(8)
  'sus2sus4:9': [-1,0,2,2,3,0],   // A sus2sus4
  'sus2sus4:2': [-1,-1,0,2,3,0],  // D sus2sus4 (open)

  // ── Major triad — root position + inversions ──
  'maj:0':   [-1,3,2,0,1,0],     // C major (root)
  'maj:0:1': [-1,-1,2,0,1,3],    // C/E (3rd in bass)
  'maj:0:2': [3,3,2,0,1,0],      // C/G (5th in bass)
  'maj:7':   [3,2,0,0,0,3],      // G major (root)
  'maj:7:1': [-1,-1,5,4,3,3],    // G/B (3rd in bass)
  'maj:7:2': [-1,-1,5,4,3,7],    // G/D (5th in bass) — alt: just play with D bass
  'maj:9':   [-1,0,2,2,2,0],     // A major (root)
  'maj:9:1': [-1,-1,-1,6,5,5],   // A/C# (3rd in bass)
  'maj:9:2': [-1,-1,-1,6,5,9],   // A/E (5th in bass)
  'maj:2':   [-1,-1,0,2,3,2],    // D major (root)
  'maj:2:1': [-1,-1,4,2,3,2],    // D/F# (3rd in bass)
  'maj:2:2': [-1,-1,5,4,3,5],    // D/A (5th in bass)
  'maj:4':   [0,2,2,1,0,0],      // E major (root)
  'maj:4:1': [-1,-1,1,1,0,0],    // E/G# (3rd in bass)
  'maj:4:2': [-1,-1,2,1,0,0],    // E/B
  'maj:5':   [1,3,3,2,1,1],      // F major (barre, root)
  'maj:5:1': [-1,-1,3,2,1,1],    // F/A (3rd in bass)

  // ── Minor triad — root position + inversions ──
  'min:9':   [-1,0,2,2,1,0],     // A minor (root)
  'min:9:1': [-1,3,2,2,1,0],     // Am/C (3rd in bass)
  'min:9:2': [0,0,2,2,1,0],      // Am/E (5th in bass)
  'min:4':   [0,2,2,0,0,0],      // E minor (root)
  'min:4:1': [-1,-1,2,0,0,3],    // Em/G (3rd in bass)
  'min:4:2': [-1,-1,2,0,0,0],    // Em/B
  'min:2':   [-1,-1,0,2,3,1],    // D minor (root)
  'min:2:1': [-1,-1,3,2,3,1],    // Dm/F
  'min:2:2': [-1,0,0,2,3,1],     // Dm/A
  'min:0':   [-1,3,5,5,4,3],     // C minor (root, barre)
  'min:0:1': [-1,-1,1,0,4,3],    // Cm/Eb
  'min:0:2': [3,-1,1,0,4,3],     // Cm/G
  'min:7':   [3,5,5,3,3,3],      // G minor (barre, root)
  'min:7:1': [-1,-1,5,3,3,3],    // Gm/Bb

  // ── Maj7 — root position + inversions ──
  'maj7:0':   [-1,3,2,0,0,0],    // Cmaj7 (root)
  'maj7:0:1': [-1,-1,2,4,5,3],   // Cmaj7/E
  'maj7:0:2': [3,3,2,4,5,3],     // Cmaj7/G
  'maj7:0:3': [-1,2,2,4,5,3],    // Cmaj7/B
  'maj7:5':   [-1,-1,3,2,1,0],   // Fmaj7 (root)
  'maj7:5:1': [-1,0,3,2,1,0],    // Fmaj7/A
  'maj7:7':   [3,-1,4,4,3,2],    // Gmaj7
  'maj7:9':   [-1,0,2,1,2,0],    // Amaj7

  // ── m7 — root position + inversions ──
  'm7:9':   [-1,0,2,0,1,0],      // Am7 (root)
  'm7:9:1': [-1,3,2,0,1,0],      // Am7/C
  'm7:9:2': [-1,-1,2,0,1,3],     // Am7/E
  'm7:9:3': [-1,-1,-1,5,5,5],    // Am7/G
  'm7:4':   [0,2,0,0,0,0],       // Em7
  'm7:2':   [-1,-1,0,2,1,1],     // Dm7
  'm7:7':   [3,5,3,3,3,3],       // Gm7

  // ── dom7 — root position + inversions ──
  'dom7:9':   [-1,0,2,0,2,0],    // A7 (root)
  'dom7:9:1': [-1,-1,2,0,2,3],   // A7/C#
  'dom7:9:2': [-1,-1,-1,5,5,5],  // A7/E
  'dom7:9:3': [-1,-1,-1,5,5,8],  // A7/G
  'dom7:7':   [3,2,0,0,0,1],     // G7 (root)
  'dom7:7:1': [-1,2,3,4,3,1],    // G7/B
  'dom7:2':   [-1,-1,0,2,1,2],   // D7
  'dom7:4':   [0,2,0,1,0,0],     // E7
  'dom7:0':   [-1,3,2,3,1,0],    // C7

  '7#9:4':  [0,7,6,7,8,-1],   // E7#9 (Hendrix), at 6th fret
  'sus2:9': [-1,0,2,2,0,0],   // Asus2
  'sus2:2': [-1,-1,0,2,3,0],  // Dsus2
  'sus4:2': [-1,-1,0,2,3,3],  // Dsus4
  'sus4:9': [-1,0,2,2,3,0],   // Asus4
  'add9:0': [-1,3,2,0,3,0],   // Cadd9
  'm7b5:11':[-1,2,3,2,3,-1],  // Bm7b5
  'dim7:2': [-1,-1,0,1,0,1],  // D°7
  'six:0':  [-1,3,2,2,1,0],   // C6
  '9:4':    [-1,7,6,7,7,7],   // E9 funk barre at 6
};

// Build chord voicing from chord key + root pc + inversion; fall back if no shape stored
function getGuitarShape(chordKey, rootPc, inversion = 0) {
  const key = inversion === 0
    ? chordKey + ':' + rootPc
    : chordKey + ':' + rootPc + ':' + inversion;
  return GUITAR_SHAPES[key] || null;
}

// ═══════════════════════════════════════════════════════════════════════
//  AUDIO ENGINE
// ═══════════════════════════════════════════════════════════════════════

function useAudio() {
  const synthRef = useRef(null);
  const reverbRef = useRef(null);
  const filterRef = useRef(null);
  const compressorRef = useRef(null);
  const driveRef = useRef(null);
  const [samplerLoaded, setSamplerLoaded] = useState(false);
  const startedRef = useRef(false);

  useEffect(() => {
    // Mobile Safari/Chrome will not allow WebAudio until the user touches the page.
    // This one-time unlock makes the first real play button far more reliable on iPhone.
    const unlock = async () => {
      try {
        if (window.Tone && Tone.context && Tone.context.state !== 'running') await Tone.start();
        startedRef.current = true;
      } catch (e) {}
    };
    window.addEventListener('pointerdown', unlock, { once:true, passive:true });
    window.addEventListener('touchend', unlock, { once:true, passive:true });
    return () => {
      window.removeEventListener('pointerdown', unlock);
      window.removeEventListener('touchend', unlock);
    };
  }, []);

  useEffect(() => {
    // Self-contained electric-guitar-style synth: brighter pick attack, more sustain,
    // mild overdrive, amp/cab filtering, compression, and a small room tail.
    // It is still synthesized audio, but it should feel much less piano-like.
    reverbRef.current = new Tone.Reverb({ decay: 2.8, wet: 0.13 }).toDestination();
    compressorRef.current = new Tone.Compressor({ threshold: -28, ratio: 5.5, attack: 0.003, release: 0.42 });
    filterRef.current = new Tone.Filter({ type: 'lowpass', frequency: 5200, Q: 0.7 });
    driveRef.current = new Tone.Distortion({ distortion: 0.31, wet: 0.36 });

    synthRef.current = new Tone.PolySynth(Tone.MonoSynth, {
      oscillator: { type: 'fatsawtooth', count: 3, spread: 18 },
      filter: { type: 'lowpass', Q: 1.8 },
      envelope: { attack: 0.002, decay: 0.22, sustain: 0.58, release: 1.35 },
      filterEnvelope: { attack: 0.001, decay: 0.13, sustain: 0.34, release: 0.95, baseFrequency: 1150, octaves: 2.9 },
    });
    synthRef.current.volume.value = -20;
    synthRef.current.connect(driveRef.current);
    driveRef.current.connect(filterRef.current);
    filterRef.current.connect(compressorRef.current);
    compressorRef.current.connect(reverbRef.current);
    setSamplerLoaded(true);

    return () => {
      synthRef.current?.dispose();
      driveRef.current?.dispose();
      filterRef.current?.dispose();
      compressorRef.current?.dispose();
      reverbRef.current?.dispose();
    };
  }, []);

  const ensureStarted = useCallback(async () => {
    if (!startedRef.current) {
      if (Tone.context.state !== 'running') await Tone.start();
      startedRef.current = true;
    }
  }, []);

  const inst = useCallback(() => synthRef.current, []);

  const playNote = useCallback(async (midi, dur='8n') => {
    await ensureStarted();
    const i = inst();
    if (!i) return;
    i.triggerAttackRelease(midiToName(midi), dur);
  }, [ensureStarted, inst]);

  const playChord = useCallback(async (midis, dur='2n') => {
    await ensureStarted();
    const i = inst();
    if (!i) return;
    const t0 = Tone.now() + 0.03;
    // Tiny stagger = guitar strum instead of piano block chord.
    midis.forEach((m, k) => i.triggerAttackRelease(midiToName(m), dur, t0 + k * 0.018));
  }, [ensureStarted, inst]);

  const arpeggiate = useCallback(async (midis, gap=0.16, dur='8n') => {
    await ensureStarted();
    const i = inst();
    if (!i) return;
    const t0 = Tone.now() + 0.05;
    midis.forEach((m, k) => i.triggerAttackRelease(midiToName(m), dur, t0 + k * gap));
  }, [ensureStarted, inst]);

  const playSequence = useCallback(async (chordList, beat=0.85, decay=0.95) => {
    await ensureStarted();
    const i = inst();
    if (!i) return;
    const t0 = Tone.now() + 0.05;
    chordList.forEach((notes, k) => {
      notes.forEach((m, j) => i.triggerAttackRelease(midiToName(m), beat * decay, t0 + k * beat + j * 0.015));
    });
  }, [ensureStarted, inst]);

  return { samplerLoaded, playNote, playChord, arpeggiate, playSequence };
}

const STORAGE_KEY = 'tertian:favorites:v1';

function useFavorites() {
  const [favs, setFavs] = useState({ chords: [], scales: [], harmony: [], completedWeeks: [], currentWeek: 1 });
  const [loaded, setLoaded] = useState(false);

  useEffect(() => {
    (async () => {
      try {
        let loadedData = null;
        if (window.storage) {
          const r = await window.storage.get(STORAGE_KEY);
          if (r && r.value) loadedData = JSON.parse(r.value);
        } else if (typeof localStorage !== 'undefined') {
          const v = localStorage.getItem(STORAGE_KEY);
          if (v) loadedData = JSON.parse(v);
        }
        if (loadedData) {
          setFavs({
            chords: loadedData.chords || [],
            scales: loadedData.scales || [],
            harmony: loadedData.harmony || [],
            completedWeeks: loadedData.completedWeeks || [],
            currentWeek: loadedData.currentWeek || 1,
          });
        }
      } catch (e) {}
      setLoaded(true);
    })();
  }, []);

  useEffect(() => {
    if (!loaded) return;
    (async () => {
      try {
        if (window.storage) {
          await window.storage.set(STORAGE_KEY, JSON.stringify(favs));
        } else if (typeof localStorage !== 'undefined') {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(favs));
        }
      } catch (e) {}
    })();
  }, [favs, loaded]);

  const toggle = (cat, id) => {
    setFavs(f => {
      const list = f[cat] || [];
      const next = list.includes(id) ? list.filter(x => x !== id) : [...list, id];
      return { ...f, [cat]: next };
    });
  };

  const has = (cat, id) => (favs[cat] || []).includes(id);

  const setCurrentWeek = (n) => setFavs(f => ({ ...f, currentWeek: n }));
  const toggleWeekComplete = (n) => setFavs(f => {
    const list = f.completedWeeks || [];
    const next = list.includes(n) ? list.filter(x => x !== n) : [...list, n];
    return { ...f, completedWeeks: next };
  });

  return { favs, toggle, has, setCurrentWeek, toggleWeekComplete };
}

const PRACTICE_LOG_KEY = 'tertian:practice-log:v1';
const CHECKLIST_KEY = 'tertian:advanced-checklist:v1';
const todayKey = () => {
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return y + '-' + m + '-' + day;
};

function safeJsonLoad(key, fallback) {
  try {
    if (typeof localStorage === 'undefined') return fallback;
    const raw = localStorage.getItem(key);
    return raw ? JSON.parse(raw) : fallback;
  } catch (e) { return fallback; }
}

function safeJsonSave(key, value) {
  try {
    if (typeof localStorage !== 'undefined') localStorage.setItem(key, JSON.stringify(value));
  } catch (e) {}
}

function usePracticeLog() {
  const [entries, setEntries] = useState(() => safeJsonLoad(PRACTICE_LOG_KEY, {}));
  useEffect(() => { safeJsonSave(PRACTICE_LOG_KEY, entries); }, [entries]);
  const saveEntry = entry => {
    const key = entry.date || todayKey();
    setEntries(prev => ({ ...prev, [key]: { ...entry, date:key, updatedAt: Date.now() } }));
  };
  return { entries, saveEntry };
}

function useAdvancedChecklist() {
  const [done, setDone] = useState(() => safeJsonLoad(CHECKLIST_KEY, []));
  useEffect(() => { safeJsonSave(CHECKLIST_KEY, done); }, [done]);
  const toggle = id => setDone(prev => prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]);
  return { done, toggle };
}

// ═══════════════════════════════════════════════════════════════════════
//  GUITAR FRETBOARD COMPONENT
// ═══════════════════════════════════════════════════════════════════════

function GuitarFretboard({ highlights = new Map(), positions = null, rootPc = null, useFlats = false, numFrets = 15, label, audio = null, playAllNotes = false, playAllLabel = 'Play every shown note', playAllOrder = 'neck', playAllReturn = false, playAllGapMs = 105, playAllGroupGapMs = 240, playAllStepDur = null, defaultBpm = 90, compact = false }) {
  // strings high → low for display (top of screen = high e)
  const stringsDisplay = [...TUNING].reverse();
  const stringNamesDisplay = [...STRING_LABELS].reverse();
  const fretMarkers = new Set([3,5,7,9,15,17,19,21]);
  const dblMarkers = new Set([12,24]);
  const [viewportWidth, setViewportWidth] = useState(() => (typeof window !== 'undefined' ? window.innerWidth : 1024));
  useEffect(() => {
    if (typeof window === 'undefined') return;
    const onResize = () => setViewportWidth(window.innerWidth || 1024);
    window.addEventListener('resize', onResize);
    window.addEventListener('orientationchange', onResize);
    return () => {
      window.removeEventListener('resize', onResize);
      window.removeEventListener('orientationchange', onResize);
    };
  }, []);
  const isMobileViewport = viewportWidth <= 760;
  const isCompactBoard = compact || numFrets > 18 || isMobileViewport;
  const cellH = isCompactBoard ? (isMobileViewport ? 22 : 24) : 28;
  const fretCellMin = isCompactBoard ? (isMobileViewport ? 24 : 26) : (isMobileViewport ? 28 : 34);
  const noteDotSize = isCompactBoard ? (isMobileViewport ? 16 : 18) : (isMobileViewport ? 20 : 22);
  const noteFontSize = isCompactBoard ? (isMobileViewport ? 7 : 8) : 9;
  const boardMinWidth = isMobileViewport
    ? Math.max(Math.max(340, viewportWidth - 24), 30 + ((numFrets + 1) * fretCellMin))
    : Math.max(680, 30 + ((numFrets + 1) * fretCellMin));
  // positions map (string:fret keys) takes priority on a per-cell basis,
  // layered on top of pitch-class highlights. If no positions, behaves as before.
  const hasPositions = !!positions;
  const [activePlayKey, setActivePlayKey] = useState(null);
  const [isPlayingAll, setIsPlayingAll] = useState(false);
  const [activePlayIndex, setActivePlayIndex] = useState(-1);
  const [playBpm, setPlayBpm] = useState(defaultBpm);
  const playAllRef = useRef({ cancelled: false });

  useEffect(() => { setPlayBpm(defaultBpm); }, [defaultBpm]);

  const positionBand = useCallback((fret) => {
    // Five-fret boxes keep full-neck playback readable: open/1–4, 5–9, 10–14, 15–19, 20–24.
    if (fret <= 4) return 0;
    return Math.floor((fret - 5) / 5) + 1;
  }, []);

  const playableCells = useMemo(() => {
    const cells = [];
    for (let sIdxLow = 0; sIdxLow < TUNING.length; sIdxLow++) {
      for (let fret = 0; fret <= numFrets; fret++) {
        const midi = TUNING[sIdxLow] + fret;
        const pc = ((midi % 12) + 12) % 12;
        const key = `${sIdxLow}:${fret}`;
        const posHl = hasPositions ? positions.get(key) : null;
        const pcHl = highlights?.get(pc);
        if (posHl || pcHl) {
          cells.push({ key, midi, str: sIdxLow, fret, band: positionBand(fret), hl: posHl || pcHl });
        }
      }
    }

    const ordered = [...cells];
    const byPitchInBox = (a, b) =>
      a.band - b.band ||
      a.midi - b.midi ||
      a.str - b.str ||
      a.fret - b.fret;

    if (playAllOrder === 'string') {
      // Strict physical string sweep, useful for technique maps.
      ordered.sort((a, b) => a.str - b.str || a.fret - b.fret || a.midi - b.midi);
    } else if (playAllOrder === 'position' || playAllOrder === 'neck' || playAllOrder === 'flow') {
      // Default musical flow: play every visible note once, but in fretboard boxes rather than raw pitch order.
      // This avoids the old same-pitch duplicates jumping around the neck on scale/chord-tone maps.
      ordered.sort(byPitchInBox);
    } else if (playAllOrder === 'fret') {
      ordered.sort((a, b) => a.fret - b.fret || a.str - b.str || a.midi - b.midi);
    } else if (playAllOrder === 'pitch') {
      ordered.sort((a, b) => a.midi - b.midi || a.str - b.str || a.fret - b.fret);
    } else {
      ordered.sort(byPitchInBox);
    }
    return ordered;
  }, [highlights, positions, hasPositions, numFrets, playAllOrder, positionBand]);

  useEffect(() => () => { playAllRef.current.cancelled = true; }, []);

  const togglePlayEveryShownNote = async () => {
    if (!audio || !playableCells.length) return;
    if (isPlayingAll) {
      playAllRef.current.cancelled = true;
      setIsPlayingAll(false);
      setActivePlayKey(null);
      setActivePlayIndex(-1);
      return;
    }
    const token = { cancelled: false };
    playAllRef.current = token;
    setIsPlayingAll(true);
    const safeBpm = Math.max(30, Math.min(260, Number(playBpm) || 90));
    const beatMs = 60000 / safeBpm;
    // Default to readable eighth-notes; the BPM control now governs every full-fretboard playalong.
    const gapMs = Math.max(60, Math.round(beatMs / 2));
    const groupGapMs = Math.max(playAllGroupGapMs, Math.round(beatMs * 0.75));
    const noteDur = playAllStepDur || (Math.max(0.08, (beatMs / 1000) * 0.42) + 's');
    const sequence = playAllReturn && playableCells.length > 1
      ? [...playableCells, ...playableCells.slice(0, -1).reverse()]
      : playableCells;
    for (let i = 0; i < sequence.length; i++) {
      if (token.cancelled) return;
      const cell = sequence[i];
      const prev = sequence[i - 1];
      if (prev && cell.band !== prev.band) {
        await new Promise(r => setTimeout(r, groupGapMs));
      }
      setActivePlayKey(cell.key);
      setActivePlayIndex(i);
      await audio.playNote(cell.midi, noteDur);
      await new Promise(r => setTimeout(r, gapMs));
    }
    if (!token.cancelled) {
      setActivePlayKey(null);
      setActivePlayIndex(-1);
      setIsPlayingAll(false);
    }
  };

  return (
    <div style={{ background:'#fcf6e8', borderRadius:3, padding:'10px 8px', border:'1px solid var(--rule)' }}>
      {label && <div style={{ fontFamily:"'JetBrains Mono', monospace", fontSize:10, color:'var(--ink-3)', marginBottom:6, textAlign:'center', letterSpacing:'0.15em' }}>{label}</div>}
      {isCompactBoard && (
        <div className="font-mono" style={{ fontSize:9, color:'var(--ink-4)', letterSpacing:'0.08em', textTransform:'uppercase', textAlign:'center', marginBottom:6 }}>
          Compact 24-fret neck view · scroll horizontally if needed
        </div>
      )}
      {playAllNotes && audio && playableCells.length > 0 && (
        <div style={{ display:'flex', alignItems:'center', gap:8, justifyContent:'space-between', marginBottom:8, flexWrap:'wrap' }}>
          <button
            onClick={togglePlayEveryShownNote}
            style={{
              padding:'7px 10px', borderRadius:2,
              background: isPlayingAll ? 'var(--burgundy)' : 'var(--sage)',
              color:'var(--paper)', border:`1px solid ${isPlayingAll ? 'var(--burgundy)' : 'var(--sage)'}`,
              fontFamily:"'JetBrains Mono', monospace", fontSize:10,
              letterSpacing:'0.12em', textTransform:'uppercase',
            }}
          >{isPlayingAll ? '■ Stop full-neck' : `▶ ${playAllLabel}`}</button>
          <div style={{ display:'flex', alignItems:'center', gap:5, padding:'4px 6px', background:'var(--paper)', border:'1px solid var(--rule)', borderRadius:2 }}>
            <span className="small-caps" style={{ fontSize:8, color:'var(--ink-3)' }}>BPM</span>
            <button onClick={() => setPlayBpm(v => Math.max(30, v - 5))} disabled={isPlayingAll} style={{ width:noteDotSize, height:noteDotSize, border:'1px solid var(--ink)', borderRadius:2, background:'transparent', color:'var(--ink)', fontFamily:"'JetBrains Mono', monospace" }}>−</button>
            <input aria-label="Fretboard playback BPM" type="number" min="30" max="260" value={playBpm} disabled={isPlayingAll} onChange={e => setPlayBpm(Math.max(30, Math.min(260, Number(e.target.value) || 90)))} style={{ width:54, padding:'3px 4px', background:'var(--paper-2)', border:'1px solid var(--rule)', borderRadius:2, fontFamily:"'JetBrains Mono', monospace", fontSize:10, color:'var(--ink)', textAlign:'center' }} />
            <button onClick={() => setPlayBpm(v => Math.min(260, v + 5))} disabled={isPlayingAll} style={{ width:noteDotSize, height:noteDotSize, border:'1px solid var(--ink)', borderRadius:2, background:'transparent', color:'var(--ink)', fontFamily:"'JetBrains Mono', monospace" }}>+</button>
          </div>
          <span className="font-mono" style={{ fontSize:9, color:'var(--ink-4)', letterSpacing:'0.12em', textTransform:'uppercase' }}>
            {isPlayingAll && activePlayIndex >= 0 ? `note ${Math.min(activePlayIndex + 1, playableCells.length)} / ${playableCells.length} · ` : ''}{playableCells.length} visible notes · {playAllReturn ? 'up/down' : (playAllOrder === 'position' || playAllOrder === 'neck' || playAllOrder === 'flow' ? 'position-box flow' : playAllOrder === 'string' ? 'string sweep' : playAllOrder === 'fret' ? 'by fret' : 'pitch ladder')}
          </span>
          <span className="font-mono" style={{ fontSize:9, color:'var(--ink-4)', letterSpacing:'0.08em' }}>
            BPM controls this playalong; boxes get a breath at each position shift
          </span>
        </div>
      )}
      <div className="scroll-x">
        <div style={{ minWidth:boardMinWidth }}>
          {/* Fret numbers row */}
          <div style={{ display:'flex', paddingLeft:30, marginBottom:2 }}>
            {Array.from({length: numFrets+1}, (_, i) => (
              <div key={i} style={{ flex:1, textAlign:'center', minWidth:fretCellMin }}>
                <span style={{ fontFamily:"'JetBrains Mono', monospace", fontSize:9, color: i===0 ? 'var(--burgundy)' : 'var(--ink-4)' }}>{i}</span>
              </div>
            ))}
          </div>
          {/* Fretboard */}
          <div style={{
            position:'relative',
            background:'linear-gradient(180deg, #2c1d10 0%, #1f140a 100%)',
            border:'1px solid #4a2e18',
            borderRadius:3,
            padding:'5px 0',
          }}>
            {/* Fret marker dots */}
            <div style={{ position:'absolute', left:30, right:0, top:0, bottom:0, pointerEvents:'none' }}>
              <div style={{ position:'relative', height:'100%', display:'flex' }}>
                {Array.from({length: numFrets+1}, (_, i) => {
                  const f = i;
                  const isMk = fretMarkers.has(f);
                  const isDb = dblMarkers.has(f);
                  return (
                    <div key={i} style={{ flex:1, minWidth:fretCellMin, position:'relative', display:'flex', alignItems:'center', justifyContent:'center' }}>
                      {isDb ? (
                        <div style={{ position:'absolute', top:'18%', bottom:'18%', display:'flex', flexDirection:'column', justifyContent:'space-between' }}>
                          <div style={{ width:7, height:7, borderRadius:'50%', background:'rgba(247,240,220,0.16)' }} />
                          <div style={{ width:7, height:7, borderRadius:'50%', background:'rgba(247,240,220,0.16)' }} />
                        </div>
                      ) : isMk ? (
                        <div style={{ width:6, height:6, borderRadius:'50%', background:'rgba(247,240,220,0.16)' }} />
                      ) : null}
                    </div>
                  );
                })}
              </div>
            </div>
            {/* Strings */}
            {stringsDisplay.map((openMidi, sIdx) => {
              const stringThickness = 1 + sIdx * 0.3;
              return (
                <div key={sIdx} style={{ position:'relative', display:'flex', alignItems:'center', height:cellH }}>
                  <div style={{ width:30, fontFamily:"'JetBrains Mono', monospace", fontSize:9, textAlign:'center', color:'var(--ink-4)' }}>
                    {stringNamesDisplay[sIdx]}
                  </div>
                  <div style={{ position:'absolute', left:30, right:0, top:'50%', height:stringThickness, background:'linear-gradient(90deg,#a08a6a,#c0a880,#a08a6a)', boxShadow:'0 1px 1px rgba(0,0,0,0.4)', zIndex:1, transform:'translateY(-50%)' }} />
                  <div style={{ display:'flex', flex:1, position:'relative', zIndex:2 }}>
                    {Array.from({length: numFrets+1}, (_, i) => {
                      const fret = i;
                      const noteMidi = openMidi + fret;
                      const pc = noteMidi % 12;
                      // sIdx is display index (0 = high e). Tuning index is reversed: 5 - sIdx
                      const tuningIdx = 5 - sIdx;
                      const positionKey = `${tuningIdx}:${fret}`;
                      const posHl = hasPositions ? positions.get(positionKey) : null;
                      const pcHl = highlights?.get(pc);
                      // Position highlight overrides pitch-class highlight for THIS specific cell.
                      // During full-neck playback, the active marker is the exact physical note being sounded.
                      const isActiveCell = positionKey === activePlayKey;
                      const baseHl = posHl || pcHl;
                      const hl = isActiveCell ? { ...(baseHl || {}), label: baseHl?.label || '●', bg: 'var(--gold)' } : baseHl;
                      const isRoot = !isActiveCell && !posHl && pc === rootPc;
                      const isOpen = fret === 0;
                      return (
                        <div key={i} style={{
                          flex:1, minWidth:fretCellMin,
                          display:'flex', alignItems:'center', justifyContent:'center',
                          borderRight: isOpen ? '2px solid var(--gold)' : '1px solid #4a2e18',
                        }}>
                          {hl && (
                            <div style={{
                              width:noteDotSize, height:noteDotSize, borderRadius:'50%',
                              background: isActiveCell ? 'var(--gold)' : (isRoot ? 'var(--burgundy)' : (hl.bg || '#8a6d4a')),
                              color: '#f7f0dc',
                              display:'flex', alignItems:'center', justifyContent:'center',
                              fontFamily:"'JetBrains Mono', monospace",
                              fontSize: noteFontSize, fontWeight: isRoot || isActiveCell ? 700 : 500,
                              border: isActiveCell ? '2px solid #f7f0dc' : (isRoot ? '1.5px solid #f7f0dc' : '1px solid rgba(0,0,0,0.3)'),
                              boxShadow: isActiveCell ? '0 0 0 3px rgba(212,168,94,0.35), 0 1px 2px rgba(0,0,0,0.3)' : '0 1px 2px rgba(0,0,0,0.3)',
                            }}>{hl.label}</div>
                          )}
                        </div>
                      );
                    })}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      </div>
    </div>
  );
}

// Compact chord diagram (vertical, 5 frets)
function ChordDiagram({ frets, name }) {
  if (!frets || frets.length !== 6) return null;
  const visibleFrets = 5;
  const fretted = frets.filter(f => f > 0);
  const minFret = fretted.length ? Math.min(...fretted) : 1;
  const maxFret = Math.max(...frets, 0);
  const startFret = (maxFret <= visibleFrets) ? 1 : minFret;
  const cellSize = 18;

  return (
    <div style={{ display:'inline-flex', flexDirection:'column', alignItems:'center', gap:4 }}>
      {name && <div className="font-display" style={{ fontSize:12, color:'var(--ink)', fontWeight:600 }}>{name}</div>}
      <div style={{ position:'relative', width: 6 * cellSize }}>
        {/* Open/mute markers above — strings displayed low E (left) to high e (right) */}
        <div style={{ display:'flex', height:12 }}>
          {frets.map((f, i) => (
            <div key={i} style={{ width:cellSize, display:'flex', alignItems:'center', justifyContent:'center' }}>
              <span style={{ fontFamily:"'JetBrains Mono', monospace", fontSize:9, color:'var(--ink-3)' }}>
                {f === -1 ? '×' : f === 0 ? '○' : ''}
              </span>
            </div>
          ))}
        </div>
        {/* Nut or fret indicator */}
        {startFret === 1 ? (
          <div style={{ height:3, background:'var(--ink)', borderRadius:1 }} />
        ) : (
          <div style={{ display:'flex', justifyContent:'flex-end', alignItems:'center', height:11, paddingRight:2 }}>
            <span style={{ fontFamily:"'JetBrains Mono', monospace", fontSize:9, color:'var(--ink-3)' }}>{startFret}fr</span>
          </div>
        )}
        <div style={{ border:'1px solid var(--ink)', borderTop: startFret === 1 ? 'none' : '1px solid var(--ink)', borderRadius:1 }}>
          {Array.from({length:visibleFrets}, (_, fi) => {
            const fret = startFret + fi;
            return (
              <div key={fi} style={{ display:'flex', borderBottom:'1px solid var(--ink-3)', height:cellSize, position:'relative' }}>
                {frets.map((f, sIdx) => {
                  const isPressed = f === fret;
                  return (
                    <div key={sIdx} style={{
                      width:cellSize, position:'relative',
                      borderRight: sIdx < 5 ? '1px solid var(--ink-3)' : 'none',
                      display:'flex', alignItems:'center', justifyContent:'center',
                    }}>
                      <div style={{ position:'absolute', left:0, right:0, top:'50%', height:1, background:'var(--ink-3)' }} />
                      {isPressed && (
                        <div style={{
                          width:13, height:13, borderRadius:'50%',
                          background:'var(--burgundy)', position:'relative', zIndex:1,
                          border:'1px solid var(--ink)',
                        }} />
                      )}
                    </div>
                  );
                })}
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════
//  TAB: INTERVALS
// ═══════════════════════════════════════════════════════════════════════

function IntervalsTab({ audio }) {
  const [highlightedSt, setHighlightedSt] = useState(null);

  const playInterval = (st, mode) => {
    setHighlightedSt(st);
    const baseMidi = 60; // C4
    const target = baseMidi + st;
    if (mode === 'mel') {
      audio.arpeggiate([baseMidi, target], 0.45, '4n');
    } else if (mode === 'desc') {
      audio.arpeggiate([target, baseMidi], 0.45, '4n');
    } else {
      audio.playChord([baseMidi, target], '2n');
    }
    setTimeout(() => setHighlightedSt(null), 1200);
  };

  const classColors = {
    perfect:   { color:'var(--sage)',     bg:'rgba(74,107,62,0.10)',  label:'Perfect Consonance' },
    imperfect: { color:'var(--gold)',     bg:'rgba(184,132,42,0.12)', label:'Imperfect Consonance' },
    mild:      { color:'var(--slate)',    bg:'rgba(74,90,120,0.10)',  label:'Mild Dissonance' },
    sharp:     { color:'var(--burgundy)', bg:'rgba(134,45,42,0.10)',  label:'Sharp Dissonance' },
  };

  // Group intervals into Simple (within octave) and Compound
  const simple = INTERVALS.filter(i => i.st <= 12);
  const compound = INTERVALS.filter(i => i.st > 12);

  return (
    <div className="tab-anim">
      <SectionHeader
        chapter="Chapter I"
        title="Intervals"
        sub="The atomic distances of music — every chord, scale, and melody is a sequence of these."
      />

      <p style={{ color:'var(--ink-2)', maxWidth:560, marginBottom:24, lineHeight:1.65 }} className="drop-cap">
        An interval is the distance between two notes, measured in semitones. Western music recognizes thirteen intervals within an octave, each with a name, a flavor, and a frequency ratio that explains why it sounds the way it does. The simpler the ratio (2:1, 3:2, 4:3), the more consonant the interval — your ear hears the periodic alignment of waveforms as agreement. Complex ratios produce dissonance, the engine that creates the need for resolution.
      </p>

      <div className="ornament" />

      {/* Simple intervals */}
      <h3 className="font-display" style={{ fontSize:22, marginBottom:12, color:'var(--ink)' }}>
        Simple intervals <span style={{ color:'var(--ink-3)', fontSize:14, fontStyle:'italic', fontWeight:400 }}>— within one octave</span>
      </h3>

      <div style={{ display:'grid', gridTemplateColumns:'1fr', gap:8, marginBottom:24 }}>
        {simple.map(iv => {
          const cc = classColors[iv.class];
          const isHl = highlightedSt === iv.st;
          return (
            <Card key={iv.short} style={{ padding:14, transition:'transform 0.15s', transform: isHl ? 'translateY(-1px)' : 'none' }}>
              <div style={{ display:'flex', alignItems:'flex-start', gap:12 }}>
                <div style={{
                  width:46, height:46, borderRadius:3, flexShrink:0,
                  background: cc.bg, color: cc.color,
                  display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center',
                  border:`1px solid ${cc.color}`,
                }}>
                  <span className="font-mono" style={{ fontSize:14, fontWeight:600, lineHeight:1 }}>{iv.short}</span>
                  <span className="font-mono" style={{ fontSize:8, marginTop:2, opacity:0.75 }}>{iv.st}st</span>
                </div>
                <div style={{ flex:1, minWidth:0 }}>
                  <div style={{ display:'flex', alignItems:'baseline', justifyContent:'space-between', gap:8, marginBottom:2 }}>
                    <h4 className="font-display" style={{ fontSize:18, lineHeight:1.2 }}>{iv.name}</h4>
                    <span className="font-mono" style={{ fontSize:10, color: cc.color }}>{iv.ratio}</span>
                  </div>
                  <div style={{ display:'flex', flexWrap:'wrap', gap:6, marginBottom:8 }}>
                    <Pill tone={iv.class === 'perfect' ? 'sage' : iv.class === 'imperfect' ? 'gold' : iv.class === 'mild' ? 'slate' : 'burgundy'} size="xs">
                      {cc.label}
                    </Pill>
                    {iv.inv !== iv.short && iv.inv !== '—' && (
                      <Pill tone="ink" size="xs">inv ↔ {iv.inv}</Pill>
                    )}
                  </div>
                  <p style={{ fontSize:13, color:'var(--ink-2)', lineHeight:1.55 }}>{iv.note}</p>
                </div>
              </div>
              <div style={{ display:'flex', gap:6, marginTop:12, paddingTop:10, borderTop:'1px solid var(--rule-soft)' }}>
                <button onClick={() => playInterval(iv.st, 'mel')} style={btnInline('var(--gold)')}>
                  ↗ Ascending
                </button>
                <button onClick={() => playInterval(iv.st, 'desc')} style={btnInline('var(--gold)')}>
                  ↘ Descending
                </button>
                <button onClick={() => playInterval(iv.st, 'har')} style={btnInline('var(--burgundy)')}>
                  ◉ Harmonic
                </button>
              </div>
            </Card>
          );
        })}
      </div>

      {/* Compound intervals */}
      <h3 className="font-display" style={{ fontSize:22, marginBottom:6, color:'var(--ink)' }}>
        Compound intervals <span style={{ color:'var(--ink-3)', fontSize:14, fontStyle:'italic', fontWeight:400 }}>— above the octave</span>
      </h3>
      <p style={{ fontSize:13, color:'var(--ink-3)', marginBottom:14, lineHeight:1.55 }}>
        Beyond the octave, intervals are renamed for use in chord construction. The 9, 11, and 13 are the primary "extensions" — what jazz musicians call <em>tensions</em>. Each can be raised or lowered (♯9, ♭9, ♯11, ♭13) to alter a chord\'s color.
      </p>

      <div style={{ display:'grid', gridTemplateColumns:'1fr', gap:8 }}>
        {compound.map(iv => {
          const cc = classColors[iv.class];
          return (
            <Card key={iv.short} style={{ padding:12 }}>
              <div style={{ display:'flex', alignItems:'flex-start', gap:10 }}>
                <div style={{
                  width:40, height:40, borderRadius:3, flexShrink:0,
                  background: cc.bg, color: cc.color,
                  display:'flex', alignItems:'center', justifyContent:'center',
                  border:`1px solid ${cc.color}`,
                }}>
                  <span className="font-mono" style={{ fontSize:12, fontWeight:600 }}>{iv.short}</span>
                </div>
                <div style={{ flex:1, minWidth:0 }}>
                  <div style={{ display:'flex', alignItems:'baseline', justifyContent:'space-between', gap:8, marginBottom:2 }}>
                    <h4 className="font-display" style={{ fontSize:16 }}>{iv.name}</h4>
                    <PlayBtn size="sm" onClick={() => playInterval(iv.st, 'har')} />
                  </div>
                  <p style={{ fontSize:12.5, color:'var(--ink-2)', lineHeight:1.5 }}>{iv.note}</p>
                </div>
              </div>
            </Card>
          );
        })}
      </div>

      <div className="ornament" />

      <Card style={{ padding:18, background:'var(--paper-3)' }}>
        <div className="small-caps" style={{ fontSize:10, color:'var(--burgundy)', marginBottom:6 }}>Aside</div>
        <h4 className="font-display" style={{ fontSize:18, fontStyle:'italic', marginBottom:8 }}>Inversion as conservation</h4>
        <p style={{ fontSize:14, color:'var(--ink-2)', lineHeight:1.6 }}>
          Every interval pairs with another that completes an octave. Major 3rd (4 semitones) inverts to Minor 6th (8 semitones); Perfect 4th to Perfect 5th; Minor 2nd to Major 7th. This isn\'t trivia — it\'s why a chord and its inversions feel related, and why voice leading works at all. When you "flip" a chord, every interval transforms into its complement, but the harmonic identity persists.
        </p>
      </Card>
    </div>
  );
}

const btnInline = (color) => ({
  flex:1,
  padding:'6px 8px',
  fontFamily:"'JetBrains Mono', monospace",
  fontSize:10, letterSpacing:'0.1em', textTransform:'uppercase',
  color, border:`1px solid ${color}`, borderRadius:2,
  background:'transparent',
});

//  TAB: SCALES
// ═══════════════════════════════════════════════════════════════════════

function ScalesTab({ root, setRoot, audio, favs, toggleFav }) {
  const [activeScale, setActiveScale] = useState('ionian');
  const [showAs, setShowAs] = useState('degree'); // 'degree' | 'note'
  const useFlats = useFlatsFor(root);
  const rootPc = pcOf(root);

  const families = useMemo(() => {
    const m = {};
    Object.entries(SCALES).forEach(([k, s]) => {
      (m[s.family] = m[s.family] || []).push({ key: k, ...s });
    });
    return m;
  }, []);

  const scale = SCALES[activeScale];
  const scaleNotes = useMemo(() => {
    const baseMidi = namePitch(root, 3);
    return [...scale.steps, 12].map(s => baseMidi + s);
  }, [scale, root]);

  const highlights = useMemo(() => {
    const m = new Map();
    scale.steps.forEach((semitone, i) => {
      const pc = (rootPc + semitone) % 12;
      const label = showAs === 'note' ? display(pc, useFlats) : scale.degrees[i];
      m.set(pc, { label, bg: i === 0 ? 'var(--burgundy)' : '#8a6d4a' });
    });
    return m;
  }, [scale, rootPc, showAs, useFlats]);

  const playScale = (asc=true) => {
    const seq = asc ? scaleNotes : [...scaleNotes].reverse();
    audio.arpeggiate(seq, 0.18);
  };

  const playAsChord = () => {
    audio.playChord(scaleNotes.slice(0, scale.steps.length), '2n');
  };

  return (
    <div className="tab-anim">
      <SectionHeader
        chapter="Chapter II"
        title="Scales & Modes"
        sub="The pre-organized note collections that give music its identity."
      />

      <p style={{ color:'var(--ink-2)', maxWidth:560, marginBottom:18, lineHeight:1.65 }}>
        A scale is an ordered set of intervals from a root. Choose a scale and you\'ve chosen a vocabulary — every melody, harmony, and chord that fits naturally has been pre-selected for you. The 7-note <em>diatonic</em> scales are the bedrock of Western music; the modes are rotations of the same set of pitches starting on different roots; and beyond them lie the symmetric, exotic, and altered scales used to color jazz and modern improvisation.
      </p>

      {/* Root selector */}
      <div style={{ marginBottom:14 }}>
        <div className="small-caps" style={{ fontSize:10, color:'var(--ink-3)', marginBottom:6 }}>Root note</div>
        <RootSelector root={root} setRoot={setRoot} useFlats={useFlats} />
      </div>

      {/* Scale family selector */}
      <div style={{ marginBottom:14 }}>
        <div className="small-caps" style={{ fontSize:10, color:'var(--ink-3)', marginBottom:6 }}>Scale</div>
        {Object.entries(families).map(([family, items]) => (
          <div key={family} style={{ marginBottom:10 }}>
            <div className="font-mono" style={{ fontSize:9, letterSpacing:'0.2em', color:'var(--ink-4)', marginBottom:4 }}>— {family} —</div>
            <div style={{ display:'flex', flexWrap:'wrap', gap:4 }}>
              {items.map(s => (
                <button
                  key={s.key}
                  onClick={() => setActiveScale(s.key)}
                  style={{
                    padding:'5px 10px', borderRadius:2,
                    background: activeScale === s.key ? 'var(--ink)' : 'transparent',
                    color: activeScale === s.key ? 'var(--paper)' : 'var(--ink)',
                    border:'1px solid var(--ink)',
                    fontFamily:"'EB Garamond', serif", fontSize:13,
                  }}
                >{s.name}</button>
              ))}
            </div>
          </div>
        ))}
      </div>

      {/* Active scale display */}
      <Card style={{ padding:18, marginBottom:14 }}>
        <div style={{ display:'flex', alignItems:'flex-start', justifyContent:'space-between', gap:8, marginBottom:6 }}>
          <div>
            <div className="font-mono" style={{ fontSize:9, letterSpacing:'0.25em', textTransform:'uppercase', color:'var(--burgundy)', marginBottom:3 }}>{scale.family}</div>
            <h3 className="font-display" style={{ fontSize:26, fontStyle:'italic' }}>
              {display(rootPc, useFlats)} {scale.name}
            </h3>
          </div>
          <div style={{ display:'flex', alignItems:'center', gap:6 }}>
            <FavStar filled={favs.has('scales', `${root}:${activeScale}`)} onClick={() => toggleFav('scales', `${root}:${activeScale}`)} />
          </div>
        </div>

        {/* Notes */}
        <div style={{ display:'flex', flexWrap:'wrap', gap:8, marginTop:12, marginBottom:12 }}>
          {scale.steps.map((semi, i) => {

      {/* Display toggle */}
      <div style={{ display:'flex', justifyContent:'flex-end', marginBottom:6 }}>
        <div style={{ display:'flex', gap:0, border:'1px solid var(--ink)', borderRadius:2, overflow:'hidden' }}>

      <Card style={{ padding:18, background:'var(--paper-3)' }}>

        <p style={{ fontSize:14, color:'var(--ink-2)', lineHeight:1.6 }}>
          The seven diatonic modes — Ionian, Dorian, Phrygian, Lydian, Mixolydian, Aeolian, Locrian — are <em>rotations of the same set of pitches</em>. Play the C major scale starting on D and ending on D, and you have D Dorian: same notes, different tonal center, totally different mood. The modes of melodic and harmonic minor work the same way, generating exotic colors used heavily in jazz. The <em>characteristic note</em> of each mode (♭2 for Phrygian, ♯4 for Lydian, ♭7 for Mixolydian) is what makes its identity audible — emphasize it and you nail the mode; avoid it and you sound like you\'re in the parent key.
        </p>
      </Card>
    </div>
  );
}
