function DrillsTab({ audio }) {
  const [category, setCategory] = useState('Legato Permutations');
  const [activeDrillId, setActiveDrillId] = useState('legato-3');
  const [bpm, setBpm] = useState(70);
  const [activeStringIdx, setActiveStringIdx] = useState(4); // B string by default (display index 1, but TUNING idx 4)
  const [activeFret, setActiveFret] = useState(7); // base fret for legato drills
  const [isPlaying, setIsPlaying] = useState(false);
  const [currentNoteIdx, setCurrentNoteIdx] = useState(-1);
  const [activePermIdx, setActivePermIdx] = useState(0); // for legato drills, which permutation
  const playRef = useRef({ cancelled: false });

  const cats = Object.keys(DRILL_CATEGORIES);
  const cat = DRILL_CATEGORIES[category];
  const drill = cat.drills.find(d => d.id === activeDrillId) || cat.drills[0];

  // When category changes, jump to first drill in it
  useEffect(() => {
    setIsPlaying(false);
    if (cat && cat.drills[0]) setActiveDrillId(cat.drills[0].id);
  }, [category]);

  // When drill changes, stop playback and reset perm index
  useEffect(() => {
    setIsPlaying(false);
    setActivePermIdx(0);
    setCurrentNoteIdx(-1);
  }, [activeDrillId, activeStringIdx, activeFret]);

  // Build the note sequence for the current drill
  const sequence = useMemo(() => {
    if (!drill) return [];
    const baseMidi = TUNING[activeStringIdx];

    if (drill.type === 'legato') {
      // Generate all permutations of frets, optionally show the active one
      if (drill.perms) {
        const allPerms = permutations(drill.frets);
        const cur = allPerms[activePermIdx % allPerms.length] || drill.frets;
        return cur.map(f => ({ midi: baseMidi + activeFret + f, str: activeStringIdx, fret: activeFret + f }));
      }
      return drill.frets.map(f => ({ midi: baseMidi + activeFret + f, str: activeStringIdx, fret: activeFret + f }));
    }
    if (drill.type === 'spider') {
      // Run the finger sequence across all 6 strings, ascending then descending
      const out = [];
      for (let s = 0; s < 6; s++) {
        for (const f of drill.sequence) {
          out.push({ midi: TUNING[s] + activeFret + f, str: s, fret: activeFret + f });
        }
      }
      // Descending: reverse string order, reverse sequence
      for (let s = 5; s >= 0; s--) {
        const rev = [...drill.sequence].reverse();
        for (const f of rev) {
          out.push({ midi: TUNING[s] + activeFret + f, str: s, fret: activeFret + f });
        }
      }
      return out;
    }
    if (drill.type === 'skip') {
      // Skip-string pattern: ascend across strings 6→4, 5→3, 4→2, 3→1
      const out = [];
      const pairs = [[5,3],[4,2],[3,1],[2,0]];
      for (const [sLow, sHigh] of pairs) {
        for (const f of drill.fingering) out.push({ midi: TUNING[sLow] + activeFret + f, str: sLow, fret: activeFret + f });
        for (const f of drill.fingering) out.push({ midi: TUNING[sHigh] + activeFret + f, str: sHigh, fret: activeFret + f });
      }
      return out;
    }
    if (drill.type === 'skipArp') {
      const out = [];
      drill.frets.forEach((f, i) => {
        const s = drill.strings[i];
        out.push({ midi: TUNING[s] + activeFret + f, str: s, fret: activeFret + f });
      });
      drill.frets.slice().reverse().forEach((f, i) => {
        const s = drill.strings[drill.strings.length - 1 - i];
        out.push({ midi: TUNING[s] + activeFret + f, str: s, fret: activeFret + f });
      });
      return out;
    }
    if (drill.type === 'sweepArp' || drill.type === 'sweepTap') {
      // Frets are absolute (not added to activeFret). Sweep ascending then descending.
      const out = [];
      drill.frets.forEach((f, i) => {
        const s = drill.strings[i];
        out.push({ midi: TUNING[s] + f, str: s, fret: f });
      });
      // Descending sweep — reverse the order, skip the highest note (already played)
      const reverse = [...drill.frets].reverse();
      const reverseStrs = [...drill.strings].reverse();
      reverse.slice(1).forEach((f, i) => {
        const s = reverseStrs[i + 1];
        out.push({ midi: TUNING[s] + f, str: s, fret: f });
      });
      return out;
    }
    if (drill.type === 'skipOctv') {
      // Octave on string 6 + string 4 (skip string 5)
      const out = [];
      for (let f = 0; f <= 12; f += 2) {
        out.push({ midi: TUNING[5] + f, str: 5, fret: f });
        out.push({ midi: TUNING[3] + f, str: 3, fret: f });
      }
      return out;
    }
    if (drill.type === 'pick') {
      // Generic picking patterns: chromatic 4-note groups
      const out = [];
      if (drill.pattern === 'alt') {
        for (let s = 5; s >= 0; s--) {
          for (let f = 0; f < 4; f++) out.push({ midi: TUNING[s] + activeFret + f, str: s, fret: activeFret + f });
        }
      } else if (drill.pattern === 'inside') {
        // Two strings, alternating
        for (let i = 0; i < 8; i++) {
          out.push({ midi: TUNING[5] + activeFret + (i % 4), str: 5, fret: activeFret + (i % 4) });
          out.push({ midi: TUNING[3] + activeFret + (i % 4), str: 3, fret: activeFret + (i % 4) });
        }
      } else if (drill.pattern === 'econ') {
        // 3-note-per-string, sweep into next
        for (let s = 5; s >= 0; s--) {
          for (let f = 0; f < 3; f++) out.push({ midi: TUNING[s] + activeFret + f * 2, str: s, fret: activeFret + f * 2 });
        }
      } else if (drill.pattern === 'hybrid') {
        // Pick low, pluck high two together (we just play sequence)
        for (let i = 0; i < 6; i++) {
          out.push({ midi: TUNING[5] + activeFret + 0, str: 5, fret: activeFret });
          out.push({ midi: TUNING[2] + activeFret + i, str: 2, fret: activeFret + i });
          out.push({ midi: TUNING[1] + activeFret + i, str: 1, fret: activeFret + i });
        }
      } else if (drill.pattern === 'gallop') {
        // D-DU triplet on low E pedal — 4 reps
        const f = activeFret;
        for (let rep = 0; rep < 4; rep++) {
          out.push({ midi: TUNING[5] + f, str: 5, fret: f });
          out.push({ midi: TUNING[5] + f, str: 5, fret: f });
          out.push({ midi: TUNING[5] + f, str: 5, fret: f });
        }
      } else if (drill.pattern === 'revGallop') {
        // Reverse: DU-D — 4 reps
        const f = activeFret;
        for (let rep = 0; rep < 4; rep++) {
          out.push({ midi: TUNING[5] + f, str: 5, fret: f });
          out.push({ midi: TUNING[5] + f, str: 5, fret: f });
          out.push({ midi: TUNING[5] + f, str: 5, fret: f });
        }
      } else if (drill.pattern === 'tremolo') {
        // Continuous fast picking on one note — 32 attacks
        const f = activeFret + 5;
        for (let i = 0; i < 32; i++) {
          out.push({ midi: baseMidi + f, str: activeStringIdx, fret: f });
        }
      } else if (drill.pattern === 'pedal') {
        // Pedal-tone: alternate between an ascending high note and a fixed low pedal
        const pedalFret = activeFret;
        for (let i = 0; i < 8; i++) {
          out.push({ midi: TUNING[5] + pedalFret, str: 5, fret: pedalFret });
          out.push({ midi: TUNING[2] + activeFret + i, str: 2, fret: activeFret + i });
        }
      }
      return out;
    }
    if (drill.type === 'bend') {
      // Reference target then bend (simulated: play target, pause, play start)
      const startFret = activeFret + 5;
      const startMidi = baseMidi + startFret;
      return [
        { midi: startMidi + drill.amount, str: activeStringIdx, fret: startFret + drill.amount },
        { midi: startMidi,                str: activeStringIdx, fret: startFret },
        { midi: startMidi + drill.amount, str: activeStringIdx, fret: startFret + drill.amount },
      ];
    }
    if (drill.type === 'prebend') {
      const startFret = activeFret + 5;
      const startMidi = baseMidi + startFret;
      return [
        { midi: startMidi + 2, str: activeStringIdx, fret: startFret + 2 },
        { midi: startMidi,     str: activeStringIdx, fret: startFret },
      ];
    }
    if (drill.type === 'unison') {
      const lowFret = activeFret + 7;
      const lowMidi = baseMidi + lowFret;
      // Match pitch on next string up: 5 frets lower (since standard tuning is mostly 4ths)
      // For e/B pair, B/G pair, etc., +5 frets gets the same pitch on the lower string,
      // but we want unison higher: same pitch on the higher string -5 frets equivalent.
      // Simpler: play same fret on adjacent higher string is the unison-bend partner.
      const highStrIdx = Math.min(5, activeStringIdx + 1);
      const highFret = activeFret + 7 - 5; // approximate same pitch on higher string
      const highMidi = TUNING[highStrIdx] + Math.max(0, highFret);
      return [
        { midi: lowMidi,  str: activeStringIdx, fret: lowFret },
        { midi: highMidi, str: highStrIdx,      fret: Math.max(0, highFret) },
        { midi: lowMidi,  str: activeStringIdx, fret: lowFret },
      ];
    }
    if (drill.type === 'vibrato') {
      const fret = activeFret + 7;
      const cycles = drill.speed === 'slow' ? 4 : 16;
      return Array(cycles).fill({ midi: baseMidi + fret, str: activeStringIdx, fret });
    }
    if (drill.type === 'rhythm') {
      const fret = activeFret + 5;
      const total = drill.subdiv * 4;
      return Array(total).fill({ midi: baseMidi + fret, str: activeStringIdx, fret });
    }
    if (drill.type === 'tap') {
      const out = [];
      for (let rep = 0; rep < 3; rep++) {
        drill.frets.forEach(f => out.push({ midi: baseMidi + f, str: activeStringIdx, fret: f }));
      }
      return out;
    }
    if (drill.type === 'slide') {
      // Slide between two frets on the active string. Audio plays both endpoints.
      const fromFret = drill.from || 5;
      const toFret = drill.to || 7;
      return [
        { midi: baseMidi + fromFret, str: activeStringIdx, fret: fromFret },
        { midi: baseMidi + toFret,   str: activeStringIdx, fret: toFret },
        { midi: baseMidi + fromFret, str: activeStringIdx, fret: fromFret },
        { midi: baseMidi + toFret,   str: activeStringIdx, fret: toFret },
      ];
    }
    if (drill.type === 'trill') {
      // Two frets alternating for `duration` total notes
      const dur = drill.duration || 16;
      const [f1, f2] = drill.frets || [activeFret, activeFret + 2];
      const out = [];
      for (let i = 0; i < dur; i++) {
        const f = i % 2 === 0 ? f1 : f2;
        out.push({ midi: baseMidi + f, str: activeStringIdx, fret: f });
      }
      return out;
    }
    if (drill.type === 'cascade') {
      // Pull-off cascade: play each fret in sequence, repeated for a usable length
      const frets = drill.frets || [];
      const out = [];
      for (let rep = 0; rep < 3; rep++) {
        frets.forEach(f => out.push({ midi: baseMidi + f, str: activeStringIdx, fret: f }));
      }
      return out;
    }
    if (drill.type === 'doubleStop') {
      // Pairs of notes on two strings — diatonic motion harmonized at the given interval.
      // String set encoding (TUNING index, low E = 0): keys map to two-string pairs.
      const sets = {
        '3-2': [3, 4],   // G + B
        '4-2': [2, 4],   // D + B (skip G)
        '6-4': [0, 2],   // E + D
        '4-3': [2, 3],   // D + G
        '5-4': [1, 2],   // A + D
      };
      const [sLow, sHigh] = sets[drill.set] || [3, 4];
      const intervalSemitones =
        drill.interval === '3rd' ? 4 :
        drill.interval === '4th' ? 5 :
        drill.interval === '5th' ? 7 :
        drill.interval === '6th' ? 9 :
        drill.interval === 'octave' ? 12 : 4;
      const out = [];
      // 6 pairs walking up the neck — diatonic-ish stepwise motion
      for (let i = 0; i < 6; i++) {
        const fLow = activeFret + i * 2;
        const lowMidi = TUNING[sLow] + fLow;
        const highMidi = lowMidi + intervalSemitones;
        const fHigh = highMidi - TUNING[sHigh];
        out.push({ midi: lowMidi, str: sLow, fret: fLow });
        if (fHigh >= 0 && fHigh <= 17) {
          out.push({ midi: highMidi, str: sHigh, fret: fHigh });
        }
      }
      return out;
    }
    if (drill.type === 'pm') {
      // Palm-muted patterns on a low pedal note
      const f = activeFret;
      const out = [];
      const sub = drill.subdiv;
      if (sub === 2) {
        for (let i = 0; i < 8; i++) out.push({ midi: TUNING[5] + f, str: 5, fret: f });
      } else if (sub === 4) {
        for (let i = 0; i < 16; i++) out.push({ midi: TUNING[5] + f, str: 5, fret: f });
      } else if (sub === 'gallop') {
        for (let rep = 0; rep < 4; rep++) {
          out.push({ midi: TUNING[5] + f, str: 5, fret: f });
          out.push({ midi: TUNING[5] + f, str: 5, fret: f });
          out.push({ midi: TUNING[5] + f, str: 5, fret: f });
        }
      } else if (sub === 'chug') {
        for (let i = 0; i < 8; i++) {
          out.push({ midi: TUNING[5] + f, str: 5, fret: f });
          if (i % 4 === 3) {
            out.push({ midi: TUNING[4] + f + 2, str: 4, fret: f + 2 });
          }
        }
      } else if (sub === 'release') {
        for (let rep = 0; rep < 4; rep++) {
          for (let i = 0; i < 4; i++) {
            out.push({ midi: TUNING[5] + f, str: 5, fret: f });
          }
        }
      } else {
        // Default fallback
        for (let i = 0; i < 8; i++) out.push({ midi: TUNING[5] + f, str: 5, fret: f });
      }
      return out;
    }
    return [];
  }, [drill, activeStringIdx, activeFret, activePermIdx]);

  // Build position-keyed highlights — only the actual notes you play, no pitch-class duplication
  const positions = useMemo(() => {
    const m = new Map();
    sequence.forEach((step, i) => {
      if (!step || step.fret == null) return;
      const key = `${step.str}:${step.fret}`;
      const isCurrent = i === currentNoteIdx;
      const existing = m.get(key);
      m.set(key, {
        label: isCurrent ? '●' : (existing ? existing.label : '·'),
        bg: isCurrent ? 'var(--gold)' : (existing && existing.bg === 'var(--gold)' ? 'var(--gold)' : '#8a6d4a'),
      });
    });
    return m;
  }, [sequence, currentNoteIdx]);

  // Player loop
  useEffect(() => {
    if (!isPlaying) {
      playRef.current.cancelled = true;
      setCurrentNoteIdx(-1);
      return;
    }
    playRef.current = { cancelled: false };
    const myRef = playRef.current;
    const beat = 60 / bpm;
    const noteDur = drill && drill.type === 'rhythm' ? beat / drill.subdiv :
                    drill && drill.type === 'vibrato' ? beat / 4 :
                    beat / 2; // eighth notes default

    const loop = async () => {
      while (!myRef.cancelled) {
        for (let i = 0; i < sequence.length; i++) {
          if (myRef.cancelled) return;
          audio.playNote(sequence[i].midi, noteDur * 0.92 + 's');
          setCurrentNoteIdx(i);
          await new Promise(r => setTimeout(r, noteDur * 1000));
        }
        // After each cycle of a perm-based drill, advance to next permutation
        if (drill && drill.type === 'legato' && drill.perms) {
          const all = permutations(drill.frets);
          setActivePermIdx(p => (p + 1) % all.length);
        }
        await new Promise(r => setTimeout(r, 400));
      }
    };
    loop();
    return () => { myRef.cancelled = true; };
  }, [isPlaying, sequence, bpm, drill]);

  useEffect(() => () => { playRef.current.cancelled = true; }, []);

  const togglePlay = async () => {
    if (!isPlaying) {
      try { if (Tone.context.state !== 'running') await Tone.start(); } catch (e) {}
    }
    setIsPlaying(p => !p);
  };

  // Build all permutations for legato drills (for display)
  const allPerms = useMemo(() => {
    if (drill && drill.type === 'legato' && drill.perms) {
      return permutations(drill.frets);
    }
    return null;
  }, [drill]);

  return (
    <div className="tab-anim">
      <SectionHeader
        chapter="Chapter XI"
        title="Drills"
        sub="Pure technique. Hand mechanics, finger independence, picking accuracy."
      />

      <p style={{ color:'var(--ink-2)', maxWidth:560, marginBottom:18, lineHeight:1.65 }} className="drop-cap">
        Where the Workshop tab puts theory into your hands musically, this is the gym. Drills isolate hand mechanics from harmony — the goal is to execute the pattern cleanly, not to make music. Every guitar virtuoso has spent thousands of hours on drills like these, often without thinking about a single note name. Run them daily, slow first, then push the metronome. Speed comes from cleanliness.
      </p>

      <div className="ornament" />

      {/* Category picker */}
      <div style={{ marginBottom:14 }}>
        <div className="small-caps" style={{ fontSize:10, color:'var(--ink-3)', marginBottom:6 }}>Category</div>
        <div className="scroll-x" style={{ paddingBottom:4 }}>
          <div style={{ display:'flex', gap:4, minWidth:'min-content' }}>
            {cats.map(c => (
              <button
                key={c}
                onClick={() => setCategory(c)}
                style={{
                  padding:'5px 10px', borderRadius:2, whiteSpace:'nowrap',
                  background: category === c ? 'var(--ink)' : 'transparent',
                  color: category === c ? 'var(--paper)' : 'var(--ink)',
                  border:'1px solid var(--ink)',
                  fontFamily:"'EB Garamond', serif", fontSize:13,
                }}
              >{c}</button>
            ))}
          </div>
        </div>
      </div>

      <p style={{ fontSize:13, color:'var(--ink-3)', fontStyle:'italic', marginBottom:14, lineHeight:1.55 }}>{cat.desc}</p>

      {/* Drill picker */}
      <div style={{ marginBottom:14 }}>
        <div className="small-caps" style={{ fontSize:10, color:'var(--ink-3)', marginBottom:6 }}>Drill</div>
        <div style={{ display:'flex', flexWrap:'wrap', gap:4 }}>
          {cat.drills.map(d => (
            <button
              key={d.id}
              onClick={() => setActiveDrillId(d.id)}
              style={{
                padding:'5px 10px', borderRadius:2,
                background: activeDrillId === d.id ? 'var(--burgundy)' : 'transparent',
                color: activeDrillId === d.id ? 'var(--paper)' : 'var(--ink)',
                border:'1px solid var(--burgundy)',
                fontFamily:"'EB Garamond', serif", fontSize:13,
              }}
            >{d.name}</button>
          ))}
        </div>
      </div>

      {/* Active drill controls */}
      <Card style={{ padding:18, marginBottom:14 }}>
        <h3 className="font-display" style={{ fontSize:22, fontStyle:'italic', marginBottom:6 }}>{drill.name}</h3>

        {/* Position controls (string + fret for legato/spider/skip) */}
        {(drill.type === 'legato' || drill.type === 'spider' || drill.type === 'skip' || drill.type === 'pick' || drill.type === 'slide' || drill.type === 'trill' || drill.type === 'cascade' || drill.type === 'doubleStop' || drill.type === 'pm' || drill.type === 'bend' || drill.type === 'prebend' || drill.type === 'unison' || drill.type === 'vibrato' || drill.type === 'rhythm' || drill.type === 'tap') && (
          <div style={{ marginBottom:12 }}>
            {(drill.type === 'legato' || drill.type === 'slide' || drill.type === 'trill' || drill.type === 'cascade' || drill.type === 'bend' || drill.type === 'prebend' || drill.type === 'unison' || drill.type === 'vibrato' || drill.type === 'rhythm' || drill.type === 'tap') && (
              <div style={{ marginBottom:10 }}>
                <div className="small-caps" style={{ fontSize:9, color:'var(--ink-3)', marginBottom:6 }}>String</div>
                <div style={{ display:'flex', gap:4, flexWrap:'wrap' }}>
                  {[5,4,3,2,1,0].map(s => {
                    const labels = ['e','B','G','D','A','E'];
                    const tuningIdx = s;
                    return (
                      <button
                        key={s}
                        onClick={() => setActiveStringIdx(tuningIdx)}
                        style={{
                          width:40, height:32, borderRadius:2,
                          background: activeStringIdx === tuningIdx ? 'var(--ink)' : 'transparent',
                          color: activeStringIdx === tuningIdx ? 'var(--paper)' : 'var(--ink)',
                          border:'1px solid var(--ink)',
                          fontFamily:"'JetBrains Mono', monospace", fontSize:12,
                        }}
                      >{labels[5-s]}</button>
                    );
                  })}
                </div>
              </div>
            )}
            <div>
              <div className="small-caps" style={{ fontSize:9, color:'var(--ink-3)', marginBottom:6 }}>Position (start fret)</div>
              <div style={{ display:'flex', alignItems:'center', gap:10 }}>
                <button onClick={() => setActiveFret(f => Math.max(0, f - 1))} style={{
                  width:30, height:30, border:'1px solid var(--ink)', borderRadius:2,
                  background:'var(--paper)', color:'var(--ink)',
                  fontFamily:"'JetBrains Mono', monospace", fontSize:14,
                }}>−</button>
                <span className="font-mono num" style={{ fontSize:18, fontWeight:600, minWidth:40, textAlign:'center' }}>{activeFret}</span>
                <button onClick={() => setActiveFret(f => Math.min(15, f + 1))} style={{
                  width:30, height:30, border:'1px solid var(--ink)', borderRadius:2,
                  background:'var(--paper)', color:'var(--ink)',
                  fontFamily:"'JetBrains Mono', monospace", fontSize:14,
                }}>+</button>
              </div>
            </div>
          </div>
        )}

        {/* BPM */}
        <div style={{ display:'flex', alignItems:'center', gap:10, marginBottom:12 }}>
          <span className="small-caps" style={{ fontSize:9, color:'var(--ink-3)' }}>BPM</span>
          <button onClick={() => setBpm(b => Math.max(40, b - 5))} style={{
            width:30, height:30, border:'1px solid var(--ink)', borderRadius:2,
            background:'var(--paper)', color:'var(--ink)',
            fontFamily:"'JetBrains Mono', monospace", fontSize:14,
          }}>−</button>
          <span className="font-mono num" style={{ fontSize:18, fontWeight:600, minWidth:46, textAlign:'center' }}>{bpm}</span>
          <button onClick={() => setBpm(b => Math.min(240, b + 5))} style={{
            width:30, height:30, border:'1px solid var(--ink)', borderRadius:2,
            background:'var(--paper)', color:'var(--ink)',
            fontFamily:"'JetBrains Mono', monospace", fontSize:14,
          }}>+</button>
        </div>

        {/* Play */}
        <button onClick={togglePlay} style={{
          width:'100%', padding:'14px',
          background: isPlaying ? 'var(--burgundy)' : 'var(--sage)',
          color:'var(--paper)',
          border:`1px solid ${isPlaying ? 'var(--burgundy)' : 'var(--sage)'}`,
          borderRadius:2,
          fontFamily:"'JetBrains Mono', monospace",
          fontSize:11, letterSpacing:'0.2em', textTransform:'uppercase',
        }}>{isPlaying ? '■ Stop' : '▶ Play drill'}</button>

        {/* Tip */}
        <div style={{ marginTop:12, paddingTop:12, borderTop:'1px solid var(--rule-soft)' }}>
          <div className="small-caps" style={{ fontSize:9, color:'var(--burgundy)', marginBottom:4 }}>How to practice</div>
          <p style={{ fontSize:13, color:'var(--ink-2)', fontStyle:'italic', lineHeight:1.5 }}>{drill.note}</p>
        </div>
      </Card>

      {/* Permutations table for legato drills */}
      {allPerms && (
        <Card style={{ padding:14, marginBottom:14 }}>
          <div className="small-caps" style={{ fontSize:10, color:'var(--ink-3)', marginBottom:8 }}>
            All {allPerms.length} permutations
            {isPlaying && <span style={{ marginLeft:8, color:'var(--burgundy)' }}>· cycling auto</span>}
          </div>
          <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fill, minmax(74px, 1fr))', gap:6 }}>
            {allPerms.map((p, i) => {
              const isActive = i === activePermIdx;
              return (
                <button
                  key={i}
                  onClick={() => { setIsPlaying(false); setActivePermIdx(i); }}
                  style={{
                    padding:'6px 8px',
                    background: isActive ? 'var(--burgundy)' : 'var(--paper)',
                    color: isActive ? 'var(--paper)' : 'var(--ink)',
                    border:`1px solid ${isActive ? 'var(--burgundy)' : 'var(--rule)'}`,
                    borderRadius:2,
                    fontFamily:"'JetBrains Mono', monospace", fontSize:12,
                    fontWeight: isActive ? 600 : 400,
                    letterSpacing:'0.1em',
                    transition:'all 0.12s',
                  }}
                >{p.join(' ')}</button>
              );
            })}
          </div>
        </Card>
      )}

      {/* Fretboard */}
      <GuitarFretboard
        positions={positions}
        rootPc={null}
        useFlats={false}
        numFrets={15}
        label={isPlaying ? '♬ Watch the gold note' : 'Pattern visualization'}
      />

      <div className="ornament" />

      {/* Daily drill protocol */}
      <Card style={{ padding:18, background:'var(--paper-3)' }}>
        <div className="small-caps" style={{ fontSize:10, color:'var(--burgundy)', marginBottom:6 }}>10-minute drill protocol</div>
        <h4 className="font-display" style={{ fontSize:18, fontStyle:'italic', marginBottom:8 }}>Mechanical maintenance</h4>
        <p style={{ fontSize:14, color:'var(--ink-2)', lineHeight:1.6, marginBottom:10 }}>
          Run this short routine before any musical practice. Cold hands lead to bad form; warm hands lead to fluent playing.
        </p>
        <ol style={{ paddingLeft:20, margin:0 }}>
          <li style={{ fontSize:13.5, color:'var(--ink-2)', lineHeight:1.6, marginBottom:5 }}><strong>2 min</strong> — Spider 1234 ascending and descending across all 6 strings, 60 BPM eighths.</li>
          <li style={{ fontSize:13.5, color:'var(--ink-2)', lineHeight:1.6, marginBottom:5 }}><strong>2 min</strong> — One spider permutation (e.g., 1-3-2-4) to wake up the awkward orderings.</li>
          <li style={{ fontSize:13.5, color:'var(--ink-2)', lineHeight:1.6, marginBottom:5 }}><strong>3 min</strong> — One legato permutation set (3-note or 4-note) on the B string. Run all orderings.</li>
          <li style={{ fontSize:13.5, color:'var(--ink-2)', lineHeight:1.6, marginBottom:5 }}><strong>2 min</strong> — One picking pattern at moderate tempo. Strict alternate or hybrid depending on style of the day.</li>
          <li style={{ fontSize:13.5, color:'var(--ink-2)', lineHeight:1.6, marginBottom:5 }}><strong>1 min</strong> — Three pitch-accurate bends to a target note. Match a fretted reference.</li>
        </ol>
        <p style={{ fontSize:13, color:'var(--ink-3)', marginTop:12, fontStyle:'italic', lineHeight:1.55 }}>
          Add 5 BPM to any drill only when you can play 4 consecutive cycles cleanly. Speed is a byproduct of cleanliness — never the other way around.
        </p>
      </Card>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════
//  TAB: CAGED — the 5-position system for chord and scale visualization
// ═══════════════════════════════════════════════════════════════════════
//  CAGED uses the 5 open chord shapes (C, A, G, E, D) as templates that
//  can be moved up the neck. Together they cover the entire fretboard.

// Each CAGED shape: positions for the chord tones at the "home fret" (where
// the shape's root would be in open position). To play a different root,
// transpose by the difference between that root and the shape's open root.
// Frets are 0-indexed from the shape's nut. -1 = mute.

const CAGED_MAJOR = {
  C: {
    name: 'C-shape',
    rootOpenPc: 0, // C
    // String order: low E, A, D, G, B, e
    chordFrets: [-1, 3, 2, 0, 1, 0],
    // Where the root notes sit within this shape (0-indexed positions)
    rootPositions: [{str:4, fret:3}, {str:1, fret:1}], // A-string fret 3, B-string fret 1
    // Scale fingering — frets relative to shape position (3-NPS-ish)
    scaleFrets: {
      // [low E, A, D, G, B, e] - array of frets to play on each string
      // Major scale in C-shape position (around frets 0-3)
      6: [0, 2, 3], 5: [0, 2, 3], 4: [0, 2], 3: [0, 2], 2: [1, 3], 1: [0, 2, 3],
    },
    description: 'The "C major" open chord shape. Slide up — F at fret 3, G at fret 5, A at fret 7, etc.',
  },
  A: {
    name: 'A-shape',
    rootOpenPc: 9, // A
    chordFrets: [-1, 0, 2, 2, 2, 0],
    rootPositions: [{str:4, fret:0}, {str:2, fret:2}],
    scaleFrets: {
      6: [0, 2, 3], 5: [0, 2, 4], 4: [1, 2, 4], 3: [1, 2, 4], 2: [2, 3, 5], 1: [2, 4, 5],
    },
    description: 'The "A major" shape. Slide up: B at fret 2, C at fret 3, D at fret 5, etc.',
  },
  G: {
    name: 'G-shape',
    rootOpenPc: 7, // G
    chordFrets: [3, 2, 0, 0, 0, 3],
    rootPositions: [{str:5, fret:3}, {str:0, fret:3}],
    scaleFrets: {
      6: [3, 5, 7], 5: [3, 5, 7], 4: [4, 5, 7], 3: [4, 5, 7], 2: [5, 7, 8], 1: [5, 7, 8],
    },
    description: 'The "G major" shape. Big stretch — usually played from a CAGED context, not as a standalone.',
  },
  E: {
    name: 'E-shape',
    rootOpenPc: 4, // E
    chordFrets: [0, 2, 2, 1, 0, 0],
    rootPositions: [{str:5, fret:0}, {str:3, fret:2}, {str:0, fret:0}],
    scaleFrets: {
      6: [0, 2, 4], 5: [0, 2, 4], 4: [1, 2, 4], 3: [1, 2, 4], 2: [0, 2, 3], 1: [0, 2, 4],
    },
    description: 'The "E major" shape. The most common barre form — F at fret 1, G at fret 3, A at fret 5.',
  },
  D: {
    name: 'D-shape',
    rootOpenPc: 2, // D
    chordFrets: [-1, -1, 0, 2, 3, 2],
    rootPositions: [{str:3, fret:0}, {str:0, fret:2}],
    scaleFrets: {
      6: [], 5: [0, 2, 4], 4: [0, 2, 4], 3: [2, 4, 6], 2: [3, 5], 1: [2, 4, 5],
    },
    description: 'The "D major" shape. Lighter, top-string-focused; great for chord-melody work.',
  },
};

const CAGED_MINOR = {
  Cm: {
    name: 'Cm-shape',
    rootOpenPc: 0,
    // No standard "open Cm" — use a partial form
    chordFrets: [-1, 3, 5, 5, 4, 3],
    rootPositions: [{str:4, fret:3}, {str:1, fret:1}],
    scaleFrets: {
      6: [0, 1, 3], 5: [0, 2, 3], 4: [0, 2], 3: [0, 2], 2: [1, 3, 4], 1: [0, 1, 3],
    },
    description: 'Cm shape — partial barre. The "natural minor" form of the C-shape.',
  },
  Am: {
    name: 'Am-shape',
    rootOpenPc: 9,
    chordFrets: [-1, 0, 2, 2, 1, 0],
    rootPositions: [{str:4, fret:0}, {str:2, fret:2}],
    scaleFrets: {
      6: [0, 2, 3], 5: [0, 2, 3], 4: [0, 2], 3: [0, 2], 2: [1, 3], 1: [0, 2, 3],
    },
    description: 'The "A minor" shape. Slide up: Bm at fret 2, Cm at fret 3 (also called the "5-string barre" shape).',
  },
  Em: {
    name: 'Em-shape',
    rootOpenPc: 4,
    chordFrets: [0, 2, 2, 0, 0, 0],
    rootPositions: [{str:5, fret:0}, {str:3, fret:2}, {str:0, fret:0}],
    scaleFrets: {
      6: [0, 2, 3], 5: [0, 2, 3], 4: [0, 2], 3: [0, 2], 2: [0, 1, 3], 1: [0, 2, 3],
    },
    description: 'The "E minor" shape. The most common minor barre — Fm at fret 1, Gm at fret 3, Am at fret 5.',
  },
  Dm: {
    name: 'Dm-shape',
    rootOpenPc: 2,
    chordFrets: [-1, -1, 0, 2, 3, 1],
    rootPositions: [{str:3, fret:0}, {str:0, fret:2}],
    scaleFrets: {
      6: [], 5: [0, 1, 3], 4: [0, 2], 3: [2, 3, 5], 2: [3, 5], 1: [1, 3, 5],
    },
    description: 'The "D minor" shape. Top-string-focused.',
  },
  Gm: {
    name: 'Gm-shape',
    rootOpenPc: 7,
    chordFrets: [3, 5, 5, 3, 3, 3], // G minor barre
    rootPositions: [{str:5, fret:3}, {str:0, fret:3}],
    scaleFrets: {
      6: [3, 5, 6], 5: [3, 5, 7], 4: [3, 5, 7], 3: [3, 5, 7], 2: [3, 6, 8], 1: [3, 5, 6],
    },
    description: 'Gm shape — barre form. Less common than Em or Am shapes.',
  },
};

// CAGED order around the neck (each shape\'s root sits one position ahead of the next)
const CAGED_ORDER_MAJ = ['C','A','G','E','D'];
const CAGED_ORDER_MIN = ['Cm','Am','Em','Dm','Gm'];

// Compute fret offset to transpose a shape from its open root to a chosen target root
function cagedOffset(shapeOpenPc, targetPc) {
  // Move the shape UP from open. Returns positive number of frets.
  return ((targetPc - shapeOpenPc) + 12) % 12;
}

function CagedTab({ audio }) {
  const [quality, setQuality] = useState('major'); // 'major' | 'minor'
  const [root, setRoot] = useState('G');
  const [activeShape, setActiveShape] = useState('E');
  const [showScale, setShowScale] = useState(false);
  const [cagedBpm, setCagedBpm] = useState(90);
  const useFlats = useFlatsFor(root);
  const rootPc = pcOf(root);

  const order = quality === 'major' ? CAGED_ORDER_MAJ : CAGED_ORDER_MIN;
  const lib = quality === 'major' ? CAGED_MAJOR : CAGED_MINOR;

  // Make sure activeShape is valid for current quality
  useEffect(() => {
    if (!lib[activeShape]) setActiveShape(order[0]);
  }, [quality]);

  const shape = lib[activeShape] || lib[order[0]];
  const offset = cagedOffset(shape.rootOpenPc, rootPc);

  // Translate shape frets (open-position) to actual frets (after sliding up)
  const actualChordFrets = shape.chordFrets.map(f => f === -1 ? -1 : f + offset);

  // Build positions map for the fretboard: chord tones from the shape
  const chordPositions = useMemo(() => {
    const m = new Map();
    actualChordFrets.forEach((f, sIdxLow) => {
      if (f === -1) return;
      // sIdxLow is index from low E (0=low E, 5=high e) — same as TUNING index
      const noteMidi = TUNING[sIdxLow] + f;
      const pc = noteMidi % 12;
      // Determine if this is root, 3rd, 5th, etc.
      const intvl = ((pc - rootPc) + 12) % 12;
      let label = '·';
      if (intvl === 0) label = 'R';
      else if (intvl === 4) label = '3';
      else if (intvl === 3) label = '♭3';
      else if (intvl === 7) label = '5';
      else if (intvl === 10) label = '♭7';
      else if (intvl === 11) label = '7';
      const isRoot = intvl === 0;
      m.set(`${sIdxLow}:${f}`, {
        label,
        bg: isRoot ? 'var(--burgundy)' : '#8a6d4a',
      });
    });
    return m;
  }, [shape, offset, rootPc]);

  // Scale positions (Show Scale toggle)
  const scalePositions = useMemo(() => {
    const m = new Map();
    if (!showScale) return m;
    Object.entries(shape.scaleFrets || {}).forEach(([sIdxStr, frets]) => {
      // sIdxStr in scaleFrets is 1-6 where 6=low E. Convert to 0-5 (TUNING index)
      const sIdxFromHigh = parseInt(sIdxStr); // 6=low E in spec
      const sIdxLow = 6 - sIdxFromHigh;       // 0=low E
      frets.forEach(fOpen => {
        const f = fOpen + offset;
        if (f < 0 || f > 22) return;
        const noteMidi = TUNING[sIdxLow] + f;
        const pc = noteMidi % 12;
        const isRoot = pc === rootPc;
        const key = `${sIdxLow}:${f}`;
        if (!m.has(key)) {
          m.set(key, {
            label: isRoot ? 'R' : '·',
            bg: isRoot ? 'var(--burgundy)' : '#a08260',
          });
        }
      });
    });
    return m;
  }, [shape, offset, rootPc, showScale]);

  // Combined positions: chord on top of scale background
  const allPositions = useMemo(() => {
    const m = new Map(scalePositions);
    chordPositions.forEach((v, k) => m.set(k, v));
    return m;
  }, [chordPositions, scalePositions]);

  const playChord = () => {
    const midis = actualChordFrets
      .map((f, sIdxLow) => f === -1 ? null : TUNING[sIdxLow] + f)
      .filter(x => x !== null);
    audio.arpeggiate(midis, 0.05, '2n');
  };

  const collectCagedShapeMidis = (s, off, includeScale=false, maxVisibleFret=15) => {
    const byPosition = new Map();
    const add = (sIdxLow, f) => {
      if (f == null || f < 0 || f > maxVisibleFret || sIdxLow < 0 || sIdxLow > 5) return;
      byPosition.set(`${sIdxLow}:${f}`, { midi: TUNING[sIdxLow] + f, str: sIdxLow, fret: f });
    };
    if (includeScale) {
      Object.entries(s.scaleFrets || {}).forEach(([sIdxStr, frets]) => {
        const sIdxFromHigh = parseInt(sIdxStr);
        const sIdxLow = 6 - sIdxFromHigh;
        frets.forEach(fOpen => add(sIdxLow, fOpen + off));
      });
    }
    s.chordFrets.forEach((fOpen, sIdxLow) => add(sIdxLow, fOpen === -1 ? -1 : fOpen + off));
    return [...byPosition.values()]
      .sort((a, b) => a.midi - b.midi || a.str - b.str || a.fret - b.fret)
      .map(x => x.midi);
  };

  const playAllShapes = async () => {
    const safeBpm = Math.max(30, Math.min(260, Number(cagedBpm) || 90));
    const beat = 60 / safeBpm;
    const gap = showScale ? beat / 4 : beat / 3;
    const dur = Math.max(0.08, gap * 0.85) + 's';
    for (const shapeKey of order) {
      const s = lib[shapeKey];
      const off = cagedOffset(s.rootOpenPc, rootPc);
      const midis = collectCagedShapeMidis(s, off, showScale, 15);
      setActiveShape(shapeKey);
      audio.arpeggiate(midis, gap, dur);
      await new Promise(r => setTimeout(r, Math.max(beat * 1000, midis.length * gap * 1000 + beat * 450)));
    }
  };

  const symbol = `${display(rootPc, useFlats)}${quality === 'minor' ? 'm' : ''}`;

  return (
    <div className="tab-anim">
      <SectionHeader
        chapter="Chapter XIII"
        title="The CAGED System"
        sub="Five chord shapes that map the entire fretboard."
      />

      <p style={{ color:'var(--ink-2)', maxWidth:560, marginBottom:18, lineHeight:1.65 }} className="drop-cap">
        The five open major chord shapes — C, A, G, E, D — are the five canonical fingerings of any major chord. Slide each shape up the neck and the same chord can be played in five different positions. Together, they cover the entire fretboard with no gaps. Master the five shapes for one chord, then for the scale that fits inside each shape, and you\'ve effectively memorized the whole neck. The same logic applies to minor, with shapes Cm, Am, Em, Dm, Gm (the closest minor analogues).
      </p>

      <div className="ornament" />

      {/* Quality toggle */}
      <div style={{ marginBottom:12 }}>
        <div className="small-caps" style={{ fontSize:10, color:'var(--ink-3)', marginBottom:6 }}>Quality</div>
        <div style={{ display:'flex', gap:0, border:'1px solid var(--ink)', borderRadius:2, overflow:'hidden', width:'fit-content' }}>
          {['major','minor'].map(q => (
            <button
              key={q}
              onClick={() => setQuality(q)}
              style={{
                padding:'6px 16px',
                fontFamily:"'EB Garamond', serif", fontSize:13,
                background: quality === q ? 'var(--ink)' : 'transparent',
                color: quality === q ? 'var(--paper)' : 'var(--ink)',
                textTransform:'capitalize',
              }}
            >{q}</button>
          ))}
        </div>
      </div>

      {/* Root */}
      <div style={{ marginBottom:12 }}>
        <div className="small-caps" style={{ fontSize:10, color:'var(--ink-3)', marginBottom:6 }}>Root</div>
        <RootSelector root={root} setRoot={setRoot} useFlats={useFlats} />
      </div>

      {/* Shape selector */}
      <div style={{ marginBottom:14 }}>
        <div className="small-caps" style={{ fontSize:10, color:'var(--ink-3)', marginBottom:6 }}>Shape</div>
        <div style={{ display:'flex', flexWrap:'wrap', gap:4 }}>
          {order.map(s => (
            <button
              key={s}
              onClick={() => setActiveShape(s)}
              style={{
                padding:'6px 14px', borderRadius:2,
                background: activeShape === s ? 'var(--burgundy)' : 'transparent',
                color: activeShape === s ? 'var(--paper)' : 'var(--ink)',
                border:'1px solid var(--burgundy)',
                fontFamily:"'EB Garamond', serif", fontSize:14, fontWeight:500,
              }}
            >{s}</button>
          ))}
        </div>
      </div>

      {/* Active shape card */}
      <Card style={{ padding:18, marginBottom:14 }}>
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', gap:8, marginBottom:10 }}>
          <div>
            <h3 className="font-display" style={{ fontSize:24, fontStyle:'italic' }}>
              {symbol} <span style={{ color:'var(--ink-3)' }}>·</span> {shape.name}
            </h3>
            <div className="font-mono" style={{ fontSize:10, color:'var(--ink-3)', marginTop:4, letterSpacing:'0.1em' }}>
              shape position: fret {offset || 'open'}
            </div>
          </div>
          <PlayBtn onClick={playChord} variant="burgundy" size="md" />
        </div>

        <p style={{ fontSize:13, color:'var(--ink-2)', lineHeight:1.55, marginBottom:12 }}>{shape.description}</p>

        <div style={{ display:'flex', gap:6, alignItems:'center', flexWrap:'wrap' }}>
          <button
            onClick={() => setShowScale(s => !s)}
            style={{
              padding:'6px 12px', borderRadius:2,
              background: showScale ? 'var(--sage)' : 'transparent',
              color: showScale ? 'var(--paper)' : 'var(--sage)',
              border:'1px solid var(--sage)',
              fontFamily:"'JetBrains Mono', monospace", fontSize:10,
              letterSpacing:'0.15em', textTransform:'uppercase',
            }}
          >{showScale ? '✓ Scale shown' : '+ Show scale'}</button>
          <div style={{ display:'flex', alignItems:'center', gap:5, padding:'4px 6px', border:'1px solid var(--rule)', background:'var(--paper)', borderRadius:2 }}>
            <span className="small-caps" style={{ fontSize:8, color:'var(--ink-3)' }}>BPM</span>
            <button onClick={() => setCagedBpm(b => Math.max(30, b - 5))} style={{ width:22, height:22, border:'1px solid var(--ink)', background:'transparent', borderRadius:2 }}>−</button>
            <input aria-label="CAGED playback BPM" type="number" min="30" max="260" value={cagedBpm} onChange={e => setCagedBpm(Math.max(30, Math.min(260, Number(e.target.value) || 90)))} style={{ width:54, padding:'3px 4px', border:'1px solid var(--rule)', background:'var(--paper-2)', borderRadius:2, fontFamily:"'JetBrains Mono', monospace", fontSize:10, textAlign:'center' }} />
            <button onClick={() => setCagedBpm(b => Math.min(260, b + 5))} style={{ width:22, height:22, border:'1px solid var(--ink)', background:'transparent', borderRadius:2 }}>+</button>
          </div>
          <button
            onClick={playAllShapes}
            style={{
              padding:'6px 12px', borderRadius:2,
              background:'var(--gold)', color:'var(--paper)',
              border:'1px solid var(--gold-soft)',
              fontFamily:"'JetBrains Mono', monospace", fontSize:10,
              letterSpacing:'0.15em', textTransform:'uppercase',
            }}
          >{showScale ? '▶ Play all 5 scale maps' : '▶ Play all 5 shapes'}</button>
        </div>
      </Card>

      {/* Fretboard with shape highlighted */}
      <GuitarFretboard
        positions={allPositions}
        rootPc={null}
        useFlats={useFlats}
        numFrets={15}
        label={`${symbol} ${shape.name}${showScale ? ' + scale tones' : ''}`}
        audio={audio}
        playAllNotes={true}
        playAllLabel="Shown CAGED map"
      />

      {/* Chord diagram */}
      <div style={{ display:'flex', justifyContent:'center', marginTop:14 }}>
        <Card style={{ padding:14 }}>
          <div className="small-caps" style={{ fontSize:9, color:'var(--ink-3)', marginBottom:6, textAlign:'center' }}>Chord diagram</div>
          <ChordDiagram frets={actualChordFrets} name={`${symbol} (${shape.name})`} />
        </Card>
      </div>

      <div className="ornament" />

      {/* All 5 shapes overview */}
      <h3 className="font-display" style={{ fontSize:20, fontStyle:'italic', marginBottom:10 }}>All 5 shapes for {symbol}</h3>
      <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fill, minmax(120px, 1fr))', gap:10, marginBottom:14 }}>
        {order.map(s => {
          const sh = lib[s];
          const off = cagedOffset(sh.rootOpenPc, rootPc);
          const frets = sh.chordFrets.map(f => f === -1 ? -1 : f + off);
          const isActive = activeShape === s;
          return (
            <Card
              key={s}
              style={{ padding:12, cursor:'pointer', borderColor: isActive ? 'var(--burgundy)' : 'var(--rule)' }}
              onClick={() => setActiveShape(s)}
            >
              <div className="small-caps" style={{ fontSize:9, color:'var(--burgundy)', marginBottom:4, textAlign:'center' }}>{s}-shape</div>
              <div style={{ display:'flex', justifyContent:'center' }}>
                <ChordDiagram frets={frets} />
              </div>
            </Card>
          );
        })}
      </div>

      <div className="ornament" />

      <Card style={{ padding:18, background:'var(--paper-3)' }}>
        <div className="small-caps" style={{ fontSize:10, color:'var(--burgundy)', marginBottom:6 }}>Practice protocol</div>
        <h4 className="font-display" style={{ fontSize:18, fontStyle:'italic', marginBottom:8 }}>Connecting the boxes</h4>
        <p style={{ fontSize:14, color:'var(--ink-2)', lineHeight:1.6 }}>
          Don\'t learn the 5 shapes in isolation. Play one shape, then physically slide your hand to the next adjacent shape — they connect on shared notes. Walk all 5 positions of one chord ascending the neck (use "Play all 5 shapes" above), then descending. Then turn on the scale toggle and do the same with scale fingerings. After two weeks, you\'ll never feel "lost" anywhere on the neck — every fret is part of one of the five shapes you know.
        </p>
      </Card>
    </div>
  );
}

function BlockExercise({ exercise, audio }) {
  const [bpm, setBpm] = useState(exercise.bpm || 80);
  const [isPlaying, setIsPlaying] = useState(false);
  const [currentIdx, setCurrentIdx] = useState(-1);
  const playRef = useRef({ cancelled: false });

  useEffect(() => {
    playRef.current.cancelled = true;
    setIsPlaying(false);
    setCurrentIdx(-1);
    setBpm(exercise?.bpm || 80);
  }, [exercise]);

  // Build the play sequence based on exercise type
  const sequence = useMemo(() => {
    if (!exercise || exercise.type === 'free') return [];

    if (exercise.type === 'spider') {
      const out = [];
      const startFret = exercise.startFret || 5;
      // Across all 6 strings ascending then descending
      for (let s = 0; s < 6; s++) {
        for (const f of exercise.sequence) {
          out.push({ midi: TUNING[s] + startFret + f, str: s, fret: startFret + f });
        }
      }
      for (let s = 5; s >= 0; s--) {
        const rev = [...exercise.sequence].reverse();
        for (const f of rev) {
          out.push({ midi: TUNING[s] + startFret + f, str: s, fret: startFret + f });
        }
      }
      return out;
    }

    if (exercise.type === 'scale') {
      const scale = SCALES[exercise.scaleKey];
      if (!scale) return [];
      const baseMidi = namePitch(exercise.rootName, 3);
      const asc = [...scale.steps, 12].map(s => baseMidi + s);
      const desc = [...asc].slice().reverse().slice(1);
      const all = [...asc, ...desc];
      return all.map((midi, i) => {
        const pos = midiToPositionSpread(midi, i, all.length);
        return { midi, str: pos ? pos.str : 0, fret: pos ? pos.fret : 0 };
      });
    }

    if (exercise.type === 'sequence3rds') {
      const scale = SCALES[exercise.scaleKey];
      if (!scale) return [];
      const baseMidi = namePitch(exercise.rootName, 3);
      const oct2 = [...scale.steps, ...scale.steps.map(s => s + 12), 24].map(s => baseMidi + s);
      const out = [];
      for (let i = 0; i + 2 < oct2.length; i++) {
        out.push(oct2[i]);
        out.push(oct2[i+2]);
      }
      return out.map((midi, i) => {
        const pos = midiToPositionSpread(midi, i, out.length);
        return { midi, str: pos ? pos.str : 0, fret: pos ? pos.fret : 0 };
      });
    }

    if (exercise.type === 'arpeggios') {
      const scale = SCALES[exercise.scaleKey];
      if (!scale || scale.steps.length < 7) return [];
      const baseMidi = namePitch(exercise.rootName, 3);
      const oct2 = [...scale.steps, ...scale.steps.map(s => s + 12)].map(s => baseMidi + s);
      const out = [];
      for (let i = 0; i < 7; i++) {
        out.push(oct2[i], oct2[i+2], oct2[i+4], oct2[i+6]);
      }
      return out.map((midi, i) => {
        const pos = midiToPositionSpread(midi, i, out.length);
        return { midi, str: pos ? pos.str : 0, fret: pos ? pos.fret : 0 };
      });
    }

    if (exercise.type === 'chordCycle') {
      // Each chord = one "note" entry but contains a midi-array
      return exercise.progression.map(c => {
        const midis = buildChord(c.rootName, c.ints, 4);
        return { midis, symbol: c.symbol, isChord: true };
      });
    }

    if (exercise.type === 'vaiFigure') {
      return (exercise.steps || []).map(step => {
        if (step.isChord) {
          return { isChord:true, midis: step.midis || (step.positions || []).map(p => p.midi ?? (TUNING[p.str] + p.fret)), positions: step.positions || [], tabCol: step.tabCol };
        }
        return { midi: step.midi ?? (TUNING[step.str] + step.fret), str: step.str, fret: step.fret, tabCol: step.tabCol };
      });
    }

    if (exercise.type === 'vaiWorkout') {
      // Multi-figure programmatic walkthrough of the 10-Hour Workout exercises
      const out = [];
      // Each figure: array of {str, fret} steps. Figures separated by a brief rest marker.
      const figures = exercise.figures || [];
      figures.forEach((fig, figIdx) => {
        // Section label as the first step of each figure (a chord with empty midis won't play, just marks section)
        out.push({ isLabel: true, label: fig.label });
        fig.steps.forEach(step => {
          out.push({
            midi: TUNING[step.str] + step.fret,
            str: step.str,
            fret: step.fret,
          });
        });
      });
      return out;
    }

    if (exercise.type === 'metronome') {
      // Generate beat markers — no audio note, just position counters. Loops indefinitely.
      const beats = exercise.beats || 64;
      const out = [];
      for (let i = 0; i < beats; i++) {
        out.push({ isMetronomeBeat: true, beat: (i % (exercise.beatsPerBar || 4)) + 1, bar: Math.floor(i / (exercise.beatsPerBar || 4)) + 1 });
      }
      return out;
    }

    return [];
  }, [exercise]);

  // Position highlights for the fretboard:
  //   • All exercise notes shown dimly, so the user can see the whole pattern
  //   • Currently playing note highlighted in gold
  const positions = useMemo(() => {
    const m = new Map();
    const addMarker = (key) => {
      if (exercise?.type === 'vaiFigure') {
        if (!m.has(key)) m.set(key, { label:'·', bg:'#8a6d4a' });
        return;
      }
      const prev = m.get(key);
      const count = (prev?.count || 0) + 1;
      m.set(key, { label: count > 1 ? String(Math.min(count, 99)) : '·', bg:'#8a6d4a', count });
    };
    // Pass 1: marker for every unique physical note in the sequence.
    // If a figure repeats the same fret/string, the dot shows a count so the fretboard communicates that the printed note appears more than once.
    sequence.forEach((step) => {
      if (!step || step.isLabel || step.isMetronomeBeat) return;
      if (step.isChord && (step.positions || step.midis)) {
        if (step.positions && step.positions.length) step.positions.forEach(pos => addMarker(`${pos.str}:${pos.fret}`));
        else step.midis.forEach(midi => { const pos = midiToPosition(midi); if (pos) addMarker(`${pos.str}:${pos.fret}`); });
      } else if (step.fret != null && step.str != null) {
        addMarker(`${step.str}:${step.fret}`);
      }
    });
    // Pass 2: override current note(s) in gold
    if (currentIdx >= 0 && currentIdx < sequence.length) {
      const step = sequence[currentIdx];
      if (step && !step.isChord && !step.isLabel && !step.isMetronomeBeat && step.fret != null) {
        m.set(`${step.str}:${step.fret}`, { label:'●', bg:'var(--gold)' });
      } else if (step && step.isChord && (step.positions || step.midis)) {
        if (step.positions && step.positions.length) step.positions.forEach(pos => m.set(`${pos.str}:${pos.fret}`, { label:'●', bg:'var(--gold)' }));
        else step.midis.forEach(midi => { const pos = midiToPosition(midi); if (pos) m.set(`${pos.str}:${pos.fret}`, { label:'●', bg:'var(--gold)' }); });
      }
    }
    return m;
  }, [sequence, currentIdx]);

  const fretboardFrets = useMemo(() => {
    const maxFret = sequence.reduce((mx, step) => {
      if (!step) return mx;
      if (step.positions && step.positions.length) return Math.max(mx, ...step.positions.map(p => p.fret || 0));
      return step.fret != null ? Math.max(mx, step.fret) : mx;
    }, 0);
    return Math.max(15, Math.min(24, maxFret));
  }, [sequence]);

  // Player loop
  useEffect(() => {
    if (!isPlaying) {
      playRef.current.cancelled = true;
      setCurrentIdx(-1);
      return;
    }
    playRef.current = { cancelled: false };
    const myRef = playRef.current;
    const beat = 60 / bpm;
    const noteDur = exercise.rhythm === 'sixteenths' ? beat / 4
                  : exercise.rhythm === 'triplets' ? beat / 3
                  : exercise.rhythm === 'eighths' ? beat / 2
                  : exercise.rhythm === 'whole' ? beat * 4
                  : beat;

    const loop = async () => {
      const runOnce = exercise.type === 'vaiWorkout' || exercise.type === 'vaiFigure' || exercise.runOnce === true;
      do {
        for (let i = 0; i < sequence.length; i++) {
          if (myRef.cancelled) return;
          const step = sequence[i];
          setCurrentIdx(i);
          if (step.isLabel) {
            // Brief pause between figures, no audio
            await new Promise(r => setTimeout(r, 800));
            continue;
          }
          if (step.isMetronomeBeat) {
            // Click sound: high pitch on beat 1, lower on others
            const clickNote = step.beat === 1 ? 84 : 76;
            audio.playNote(clickNote, '32n');
          } else if (step.isChord && step.midis) {
            audio.playChord(step.midis, noteDur * 0.95 + 's');
          } else if (step.midi != null) {
            audio.playNote(step.midi, noteDur * 0.92 + 's');
          }
          await new Promise(r => setTimeout(r, noteDur * 1000));
        }
        if (runOnce) {
          // Stop after one pass for the long Vai workout
          if (!myRef.cancelled) setIsPlaying(false);
          return;
        }
        await new Promise(r => setTimeout(r, 600));
      } while (!myRef.cancelled);
    };
    loop();
    return () => { myRef.cancelled = true; };
  }, [isPlaying, sequence, bpm, exercise]);

  useEffect(() => () => { playRef.current.cancelled = true; }, []);

  const togglePlay = async () => {
    if (!isPlaying) {
      try { if (Tone.context.state !== 'running') await Tone.start(); } catch (e) {}
    }
    setIsPlaying(p => !p);
  };

  return (
    <div style={{ marginBottom:14, padding:14, background:'var(--paper-3)', border:'1px solid var(--burgundy)', borderRadius:3 }}>
      <div className="small-caps" style={{ fontSize:9, color:'var(--burgundy)', marginBottom:6 }}>Play-along</div>
      <h4 className="font-display" style={{ fontSize:16, fontStyle:'italic', marginBottom:4 }}>{exercise.name}</h4>
      <p style={{ fontSize:12.5, color:'var(--ink-3)', fontStyle:'italic', lineHeight:1.5, marginBottom:10 }}>{exercise.description}</p>

      <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:10 }}>
        <span className="small-caps" style={{ fontSize:9, color:'var(--ink-3)' }}>BPM</span>
        <button onClick={() => setBpm(b => Math.max(40, b - 5))} style={{
          width:26, height:26, border:'1px solid var(--ink)', borderRadius:2,
          background:'var(--paper)', color:'var(--ink)',
          fontFamily:"'JetBrains Mono', monospace", fontSize:12,
        }}>−</button>
        <span className="font-mono num" style={{ fontSize:15, fontWeight:600, minWidth:38, textAlign:'center' }}>{bpm}</span>
        <button onClick={() => setBpm(b => Math.min(240, b + 5))} style={{
          width:26, height:26, border:'1px solid var(--ink)', borderRadius:2,
          background:'var(--paper)', color:'var(--ink)',
          fontFamily:"'JetBrains Mono', monospace", fontSize:12,
        }}>+</button>
        <div style={{ flex:1 }} />
        <button onClick={togglePlay} style={{
          padding:'8px 16px',
          background: isPlaying ? 'var(--burgundy)' : 'var(--sage)',
          color:'var(--paper)',
          border:`1px solid ${isPlaying ? 'var(--burgundy)' : 'var(--sage)'}`,
          borderRadius:2,
          fontFamily:"'JetBrains Mono', monospace",
          fontSize:10, letterSpacing:'0.15em', textTransform:'uppercase',
        }}>{isPlaying ? '■ Stop' : '▶ Play'}</button>
      </div>

      {/* Chord progression display for chordCycle type */}
      {exercise.type === 'chordCycle' && (
        <div style={{ display:'flex', flexWrap:'wrap', gap:4, marginBottom:10 }}>
          {sequence.map((step, i) => (
            <span key={i} style={{
              padding:'5px 9px',
              background: i === currentIdx ? 'var(--burgundy)' : 'var(--paper)',
              color: i === currentIdx ? 'var(--paper)' : 'var(--ink)',
              border:`1px solid ${i === currentIdx ? 'var(--burgundy)' : 'var(--rule)'}`,
              borderRadius:2,
              fontFamily:"'EB Garamond', serif", fontSize:13, fontWeight:500,
              transition:'all 0.12s',
            }}>{step.symbol}</span>
          ))}
        </div>
      )}

      {/* Current figure label for vaiWorkout */}
      {exercise.type === 'vaiWorkout' && (() => {
        // Find the most recent label step at or before currentIdx
        let label = null;
        let figureNum = 0;
        for (let i = 0; i <= currentIdx && i < sequence.length; i++) {
          if (sequence[i] && sequence[i].isLabel) {
            label = sequence[i].label;
            figureNum++;
          }
        }
        const totalFigures = sequence.filter(s => s && s.isLabel).length;
        const progress = sequence.length > 0 ? Math.round((Math.max(currentIdx, 0) / sequence.length) * 100) : 0;
        return (
          <div style={{ marginBottom:10 }}>
            {label ? (
              <div style={{ padding:'8px 10px', background:'var(--paper)', border:'1px solid var(--burgundy)', borderRadius:2, marginBottom:6 }}>
                <div className="font-mono" style={{ fontSize:9, color:'var(--burgundy)', letterSpacing:'0.2em', textTransform:'uppercase', marginBottom:2 }}>
                  Figure {figureNum} of {totalFigures}
                </div>
                <div className="font-display" style={{ fontSize:14, fontStyle:'italic', color:'var(--ink)' }}>{label}</div>
              </div>
            ) : (
              <div className="font-mono" style={{ fontSize:10, color:'var(--ink-3)', letterSpacing:'0.15em', textTransform:'uppercase' }}>
                {totalFigures} figures · ~{Math.round(sequence.filter(s => !s.isLabel).length * (60/bpm) / 60)} min at {bpm} BPM
              </div>
            )}
            <div style={{ height:4, background:'var(--paper)', border:'1px solid var(--rule)', borderRadius:2, overflow:'hidden' }}>
              <div style={{ height:'100%', width:`${progress}%`, background:'var(--gold)', transition:'width 0.2s linear' }} />
            </div>
          </div>
        );
      })()}

      {/* Metronome display (no fretboard) */}
      {exercise.type === 'metronome' && (() => {
        const step = sequence[currentIdx];
        const beat = step?.isMetronomeBeat ? step.beat : 0;
        const bar = step?.isMetronomeBeat ? step.bar : 0;
        const beatsPerBar = exercise.beatsPerBar || 4;
        return (
          <div style={{ padding:'24px 14px', background:'var(--paper)', border:'1px solid var(--rule)', borderRadius:3, textAlign:'center' }}>
            <div className="font-mono" style={{ fontSize:9, color:'var(--ink-3)', letterSpacing:'0.25em', textTransform:'uppercase', marginBottom:14 }}>
              {bar > 0 ? `Bar ${bar}` : 'Press play to start'}
            </div>
            <div style={{ display:'flex', gap:8, justifyContent:'center', marginBottom:12 }}>
              {Array.from({ length: beatsPerBar }, (_, i) => {
                const n = i + 1;
                const isActive = isPlaying && beat === n;
                const isDownbeat = n === 1;
                return (
                  <div key={n} style={{
                    width:48, height:48, borderRadius:4,
                    border:`2px solid ${isActive ? (isDownbeat ? 'var(--burgundy)' : 'var(--gold)') : 'var(--rule)'}`,
                    background: isActive ? (isDownbeat ? 'var(--burgundy)' : 'var(--gold)') : 'var(--paper-2)',
                    color: isActive ? 'var(--paper)' : 'var(--ink-3)',
                    display:'flex', alignItems:'center', justifyContent:'center',
                    fontFamily:"'JetBrains Mono', monospace", fontSize:18, fontWeight:600,
                    transition:'all 0.05s linear',
                  }}>{n}</div>
                );
              })}
            </div>
            <div className="font-mono num" style={{ fontSize:38, fontWeight:600, color:'var(--ink)', lineHeight:1 }}>
              {bpm} <span style={{ fontSize:14, color:'var(--ink-3)', fontWeight:400 }}>BPM</span>
            </div>
            <div className="font-mono" style={{ fontSize:9, color:'var(--ink-4)', letterSpacing:'0.2em', textTransform:'uppercase', marginTop:10 }}>
              Audible click — read your own tab/sheet
            </div>
          </div>
        );
      })()}

      {/* Fretboard for non-chord, non-metronome exercises */}
      {exercise.type !== 'chordCycle' && exercise.type !== 'metronome' && (() => {
        const playableEvents = sequence.filter(s => s && !s.isLabel && !s.isMetronomeBeat);
        const eventPositions = playableEvents.flatMap(s => s.isChord ? (s.positions || []) : (s.fret != null && s.str != null ? [{ str:s.str, fret:s.fret }] : []));
        const uniquePositions = new Set(eventPositions.map(p => `${p.str}:${p.fret}`)).size;
        const touchCount = eventPositions.length;
        const formatEvent = (st) => st.isChord ? (st.positions || []).map(p => `${STRING_LABELS[p.str]}${p.fret}`).join('+') : `${STRING_LABELS[st.str]}${st.fret}`;
        return (
          <>
            <GuitarFretboard positions={positions} numFrets={fretboardFrets} compact={exercise.type === 'vaiFigure'} label={isPlaying ? '♬ Watch the gold note' : `${exercise.sourceLabel || 'Fretboard preview'} · ${playableEvents.length} tab events · ${touchCount} fret touches · ${uniquePositions} unique positions`} />
            {exercise.type === 'vaiFigure' && (
              <div style={{ marginTop:8, padding:9, background:'var(--paper)', border:'1px solid var(--rule-soft)', fontSize:12, color:'var(--ink-3)', lineHeight:1.45 }}>
                <div style={{ marginBottom:7 }}>The playalong is generated from the displayed ASCII tab, read left-to-right by tab column. Simultaneous notes in the same column are played together; bend target numbers such as b16 are treated as pitch targets, not extra frets to touch. High-register figures automatically expand the neck to fret {fretboardFrets}.</div>
                <div className="small-caps" style={{ fontSize:9, color:'var(--burgundy)', marginBottom:5 }}>Tab-event timeline</div>
                <div className="scroll-x" style={{ display:'flex', gap:4, paddingBottom:3 }}>{playableEvents.map((st, i) => <span key={i} className="font-mono" style={{ flex:'0 0 auto', fontSize:9, padding:'3px 5px', border:'1px solid var(--rule-soft)', background: i === currentIdx ? 'var(--gold)' : 'var(--paper-2)', color: i === currentIdx ? 'var(--paper)' : 'var(--ink-3)' }}>{i + 1}:{formatEvent(st)}</span>)}</div>
              </div>
            )}
          </>
        );
      })()}
    </div>
  );
}

function MetronomeBox({ audio }) {
  const [bpm, setBpm] = useState(80);
  const [beats, setBeats] = useState(4);
  const [running, setRunning] = useState(false);
  const [beat, setBeat] = useState(0);

  useEffect(() => {
    if (!running) { setBeat(0); return; }
    let idx = 0;
    const playClick = () => {
      const b = (idx % beats) + 1;
      setBeat(b);
      audio.playNote(b === 1 ? 84 : 76, '32n');
      idx += 1;
    };
    playClick();
    const id = setInterval(playClick, 60000 / bpm);
    return () => clearInterval(id);
  }, [running, bpm, beats, audio]);

  const toggle = async () => {
    if (!running) {
      try { if (Tone.context.state !== 'running') await Tone.start(); } catch (e) {}
    }
    setRunning(v => !v);
  };

  return (
    <Card style={{ padding:18 }}>
      <div className="small-caps" style={{ fontSize:10, color:'var(--burgundy)', marginBottom:6 }}>Time</div>
      <h3 className="font-display" style={{ fontSize:22, fontStyle:'italic', marginBottom:4 }}>Metronome</h3>
      <p style={{ fontSize:13, color:'var(--ink-3)', lineHeight:1.55, marginBottom:14 }}>A real click, not a silent counter. Use it for repertoire, technique, reading, and tempo-ladder work.</p>

      <div style={{ display:'flex', alignItems:'center', gap:8, flexWrap:'wrap', marginBottom:14 }}>
        <button onClick={() => setBpm(v => Math.max(30, v - 5))} style={{...btnInline('var(--ink)')}}>−5</button>
        <input aria-label="BPM" type="number" min="30" max="260" value={bpm} onChange={e => setBpm(Math.max(30, Math.min(260, Number(e.target.value) || 80)))} style={{ width:80, padding:'8px 10px', background:'var(--paper)', border:'1px solid var(--ink)', borderRadius:2, fontFamily:"'JetBrains Mono', monospace", fontSize:14, color:'var(--ink)' }} />
        <button onClick={() => setBpm(v => Math.min(260, v + 5))} style={{...btnInline('var(--ink)')}}>+5</button>
        <select value={beats} onChange={e => setBeats(Number(e.target.value))} style={{ padding:'8px 10px', background:'var(--paper)', border:'1px solid var(--ink)', borderRadius:2, fontFamily:"'JetBrains Mono', monospace", fontSize:11, color:'var(--ink)' }}>
          {[2,3,4,5,6,7].map(n => <option key={n} value={n}>{n}/4</option>)}
        </select>
        <button onClick={toggle} style={{...btnInline(running ? 'var(--burgundy)' : 'var(--sage)'), flex:'1 1 120px'}}>{running ? '■ Stop' : '▶ Start click'}</button>
      </div>

      <div style={{ display:'flex', gap:8, justifyContent:'center' }}>
        {Array.from({ length: beats }, (_, i) => {
          const n = i + 1;
          const active = running && beat === n;
          return (
            <div key={n} style={{ width:42, height:42, borderRadius:4, display:'flex', alignItems:'center', justifyContent:'center', border:'2px solid ' + (active ? (n === 1 ? 'var(--burgundy)' : 'var(--gold)') : 'var(--rule)'), background:active ? (n === 1 ? 'var(--burgundy)' : 'var(--gold)') : 'var(--paper-2)', color:active ? 'var(--paper)' : 'var(--ink-3)', fontFamily:"'JetBrains Mono', monospace", fontWeight:600 }}>{n}</div>
          );
        })}
      </div>
    </Card>
  );
}

function PracticeLogBox() {
  const { entries, saveEntry } = usePracticeLog();
  const today = todayKey();
  const todays = entries[today] || { date:today, minutes:30, focus:'Technique', notes:'' };
  const [minutes, setMinutes] = useState(todays.minutes || 30);
  const [focus, setFocus] = useState(todays.focus || 'Technique');
  const [notes, setNotes] = useState(todays.notes || '');
  const [saved, setSaved] = useState(false);

  useEffect(() => {
    const next = entries[today] || { minutes:30, focus:'Technique', notes:'' };
    setMinutes(next.minutes || 30);
    setFocus(next.focus || 'Technique');
    setNotes(next.notes || '');
  }, [today]);

  const keys = Object.keys(entries).sort().reverse();
  const totalMin = Object.values(entries).reduce((sum, e) => sum + (Number(e.minutes) || 0), 0);
  const last7 = Object.keys(entries).filter(k => {
    const d = new Date(k + 'T00:00:00');
    return (Date.now() - d.getTime()) <= 7 * 24 * 60 * 60 * 1000;
  }).reduce((sum, k) => sum + (Number(entries[k].minutes) || 0), 0);

  const save = () => {
    saveEntry({ date:today, minutes:Number(minutes) || 0, focus, notes });
    setSaved(true);
    setTimeout(() => setSaved(false), 1200);
  };

  return (
    <Card style={{ padding:18 }}>
      <div className="small-caps" style={{ fontSize:10, color:'var(--burgundy)', marginBottom:6 }}>Accountability</div>
      <h3 className="font-display" style={{ fontSize:22, fontStyle:'italic', marginBottom:4 }}>Practice Log</h3>
      <p style={{ fontSize:13, color:'var(--ink-3)', lineHeight:1.55, marginBottom:14 }}>Track minutes, focus, and one observation. Advanced players improve because they close feedback loops.</p>

      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:8, marginBottom:10 }}>
        <label style={{ fontSize:12, color:'var(--ink-3)' }}>Minutes
          <input type="number" min="0" value={minutes} onChange={e => setMinutes(e.target.value)} style={{ marginTop:4, width:'100%', padding:'9px 10px', background:'var(--paper)', border:'1px solid var(--rule)', borderRadius:2, fontFamily:"'JetBrains Mono', monospace", color:'var(--ink)' }} />
        </label>
        <label style={{ fontSize:12, color:'var(--ink-3)' }}>Focus
          <select value={focus} onChange={e => setFocus(e.target.value)} style={{ marginTop:4, width:'100%', padding:'9px 10px', background:'var(--paper)', border:'1px solid var(--rule)', borderRadius:2, fontFamily:"'JetBrains Mono', monospace", color:'var(--ink)' }}>
            {['Technique','Fretboard','Scales','Chords','Harmony','Ear','Reading','Repertoire','Improvisation','Composition'].map(x => <option key={x}>{x}</option>)}
          </select>
        </label>
      </div>
      <textarea value={notes} onChange={e => setNotes(e.target.value)} placeholder="What improved? What needs work tomorrow?" style={{ width:'100%', minHeight:76, resize:'vertical', padding:10, background:'var(--paper)', border:'1px solid var(--rule)', borderRadius:2, fontFamily:"'Public Sans', sans-serif", color:'var(--ink)', marginBottom:10 }} />
      <button onClick={save} style={{...btnInline(saved ? 'var(--sage)' : 'var(--burgundy)'), width:'100%'}}>{saved ? '✓ Saved' : 'Save today'}</button>

      <div style={{ display:'grid', gridTemplateColumns:'repeat(3, 1fr)', gap:6, marginTop:12 }}>
        {[{k:'Total',v:totalMin}, {k:'Last 7 days',v:last7}, {k:'Logged days',v:keys.length}].map(x => (
          <div key={x.k} style={{ padding:10, background:'var(--paper-3)', border:'1px solid var(--rule)', textAlign:'center' }}>
            <div className="font-mono num" style={{ fontSize:18, fontWeight:600 }}>{x.v}</div>
            <div className="font-mono" style={{ fontSize:8, color:'var(--ink-4)', letterSpacing:'0.13em', textTransform:'uppercase' }}>{x.k}</div>
          </div>
        ))}
      </div>
      {keys.length > 0 && (
        <div style={{ marginTop:12, borderTop:'1px solid var(--rule-soft)', paddingTop:10 }}>
          <div className="small-caps" style={{ fontSize:9, color:'var(--ink-3)', marginBottom:6 }}>Recent entries</div>
          {keys.slice(0, 4).map(k => (
            <div key={k} style={{ fontSize:12.5, color:'var(--ink-2)', marginBottom:5, lineHeight:1.45 }}><strong>{k}</strong> · {entries[k].minutes || 0} min · {entries[k].focus || 'Practice'}{entries[k].notes ? ' — ' + entries[k].notes : ''}</div>
          ))}
        </div>
      )}
    </Card>
  );
}

  const items = [
    { id:'neck-notes', area:'Fretboard', text:'Name every natural note on all six strings without hesitation.', tab:'caged' },
    { id:'caged-connect', area:'Fretboard', text:'Connect all five CAGED positions in one key and shift positions mid-phrase.', tab:'caged' },
    { id:'triads', area:'Harmony', text:'Play major, minor, diminished, and augmented triads on every string set.', tab:'chords' },
    { id:'sevenths', area:'Harmony', text:'Voice 7th chords and extensions from chord tones, not memorized grips only.', tab:'decoder' },
    { id:'ii-v-i', area:'Harmony', text:'Comp and solo through ii–V–I in at least six keys.', tab:'harmony' },
    { id:'alternate', area:'Technique', text:'Play clean 16ths with strict alternate picking and no excess tension.', tab:'drills' },
    { id:'legato', area:'Technique', text:'Play legato lines with even volume between picked and slurred notes.', tab:'drills' },
    { id:'ear-intervals', area:'Ear', text:'Identify intervals, triad quality, and 7th quality by ear.', tab:'ear' },
    { id:'transcribe', area:'Ear', text:'Transcribe a short phrase from a recording and play it in another key.', tab:'ear' },
    { id:'time', area:'Time', text:'Record yourself to a click and hear whether you rush, drag, or sit in the pocket.', tab:'toolkit' },
    { id:'rep', area:'Music', text:'Maintain at least three complete pieces/solos at performance tempo.', tab:'jam' },
    { id:'compose', area:'Music', text:'Write an 8-bar idea using a named harmonic concept and record it.', tab:'harmony' },
  ];
  const pct = Math.round((done.length / items.length) * 100);
  const next = items.find(i => !done.includes(i.id));

  return (
    <Card style={{ padding:18 }}>
      <div className="small-caps" style={{ fontSize:10, color:'var(--burgundy)', marginBottom:6 }}>Advanced player map</div>
      <h3 className="font-display" style={{ fontSize:22, fontStyle:'italic', marginBottom:4 }}>Readiness Checklist</h3>
      <p style={{ fontSize:13, color:'var(--ink-3)', lineHeight:1.55, marginBottom:10 }}>This is the diagnostic layer: it tells you whether the app is producing usable guitar ability rather than passive theory knowledge.</p>
      <div style={{ height:6, background:'var(--paper)', borderRadius:3, overflow:'hidden', border:'1px solid var(--rule)', marginBottom:10 }}>
        <div style={{ height:'100%', width:pct + '%', background:'var(--burgundy)', transition:'width 0.3s' }} />
      </div>
      <div className="font-mono" style={{ fontSize:10, color:'var(--ink-3)', letterSpacing:'0.1em', textTransform:'uppercase', marginBottom:10 }}>{done.length}/{items.length} complete · {pct}%</div>
      {next && (
        <button onClick={() => setTab && setTab(next.tab)} style={{...btnInline('var(--gold)'), width:'100%', marginBottom:12}}>Next weak link: {next.area} →</button>
      )}
      <div style={{ display:'flex', flexDirection:'column', gap:6 }}>
        {items.map(item => {
          const checked = done.includes(item.id);
          return (
            <button key={item.id} onClick={() => toggle(item.id)} style={{ display:'flex', gap:9, alignItems:'flex-start', textAlign:'left', padding:'8px 9px', background:checked ? 'var(--paper-3)' : 'var(--paper)', border:'1px solid ' + (checked ? 'var(--sage)' : 'var(--rule)'), borderRadius:2 }}>
              <span style={{ width:18, height:18, flexShrink:0, border:'1px solid ' + (checked ? 'var(--sage)' : 'var(--ink-4)'), background:checked ? 'var(--sage)' : 'transparent', color:'var(--paper)', display:'flex', alignItems:'center', justifyContent:'center', fontSize:12 }}>{checked ? '✓' : ''}</span>
              <span style={{ flex:1 }}><span className="font-mono" style={{ fontSize:8, color:'var(--burgundy)', letterSpacing:'0.13em', textTransform:'uppercase' }}>{item.area}</span><br/><span style={{ fontSize:13, color:'var(--ink-2)', lineHeight:1.45 }}>{item.text}</span></span>
            </button>
          );
        })}
      </div>
    </Card>
  );
}

// ═══════════════════════════════════════════════════════════════════════
//  TAB: VAI ROUTINE — guided practice timer based on Vai's 10-hour workout
// ═══════════════════════════════════════════════════════════════════════
//  Steve Vai's 10-Hour Guitar Workout (Guitar World, 1990) is structured
//  as 1-hour blocks across categories. We replicate the structure as a
//  guided timer that walks you through each block, with each block linking
//  to the relevant tab in the app.

// Each block has an optional `exercise` describing a play-along:
//   { name, description, type, ...typeSpecificFields, bpm, rhythm }
// Types:
//   'spider' { sequence:[finger indices] } - chromatic across all 6 strings
//   'scale' { rootName, scaleKey, gap } - ascending then descending scale
//   'sequence3rds' { rootName, scaleKey } - scale in 3rds
//   'arpeggios' { rootName, scaleKey } - diatonic 7th arpeggios
//   'chordCycle' { progression: [{rootName, ints}] } - cycle through chord voicings
//   'vaiWorkout' { figures: [{label, steps:[{str,fret}]}] } - multi-figure walkthrough
//   'free' - no programmable exercise

// Helper: build a chromatic spider pattern across all 6 strings (low to high, ascending only)
// using the given finger pattern (relative fret offsets) starting at startFret
function vaiSpiderAsc(startFret, pattern) {
  const out = [];
  for (let s = 0; s < 6; s++) {
    pattern.forEach(p => out.push({ str: s, fret: startFret + p }));
  }
  return out;
}

function VaiSourceWorkoutLibrary({ audio }) {
  const [activeId, setActiveId] = useState('fig1');
  const [filter, setFilter] = useState('');
  const [copied, setCopied] = useState(false);

  const q = filter.trim().toLowerCase();
  const visible = VAI_SOURCE_FIGURES.filter(fig =>
    !q ||
    fig.label.toLowerCase().includes(q) ||
    fig.title.toLowerCase().includes(q) ||
    fig.category.toLowerCase().includes(q) ||
    fig.focus.toLowerCase().includes(q)
  );
  const active = VAI_SOURCE_FIGURES.find(fig => fig.id === activeId) || visible[0] || VAI_SOURCE_FIGURES[0];
  const activeExercise = useMemo(() => vaiFigureToExercise(active), [active]);

  const jumpTo = (fig) => {
    setActiveId(fig.id);
    setCopied(false);
  };

  const copyActive = async () => {
    if (!active || typeof navigator === 'undefined' || !navigator.clipboard) return;
    try {
      await navigator.clipboard.writeText(active.tab);
      setCopied(true);
      setTimeout(() => setCopied(false), 1400);
    } catch (e) {
      setCopied(false);
    }
  };

  const categoryCounts = VAI_SOURCE_FIGURES.reduce((acc, fig) => {
    acc[fig.category] = (acc[fig.category] || 0) + 1;
    return acc;
  }, {});

  return (
    <Card style={{ padding:18, marginBottom:16, borderColor:'var(--burgundy)', background:'linear-gradient(180deg, var(--paper-2), var(--paper))' }}>
